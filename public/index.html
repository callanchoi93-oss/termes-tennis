  /* ════════════════════════════════════════════════
     REDESIGN LAYER v2 — bold cream · colorful blocks · black ink
     refs: cream editorial type + saturated cards + dark floating nav
     ════════════════════════════════════════════════ */

  /* — warm cream backdrop — */
  body{ background:linear-gradient(180deg,#ece5d3 0%,#e3dbc8 100%); background-attachment:fixed; }
  .app{ background:var(--cream); }
  @media(min-width:480px){ .app{ border-radius:40px; box-shadow:0 30px 80px rgba(60,45,20,.28); } }

  /* — demo strip — */
  .demo-tag{ background:#efe7d5; color:#a08a5e; font-weight:700; letter-spacing:.2px; }

  /* — top bar / logo — */
  .appbar{ padding:18px 22px 4px; }
  .logo{ font-size:23px; font-weight:900; letter-spacing:-.7px; color:var(--ink); }
  .logo b{ color:var(--coral); }
  .bell{ width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow-s); }

  /* — SIGNATURE: oversized black editorial headline + short accent bar (golden-ratio scale) — */
  /* type scale φ≈1.6:  36 · 22 · 18 · 15(body) · 13 · 11.5 */
  h2.t{
    position:relative; font-size:36px; line-height:1.05; font-weight:900;
    letter-spacing:-.05em; color:var(--ink); margin:22px 4px 6px 0; padding-top:14px;
  }
  h2.t::before{
    content:""; position:absolute; left:0; top:0;
    width:30px; height:5px; border-radius:3px; background:var(--coral);
  }
  p.sub{ margin-left:0; margin-right:4px; color:var(--gray); font-weight:500; font-size:14.5px; line-height:1.5; }

  /* — section headers — */
  .ch{ font-size:18px; font-weight:900; letter-spacing:-.03em; color:var(--ink); }

  /* — warm cards, generous radius — */
  .card,.match,.item,.post,.sched,.clubrow,.composer,.bracket{
    background:#fffdf6; border-radius:24px; border:1px solid var(--line2); box-shadow:var(--shadow-s);
  }
  .card{ padding:18px; }

  /* — buttons: black ink pills (editorial / on-trend) — */
  .btn{
    background:var(--ink); color:#fff; border-radius:18px; padding:16px; font-weight:800;
    letter-spacing:-.02em; box-shadow:0 8px 20px rgba(27,24,19,.22);
  }
  .btn:active{ transform:translateY(1px); }
  .btn.ghost{ background:#fffdf6; border:1.8px solid var(--ink); color:var(--ink); box-shadow:var(--shadow-s); }
  .btn.felt{ background:var(--felt); color:var(--ink); box-shadow:0 8px 20px rgba(194,204,44,.35); }
  .btn.sm{ border-radius:13px; box-shadow:none; padding:9px 16px; }
  .btn.done{ background:#e9f6ec; color:#2f9159; box-shadow:none; }
  .btn.cancel{ background:#efe9da; color:#8b8170; box-shadow:none; }

  /* — chips & segments: black active pill — */
  .chip{ border-radius:20px; border:1.5px solid var(--line); background:#fffdf6; }
  .chip.on{ background:var(--ink); border-color:var(--ink); color:#fff; box-shadow:0 4px 12px rgba(27,24,19,.22); }
  .seg{ background:#ece6d5; border-radius:16px; padding:5px; }
  .seg .o{ border-radius:12px; }
  .seg .o.on{ background:var(--brand); color:#fff; box-shadow:0 3px 10px rgba(237,124,48,.20); }
  .cs.on{ background:var(--ink); border-color:var(--ink); color:#fff; }

  .info-banner{
    background:var(--purple); color:var(--ink); border-radius:24px; padding:18px;
    box-shadow:0 12px 28px rgba(150,120,220,.28); position:relative; overflow:hidden;

    content:""; position:absolute; right:-26px; bottom:-34px; width:130px; height:130px;

  .tabbar{

  .prm-row{ display:flex; align-items:center; padding:10px 0; font-size:13.5px; font-weight:700; }

  .prm-row b{ width:70px; text-align:center; color:var(--coral-d); font-weight:900; }

  /* — 대화 — */
  .dm-log{ max-height:280px; overflow-y:auto; background:#faf6ee; border-radius:16px; padding:12px; }
  .dm-b{ max-width:78%; padding:9px 12px; border-radius:14px; background:#fff; border:1px solid var(--line2);
         font-size:13.5px; font-weight:600; line-height:1.5; margin-bottom:7px; word-break:break-word; }
  .dm-b.me{ margin-left:auto; background:var(--brand); color:#fff; border-color:transparent; }
  .dm-un{ display:inline-block; min-width:17px; padding:1px 5px; border-radius:9px; background:var(--coral);
          color:#fff; font-size:10.5px; font-weight:900; text-align:center; vertical-align:1px; }

            border-radius:999px; padding:0 4px; vertical-align:1px; }

  .lgx-row span{ flex:1 }

  .lgx-stats{ display:flex;justify-content:space-around;padding:20px 0 12px;text-align:center }

  .ph-prev{ position:relative;margin:8px 0;border-radius:12px;overflow:hidden;max-height:220px }
  .ph-prev img{ width:100%;display:block;object-fit:cover;max-height:220px }

         font-size:17px;font-weight:700;cursor:pointer }

  .cl-row i{ font-style:normal;font-size:12px;color:var(--gray) }

  /* ═══ 프로페셔널 폴리시 ═══ */
  /* 스켈레톤 — 데이터가 오기 전 형태를 먼저 보여준다 */
  .skel{ position:relative; overflow:hidden; background:#eee7db; border-radius:12px; }
  .skel::after{ content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);
    animation:shimmer 1.3s infinite; }
  @keyframes shimmer{ from{transform:translateX(-100%)} to{transform:translateX(100%)} }
  .skel-card{ padding:16px; background:#fff; border:1px solid var(--line); border-radius:16px; margin-bottom:10px; }
  .skel-line{ height:13px; margin-bottom:9px; }
  .skel-line.w60{ width:60% } .skel-line.w40{ width:40% } .skel-line.w80{ width:80% }

  /* 시트 — 손잡이 + 부드러운 스프링 */
  .sheet{ animation:sheetUp .32s cubic-bezier(.22,1.1,.36,1) !important; padding-top:14px !important; }
  .sheet::before{ content:''; display:block; width:40px; height:4px; border-radius:99px;
    background:#d8d0c2; margin:0 auto 14px; }
  .ov{ background:rgba(28,24,18,.4); backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
    transition:opacity .22s ease; }
  @keyframes sheetUp{ from{ transform:translateY(48px); opacity:.4 } to{ transform:none; opacity:1 } }

  /* 화면 전환 — 살짝 떠오르며 */
  .screen.on{ animation:viewIn .28s cubic-bezier(.3,.9,.4,1); }
  @keyframes viewIn{ from{ opacity:0; transform:translateY(10px) } to{ opacity:1; transform:none } }

  /* 토스트 — 그림자 · 홈바 회피 */
  .toast{ box-shadow:0 8px 28px rgba(28,24,18,.28); backdrop-filter:blur(6px);
    bottom:calc(96px + env(safe-area-inset-bottom,0px)) !important; max-width:86vw; text-align:center;
    line-height:1.45; }

  /* 눌림 피드백 통일 */
  .card[onclick]:active, .toolrow:active, .om-act:active, .om-re:active,
  .post-btn:active, .btn:active, .sbtn2:active{ transform:scale(.975); transition:transform .08s; }

  /* 금액·점수는 자릿수가 흔들리지 않게 */
  .due-sum b, .om-hd, .cl-row em, .rp-cap{ font-variant-numeric:tabular-nums; }

  /* 이미지 — 로드되며 떠오른다 */
  .post .photo img, .ph-prev img{ opacity:0; transition:opacity .35s ease; }
  .post .photo img.ld, .ph-prev img.ld{ opacity:1; }

  /* 오프라인 배너 */
  #offline{ position:fixed; top:0; left:0; right:0; z-index:300; background:#1c1812; color:#fff;
    font-size:12.5px; font-weight:700; text-align:center; padding:9px 14px;
    padding-top:calc(9px + env(safe-area-inset-top,0px));
    transform:translateY(-110%); transition:transform .3s ease; }
  #offline.on{ transform:none; }

  /* 키보드 포커스 접근성 */
  button:focus-visible, [role="button"]:focus-visible, input:focus-visible, textarea:focus-visible{
    outline:2px solid var(--coral); outline-offset:2px; }

  /* — 오픈매치 — */

          color:var(--gray);cursor:pointer }

  .om-act{ border:none;border-radius:999px;padding:8px 14px;font-family:inherit;font-size:13px;

  .om-reg{ font-size:11.5px;font-weight:700;color:var(--lgray);margin-top:4px;display:flex;align-items:center;gap:3px }

  .om-hn{ font-size:13.5px;font-weight:800;color:var(--ink) }
  .om-htag{ font-size:10px;font-weight:800;color:var(--coral-d);background:var(--coral-s);

  .om-hd{ font-size:11.5px;font-weight:700;color:var(--gray);margin-top:2px }
  .om-p.host{ background:var(--coral-s);color:var(--coral-d) }

         border-radius:999px; padding:4px 9px; }
  /* — 모임별 추이 — */
  .tl-wrap{ display:flex; align-items:flex-end; gap:6px; height:92px; padding:8px 2px 0; }

  .tl-d{ font-size:9.5px; font-weight:700; color:var(--lgray); white-space:nowrap; }
  /* — 선수 비교 — */
  .cmp-head{ display:flex; align-items:flex-start; justify-content:space-between; margin:4px 0 16px; }
  .cmp-p{ flex:1; text-align:center; }
  .cmp-av{ width:66px;height:66px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;
           color:#fff;font-size:26px;font-weight:900;box-shadow:0 6px 18px rgba(60,40,25,.16); }
  .cmp-n{ font-size:15.5px; font-weight:900; letter-spacing:-.03em; margin-top:9px; color:var(--ink); }
  .cmp-sub{ font-size:11.5px; font-weight:700; color:var(--gray); margin-top:2px; }
  .cmp-vs{ font-size:13px; font-weight:900; color:var(--lgray); padding:24px 6px 0; flex:none; }
  .cmp-h2h{ background:linear-gradient(140deg,#2f2a24,#1b1813); border-radius:20px; padding:15px; text-align:center; color:#fff; }
  .cmp-h2h-t{ font-size:11.5px; font-weight:800; color:#cbb8a6; letter-spacing:.5px; }

  .rp-hn{ font-size:13px; font-weight:800; color:#cbb8a6; letter-spacing:-.01em; }

  /* — 한울 수기 기록표 — */
  .sh-ov{ position:fixed; inset:0; background:rgba(27,24,19,.55); z-index:80; overflow-y:auto;
          padding:26px 12px; -webkit-overflow-scrolling:touch; }
  .sh-panel{ max-width:640px; margin:0 auto; background:#fdfbf4; border-radius:22px; padding:20px 18px 26px;
             box-shadow:0 24px 60px rgba(0,0,0,.35); }
  .sh-head{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; }
  .sh-eye{ font-size:11px; font-weight:900; letter-spacing:1.4px; color:var(--coral-d); }
  .sh-title{ font-size:24px; font-weight:900; letter-spacing:-.04em; color:var(--ink); margin-top:3px; }
  .sh-x{ width:34px;height:34px;border:none;border-radius:50%;background:#efe9dd;color:var(--gray);
         font-size:20px;cursor:pointer;font-family:inherit;line-height:1; }
  .sh-court{ border:1.5px solid #e3d9c4; border-radius:16px; padding:15px 14px; margin-bottom:16px; background:#fff; }
  .sh-ct{ font-size:16px; font-weight:900; color:var(--ink); letter-spacing:-.02em; }
  .sh-ct span{ font-size:11.5px; font-weight:700; color:var(--gray); margin-left:6px; }
  .sh-sub{ font-size:12.5px; font-weight:800; color:var(--ink); margin:12px 0 7px; }
  .sh-sub span{ color:#b3a894; font-weight:700; }
  .sh-sched{ width:100%; border-collapse:collapse; }
  .sh-sched td{ border:1px solid #e6ddc9; padding:7px 9px; font-size:13px; font-weight:700; }
  .sh-sched td.g{ width:78px; color:var(--gray); background:#faf7ef; font-size:12px; }
  .sh-sched td.code{ font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:15px;
                     font-weight:800; letter-spacing:2px; color:var(--ink); }
  .sh-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .sh-grid{ border-collapse:collapse; width:100%; min-width:520px; }
  .sh-grid th,.sh-grid td{ border:1px solid #e6ddc9; padding:6px 5px; text-align:center;
                           font-size:11.5px; font-weight:700; white-space:nowrap; }
  .sh-grid th{ background:#f6f1e5; color:var(--gray); font-weight:800; font-size:11px; }
  .sh-grid th.grp{ background:#efe8d8; }
  .sh-grid td.nm{ font-weight:800; color:var(--ink); font-size:12.5px; text-align:left; padding-left:8px; }
  .sh-grid td.lblM,.sh-grid td.lblF{ width:30px; }
  .sh-grid td.lblM span{ display:inline-block;width:20px;height:20px;line-height:20px;border-radius:6px;
                         background:#e7eefb;color:#3f6bc2;font-weight:900; }
  .sh-grid td.lblF span{ display:inline-block;width:20px;height:20px;line-height:20px;border-radius:6px;
                         background:#fbe7f2;color:#d6336c;font-weight:900; }
  .sh-grid td.set{ font-variant-numeric:tabular-nums; }
  .sh-grid td.set.win{ background:#eef7ee; color:#2f7a4d; font-weight:900; }
  .sh-grid td.set.empty{ color:#d5cabc; }
  .sh-grid td.pos{ color:#2f7a4d; } .sh-grid td.neg{ color:#c0392b; }
  .sh-grid td.rk{ font-weight:900; color:var(--ink); background:#faf7ef; }
  .sh-grid tr.me td{ background:#fdf3ea; }
  .sh-grid tr.me td.nm{ color:var(--coral-d); }
  /* — 스코어 입력 (크게) — */
  .sc-row{ display:flex; align-items:center; justify-content:center; gap:9px; margin-top:10px; }
  .sc-lb{ font-size:11px; font-weight:800; color:var(--lgray); width:38px; text-align:center; }
  .sc-in{ width:62px; height:52px; text-align:center; border:2px solid var(--line);
          border-radius:14px; font-size:24px; font-weight:900; font-family:inherit;
          background:#fff; color:var(--ink); outline:none; transition:.12s;
          font-variant-numeric:tabular-nums; -moz-appearance:textfield; }
  .sc-in:focus{ border-color:var(--brand); box-shadow:0 0 0 4px rgba(237,124,48,.14); }
  .sc-in::placeholder{ color:#d8cfc0; font-weight:700; }
  .sc-co{ font-size:19px; font-weight:900; color:var(--lgray); }
  .sc-row.done .sc-in{ border-color:#cfe2b8; background:#f7fbf3; }
  /* 코트 박스 안의 시작/타이머 */
  .court-line .bk-ctrl{ width:100%; margin:9px 0 0; justify-content:flex-end; }
  .bk-chip.playing{ background:#fdf2dd; color:#c47d10; }
  .bk-chip.playing em{ font-style:normal; font-weight:700; opacity:.7; margin-left:3px; font-size:10.5px; }
  .bk-dot{ width:6px;height:6px;border-radius:50%;background:#e0912a; animation:bkpulse 1.1s infinite; }
  @keyframes bkpulse{ 0%,100%{opacity:1} 50%{opacity:.25} }
  .bk-btn.go{ display:inline-flex; align-items:center; gap:5px; padding:8px 16px; font-size:12.5px; }
  /* — 대진 운영(라이브) 레이어 — */
  .bk-nav{ display:flex; gap:7px; overflow-x:auto; padding:2px 0 12px; scrollbar-width:none; }
  .bk-nav::-webkit-scrollbar{ display:none; }
  .bk-n{ flex:0 0 auto; padding:8px 13px; border-radius:999px; font-size:12.5px; font-weight:800;
         background:#efe9dd; color:var(--gray); white-space:nowrap; }
  .bk-n.now{ background:#e7f4ec; color:#1f7d4d; }
  .bk-n.playing{ background:#fdf2dd; color:#c47d10; }
  .bk-n.done{ background:#e7eefb; color:#5b7fd4; }
  .bk-next{ display:flex; align-items:center; gap:12px; background:#fffdf6; border:1px solid var(--line2);
            border-radius:18px; padding:14px 15px; margin-bottom:12px; box-shadow:var(--shadow-s); }
  .bk-next.done{ background:#f1f8f3; border-color:#cfe6d8; }
  .bk-next-ic{ width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none; }
  .bk-next-x{ flex:1; min-width:0; }
  .bk-next-t{ font-size:14px; font-weight:900; letter-spacing:-.02em; color:var(--ink); }
  .bk-next-d{ font-size:12px; font-weight:700; color:var(--gray); margin-top:2px; }
  .bk-chip{ display:inline-flex; align-items:center; gap:4px; padding:5px 10px; border-radius:999px;
            font-size:11.5px; font-weight:800; white-space:nowrap; }
  .bk-chip b{ font-variant-numeric:tabular-nums; font-weight:900; }
  .bk-btn{ border:none; border-radius:999px; padding:6px 13px; font-size:11.5px; font-weight:900;
           font-family:inherit; cursor:pointer; }
  .bk-btn.go{ background:var(--ink); color:#fff; }
  .bk-btn.stop{ background:#fff; color:var(--gray); border:1px solid var(--line); margin-left:5px; }
  .bk-ctrl{ margin-left:auto; display:flex; align-items:center; flex:none; }
  .bk-warn{ display:flex; align-items:flex-start; gap:9px; background:#fdeee6; border:1px solid #f3c9ac;
            border-radius:14px; padding:12px 14px; margin-bottom:12px; font-size:12.5px; font-weight:700;
            color:#b85c2e; line-height:1.5; }
  .bk-help{ display:flex; align-items:flex-start; gap:9px; background:#f0faf5; border:1px solid #cdeade;
            border-radius:14px; padding:12px 14px; margin-bottom:12px; font-size:12.5px; font-weight:700;
            color:#1f4536; line-height:1.5; }
  .bk-help em{ display:block; font-style:normal; font-weight:800; color:#12805e; margin-top:4px; font-size:13px; }
  /* — 라인업 카드 — */
  .lu{ background:var(--coral-s); border:1px solid rgba(236,106,46,.18); }
  .lu.ok{ background:#e9f6ee; border-color:rgba(63,158,110,.28); }
  .lu-top{ display:flex; align-items:flex-start; gap:11px; }
  .lu-ic{ width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;flex:none;box-shadow:0 2px 6px rgba(27,24,19,.10); }
  .lu-x{ flex:1; min-width:0; }
  .lu-n{ font-size:14.5px; font-weight:900; letter-spacing:-.02em; color:var(--ink); }
  .lu-d{ font-size:12px; font-weight:700; color:#8a5a33; margin-top:2px; line-height:1.45; }
  .lu.ok .lu-d{ color:#3c6f52; }
  .lu-cd{ display:flex; justify-content:space-between; font-size:11.5px; font-weight:800; color:#8a5a33; }
  .lu-btns{ display:flex; gap:9px; margin-top:14px; }
  .lu-btns .btn{ flex:1; }
  .btn.sm{ padding:11px; font-size:14px; }
  .btn:disabled{ background:#d9cfc2; color:#fff; cursor:not-allowed; box-shadow:none; }
  .lu-note{ font-size:11.5px; font-weight:700; color:#9a7a5e; margin-top:10px; line-height:1.5; }
  .lu-demo{ color:var(--coral-d); text-decoration:underline; cursor:pointer; margin-left:4px; }
  /* — 클럽 로고 — */
  .clogo{ display:inline-flex; align-items:center; justify-content:center; border-radius:50%;
          color:#fff; flex:none; line-height:1; box-shadow:0 2px 6px rgba(27,24,19,.16); }
  .clabel{ display:inline-flex; align-items:center; gap:8px; min-width:0; }
  .clabel>span:last-child{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lgrid{ display:grid; grid-template-columns:repeat(6,1fr); gap:9px; }
  .lopt{ aspect-ratio:1; border-radius:50%; display:flex; align-items:center; justify-content:center;
         font-size:22px; background:#fffdf6; border:2px solid var(--line2); cursor:pointer; }
  .lopt.on{ border-color:var(--coral); background:var(--coral-s); }
  .lopt.bgopt{ border:3px solid transparent; box-shadow:0 0 0 2px var(--line2); }
  .lopt.bgopt.on{ box-shadow:0 0 0 3px var(--coral); }
  /* — 프로필 사진 원형 그리드 — */
  .phgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .phc{ position:relative; aspect-ratio:1; border-radius:22px; cursor:pointer;
        display:flex; align-items:center; justify-content:center; overflow:visible;
        background:#f1ede3; border:2px dashed #cabfa9; transition:.14s; }
  .phc.on{ background:linear-gradient(140deg,#cfd8e6,#a9b6c8); border:2px solid transparent;
           box-shadow:0 4px 12px rgba(27,24,19,.10); }
  .phc:active{ transform:scale(.96); }
  .phc .ph-em{ font-size:30px; line-height:1; }
  .phc .ph-plus{ font-size:26px; color:var(--lgray); line-height:1; }
  .phc .ph-main{ position:absolute; top:8px; left:8px;
                 background:var(--coral); color:#fff; border-radius:999px;
                 padding:2px 9px; font-size:10.5px; font-weight:900; white-space:nowrap; }
  /* — 종목 선택 캡슐 — */
  .spcaps{ display:flex; flex-direction:column; gap:9px; }
  .spcap{ display:flex; align-items:center; gap:13px; width:100%; padding:13px 16px;
          border-radius:999px; background:#fffdf6; border:2px solid var(--line2);
          cursor:pointer; transition:.14s; }
  .spcap:active{ transform:scale(.985); }
  .spcap.on{ background:var(--coral-s); border-color:var(--coral); }
  .spcap .sc-ic{ width:42px; height:42px; border-radius:50%; background:var(--cream2);
                 display:flex; align-items:center; justify-content:center; font-size:22px; flex:none; }
  .spcap.on .sc-ic{ background:#fff; }
  .spcap .sc-x{ flex:1; min-width:0; text-align:left; }
  .spcap .sc-n{ font-size:15.5px; font-weight:900; letter-spacing:-.02em; color:var(--ink); }
  .spcap .sc-d{ font-size:11.5px; font-weight:700; color:var(--gray); margin-top:1px; }
  .spcap .sc-ck{ width:22px; height:22px; border-radius:50%; flex:none;
                 border:2px solid var(--line2); background:#fff; }
  .spcap.on .sc-ck{ border-color:var(--coral); background:var(--coral);
                    box-shadow:inset 0 0 0 3px #fff; }
  /* — 날씨 (캡슐 없음, 아이콘 + 텍스트) — */
  .wx{ display:inline-flex; align-items:center; gap:6px; white-space:nowrap; line-height:1; vertical-align:middle; }
  .wx .wx-i{ width:17px; height:17px; flex:none; display:block; }
  .wx .wx-t{ font-size:14px; font-weight:900; letter-spacing:-.03em; color:inherit; font-variant-numeric:tabular-nums; }
  .wx .wx-d{ font-size:12.5px; font-weight:700; color:inherit; opacity:.72; letter-spacing:-.01em; }
  .wx .wx-dot{ width:3px; height:3px; border-radius:50%; background:currentColor; opacity:.35; flex:none; }
  /* — MATSU 브랜드: 마스코트 심볼(+ 로그인 전용 워드마크) — */
  .mk{ display:block; width:auto; aspect-ratio:834/714; flex:none; }
  .brand{ display:inline-flex; align-items:center; }
  .brand .wm{ font-family:'Pretendard Variable',Pretendard,sans-serif;
              font-weight:900; letter-spacing:-.02em; line-height:1;
              color:var(--ink); white-space:nowrap; }
  .logo .mk{ height:30px; }
  .pitch-logo .mk{ height:22px; }
  /* 로그인: 심볼 위, 워드마크 아래 (세로 락업) */
  .auth2-logo .brand{ flex-direction:column; gap:clamp(5px,1.2vh,13px); }
  .auth2-logo .mk{ height:clamp(46px,10vh,100px); }
  .auth2-logo .wm{ font-size:clamp(22px,4.2vh,38px); }
  .auth2-logo .dot{ display:inline-block; width:11px; height:11px; border-radius:50%; background:var(--ink); margin-left:5px; vertical-align:6px; }
  .auth2-sub{ text-align:center; font-size:clamp(16px,2.2vh,19px); font-weight:900; color:var(--ink); letter-spacing:-.02em; margin:clamp(9px,1.6vh,14px) 22px clamp(10px,1.8vh,16px); line-height:1.3; }
  .rev-track{ display:flex; overflow-x:auto; scroll-snap-type:x mandatory; gap:14px; padding:4px 30px 0; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .rev-track::-webkit-scrollbar{ display:none; }
  .rev-card{ flex:0 0 84%; scroll-snap-align:center; background:#fff; border-radius:24px; padding:clamp(16px,2.6vh,24px) 22px; box-shadow:0 12px 30px rgba(120,100,60,.14); }
  .rev-card .rv-t{ font-size:21px; font-weight:900; color:var(--ink); letter-spacing:-.02em; line-height:1.25; }
  .rev-card .rv-b{ font-size:15px; color:#4a453b; font-weight:500; line-height:1.55; margin-top:12px; min-height:clamp(36px,6.4vh,70px); white-space:pre-line; }
  .rev-card .rv-f{ display:flex; align-items:center; gap:10px; margin-top:16px; }
  .rev-card .rv-av{ width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#f0a9cf,#b9a6ea); flex-shrink:0; }
  .rev-card .rv-who{ flex:1; font-size:13.5px; font-weight:700; color:var(--gray); }
  .rev-card .rv-time{ font-size:13.5px; color:var(--lgray); font-weight:600; }
  .rev-dots{ display:flex; justify-content:center; gap:6px; margin-top:clamp(9px,1.5vh,15px); }
  .rev-dots i{ width:7px; height:7px; border-radius:50%; background:#d8cdb5; transition:.2s; }
  .rev-dots i.on{ background:var(--coral); width:20px; border-radius:4px; }
  .auth2-btns{ padding:0 22px; display:flex; flex-direction:column; gap:11px; }
  .sbtn2{ display:flex; align-items:center; background:#fff; border:none; border-radius:30px; height:50px; padding:0 20px; font-family:inherit; font-size:16px; font-weight:800; color:var(--ink); cursor:pointer; box-shadow:0 3px 10px rgba(120,100,60,.12); position:relative; }
  .sbtn2 .ic{ width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; position:absolute; left:20px; }
  .sbtn2 .lbl{ flex:1; text-align:center; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
  }
</style>

const myTier=()=>{const n=state.played; return n>=5?{name:tierByRating(state.rating),placing:false}:{name:`루키 · 배치 중 (${n}/5)`,placing:true};};
function expScore(me,opp){return 1/(1+Math.pow(10,(opp-me)/400));}
function dayGames(m){
  if(!m.games){ m.games=[['이석용',1010],['김영민',990],['정윤희',1030]].map(([opp,oppR])=>({opp,oppR,my:null,opn:null,status:'new',delta:0})); }
  return m.games;
}
function openResult(id){ renderResultSheet(id); document.getElementById('ov').classList.add('on'); }
function renderResultSheet(id){
  const m=state.matches.find(x=>x.id===id);if(!m)return;
  const gs=dayGames(m);
  let h=`<div class="sh-top"><h3>경기 결과</h3><div class="cl" role="button" tabindex="0" aria-label="닫기" onclick="closeOv()">×</div></div>
    <div class="sd">${m.dt} · ${m.fmt}·${m.gd}<br>그날 친 경기를 하나씩 입력하면 <b>상대가 확인</b>해야 확정돼요. 매 경기 상대 수준을 반영해요.</div>`;
  gs.forEach((g,i)=>{
    h+=`<div class="card" style="padding:13px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${g.status==='confirmed'?'0':'8px'}">
        <div style="font-weight:800">vs ${g.opp}<span style="font-size:12px;color:var(--lgray);font-weight:600"> · 레이팅 ${g.oppR}</span></div>
        ${g.status==='confirmed'?`<span class="statc stg">확정 ${g.my}:${g.opn} · ${g.delta>=0?'+':''}${g.delta}</span>`:g.status==='pending'?`<span class="statc stp">상대 확인 대기</span>`:''}
      </div>`;
    if(g.status==='new'){
      h+=`<div style="display:flex;align-items:center;gap:8px;justify-content:center">
        <input id="my${i}" type="number" inputmode="numeric" placeholder="나" style="width:60px;text-align:center;padding:9px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;font-family:inherit;background:#fff">
        <span style="font-weight:800">:</span>
        <input id="op${i}" type="number" inputmode="numeric" placeholder="상대" style="width:60px;text-align:center;padding:9px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;font-family:inherit;background:#fff">
        <button class="btn sm" style="margin-left:4px" onclick="enterScore(${id},${i})">입력</button></div>`;
    }else if(g.status==='pending'){
      h+=`<div style="text-align:center;font-size:14px;color:var(--gray);font-weight:700;margin-bottom:8px">${g.my} : ${g.opn} 입력됨</div>
        <button class="btn felt sm" style="width:100%" onclick="confirmScore(${id},${i})">상대 확인 (시연)</button>`;
    }
    h+=`</div>`;
  });
  const allDone=gs.every(g=>g.status==='confirmed');
  if(allDone && !m.resultDone){ h+=`<button class="btn" onclick="finishResult(${id})">결과 반영 완료</button>`; }
  else if(m.resultDone){ const w=gs.filter(g=>g.my>g.opn).length,l=gs.length-w,tot=gs.reduce((a,g)=>a+g.delta,0);
    h+=`<div style="text-align:center;font-weight:800;color:var(--coral-d)">${w}승 ${l}패 · 레이팅 ${tot>=0?'+':''}${tot}</div>`; }
  else { h+=`<div class="note">모든 경기가 상대 확인되면 결과가 반영돼요. 실제 서비스에선 상대방 앱에서 확인을 눌러요.</div>`; }
  document.getElementById('sheet').innerHTML=h;
}
function enterScore(id,i){
  const m=state.matches.find(x=>x.id===id);const g=m.games[i];
  const my=parseInt(document.getElementById('my'+i).value), op=parseInt(document.getElementById('op'+i).value);
  if(isNaN(my)||isNaN(op)){toast('점수를 입력해 주세요');return;}
  if(my===op){toast('무승부 없이 입력해 주세요');return;}
  g.my=my;g.opn=op;g.status='pending';renderResultSheet(id);
}
function confirmScore(id,i){
  const m=state.matches.find(x=>x.id===id);const g=m.games[i];
  const win=g.my>g.opn, K=state.played<5?60:28;
  g.delta=Math.round(K*((win?1:0)-expScore(state.rating,g.oppR)));
  state.rating+=g.delta; state.ratingHist.push(state.rating); g.status='confirmed';
  renderResultSheet(id); if(state.view==='me')renderMe();
  toast(`상대 확인 완료 · ${win?'승':'패'} 레이팅 ${g.delta>=0?'+':''}${g.delta} → ${state.rating}`);
}
function finishResult(id){
  const m=state.matches.find(x=>x.id===id); if(m.resultDone)return; m.resultDone=true; state.played++;
  closeOv(); renderLeague(); if(state.view==='me')renderMe();
  if(state.played===5) toast(`배치 완료! ${tierByRating(state.rating)}에 배정됐어요 (레이팅 ${state.rating})`);
  else toast(`결과 반영 완료 · 현재 레이팅 ${state.rating}`);
  setTimeout(()=>openManner(id),500);
}

function phoneLogin(){
  // 서버가 붙어 있는데 문자 발송 업체가 없으면, 가짜 인증을 통과시키지 않는다.
  if(SERVER_OK && !CFG.phone_auth){
    document.getElementById('sheet').innerHTML=`<div class="sh-top"><h3>휴대폰 인증</h3><div class="cl" role="button" tabindex="0" onclick="closeOv()">×</div></div>
      <div class="sd">휴대폰 인증은 아직 준비 중이에요. 본인확인기관 연동이 끝나면 열려요.</div>
      <div class="note" style="text-align:left">지금은 <b>이름</b>만 입력하면 바로 시작할 수 있어요.</div>
      <button class="btn" style="margin-top:14px" onclick="closeOv()">알겠어요</button>`;
    document.getElementById('ov').classList.add('on');
    return;
  }
  document.getElementById('sheet').innerHTML=`<div class="sh-top"><h3>휴대폰 번호로 시작</h3><div class="cl" role="button" tabindex="0" aria-label="닫기" onclick="closeOv()">×</div></div>
    <div class="sd">번호를 입력하면 문자로 인증번호를 보내요.</div>
    <input id="phNum" type="tel" inputmode="numeric" placeholder="010-0000-0000" style="width:100%;box-sizing:border-box;border:1.5px solid var(--line);border-radius:13px;padding:14px 16px;font-size:17px;font-family:inherit;outline:none;background:#fff;margin-bottom:10px">
    <button class="btn" onclick="phoneStep2()">인증번호 받기</button>
    <p class="sd" style="margin:14px 0 0;color:var(--lgray)">데모 — 실제 문자는 발송되지 않습니다.</p>`;
  document.getElementById('ov').classList.add('on');
  setTimeout(()=>{const e=document.getElementById('phNum');if(e)e.focus();},100);
}
function phoneStep2(){
  const v=(document.getElementById('phNum')||{}).value||'';
  if(v.replace(/[^0-9]/g,'').length<10){toast('휴대폰 번호를 입력해 주세요');return;}
  document.getElementById('sheet').innerHTML=`<div class="sh-top"><h3>인증번호 입력</h3><div class="cl" role="button" tabindex="0" aria-label="닫기" onclick="closeOv()">×</div></div>
    <div class="sd"><b>${v}</b>로 보낸 6자리 인증번호를 입력하세요.</div>
    <input id="phCode" type="tel" inputmode="numeric" placeholder="인증번호 6자리" style="width:100%;box-sizing:border-box;border:1.5px solid var(--line);border-radius:13px;padding:14px 16px;font-size:17px;font-family:inherit;outline:none;background:#fff;letter-spacing:4px;text-align:center;margin-bottom:10px">
    <button class="btn" onclick="phoneDone()">인증하고 시작</button>
    <button class="btn ghost" style="margin-top:9px" onclick="phoneLogin()">번호 다시 입력</button>
    <p class="sd" style="margin:14px 0 0;color:var(--lgray)">데모 — 아무 숫자나 입력해도 됩니다.</p>`;
  setTimeout(()=>{const e=document.getElementById('phCode');if(e)e.focus();},100);
}
function phoneDone(){
  const c=(document.getElementById('phCode')||{}).value||'';
  if(c.replace(/[^0-9]/g,'').length<4){toast('인증번호를 입력해 주세요');return;}
  closeOv(); login('phone');
}

function renderAuthReviews(){
  const tr=document.getElementById('revTrack'); if(!tr)return;
  tr.innerHTML=AUTH_REVIEWS.map(r=>`<div class="rev-card"><div class="rv-t">${r.t}</div><div class="rv-b">${r.b}</div><div class="rv-f"><div class="rv-av"></div><div class="rv-who">${r.w}</div><div class="rv-time">${r.time}</div></div></div>`).join('');
  const dd=document.getElementById('revDots'); if(dd)dd.innerHTML=AUTH_REVIEWS.map((_,i)=>`<i class="${i===0?'on':''}"></i>`).join('');
  clearInterval(window._revIv); let idx=0;
  window._revIv=setInterval(()=>{
    const auth=document.getElementById('auth'); if(!auth||!auth.classList.contains('on')){clearInterval(window._revIv);return;}
    idx=(idx+1)%AUTH_REVIEWS.length; const card=tr.children[idx];
    if(card) tr.scrollTo({left:card.offsetLeft-(tr.clientWidth-card.clientWidth)/2,behavior:'smooth'});
    updRevDots(idx);
  },3200);
}
function revScroll(){ const tr=document.getElementById('revTrack'); if(!tr)return; const cw=tr.scrollWidth/AUTH_REVIEWS.length; updRevDots(Math.max(0,Math.min(AUTH_REVIEWS.length-1,Math.round(tr.scrollLeft/cw)))); }
function updRevDots(i){ const dd=document.getElementById('revDots'); if(!dd)return; [...dd.children].forEach((d,j)=>d.classList.toggle('on',j===i)); }

/* ═══════════ 서버 연결 (Railway · server.js) ═══════════
   · 같은 도메인에서 서빙되면 자동으로 API를 씀 (public/index.html)
   · 서버가 없으면(file:// 로 열거나 /health 실패) 데모 모드로 자동 폴백
   · 카카오: JS 키를 넣으면 실제 로그인 → POST /auth/kakao 로 우리 JWT 발급  */
// 로그인 키는 서버 /config 에서 받아온다. index.html 에 적지 않는다.
// (GitHub 가 Public 이라 코드에 키를 넣으면 그대로 노출된다)
let CFG = { kakao_js_key:'', naver_client_id:'', naver_redirect_uri:'', apple_client_id:'', phone_auth:false };
let CFG_ERROR = '';
async function loadConfig(){
  if(!API_BASE) return CFG;
  try{
    // cache:'no-store' — 서비스워커와 브라우저 캐시를 모두 우회한다.
    // 여기서 옛 응답을 받으면 로그인 버튼이 영영 안 뜬다.
    const r = await fetch(API_BASE + '/config', { cache:'no-store' });
    if(!r.ok) throw new Error('HTTP '+r.status);
    CFG = await r.json();
  }catch(e){
    CFG = {};
    CFG_ERROR = String(e.message||e);
    console.error('[MATSU] /config 를 불러오지 못했습니다:', CFG_ERROR);
  }
  return CFG;
}
const API_BASE = (location.protocol==='http:'||location.protocol==='https:') ? location.origin : '';
const TOKEN_KEY = 'matsu_jwt';
let SERVER_OK = false;

function authToken(){ try{ return localStorage.getItem(TOKEN_KEY); }catch(e){ return null; } }
async function api(path, opts){
  const t = authToken();
  const ctl = new AbortController();
  const kill = setTimeout(()=>ctl.abort(), (opts&&opts.timeoutMs)||12000);   // 모바일 무한 대기 방지
  let r;
  try{
    r = await fetch(API_BASE + path, {
      ...opts, signal: ctl.signal,
      headers: { 'Content-Type':'application/json',
        ...(IS_IOS_APP?{'X-Client-Platform':'ios'}:{}),
        ...(t?{Authorization:'Bearer '+t}:{}) , ...((opts&&opts.headers)||{}) },
    });
  } catch(e){
    if(e && e.name==='AbortError') throw new Error('네트워크가 느려요 · 잠시 후 다시 시도해 주세요');
    throw e;
  } finally { clearTimeout(kill); }
  if(!r.ok) throw new Error((await r.text().catch(()=>'')) || ('HTTP '+r.status));
  return r.json();
}

/* ═══════════ 구글 로그인 (Google Identity Services) ═══════════
   구글이 서명한 credential(JWT)을 서버로 보내면, 서버가 구글 공개키로
   서명을 검증한다. 클라이언트에서 검증하면 위조를 못 막는다. */
let _gsiDone = false;
function gsiReady(){
  return typeof google!=='undefined' && google.accounts && google.accounts.id;
}
/* GIS 스크립트는 async defer 라 늦게 도착한다.
   한 번 보고 없다고 포기하면 버튼이 영영 안 뜬다. 최대 10초간 기다린다. */
let _gsiTries = 0;
function initGoogleWhenReady(){
  if(_gsiDone || !SERVER_OK || !CFG.google_client_id) return;
  if(gsiReady()){ initGoogle(); return; }
  if(_gsiTries++ > 50){                        // 200ms × 50 = 10초
    const fb = document.getElementById('authFallback');
    if(fb && !CFG.kakao_js_key){
      fb.innerHTML = `<div class="note" style="margin-top:12px;text-align:left;color:#b3261e">

/* 공용 헬퍼 */
function esc(t){ return String(t==null?'':t)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function timeAgo(ms){
  const d = Date.now() - (+ms||0);
  if(d < 60e3) return '방금';
  if(d < 3600e3) return Math.floor(d/60e3)+'분 전';
  if(d < 86400e3) return Math.floor(d/3600e3)+'시간 전';
  if(d < 7*86400e3) return Math.floor(d/86400e3)+'일 전';
  const t = new Date(+ms);
  return `${t.getMonth()+1}.${String(t.getDate()).padStart(2,'0')}`;
}

/* 카카오: SDK → access_token → 서버가 검증 후 우리 JWT 발급 */
/* 카카오 JS SDK v2 에는 Kakao.Auth.login(팝업) 이 없다. v1 에서 삭제됐다.
   v2 는 authorize() 로 페이지를 이동시키고, redirectUri 로 ?code=... 를 돌려준다.
   그 code 를 서버가 REST 키로 토큰과 교환한다 (POST /auth/kakao/code). */
function kakaoLogin(){
  if(!SERVER_OK) throw new Error('server_down');
  if(!CFG.kakao_js_key) throw new Error('no_kakao_key');
  if(typeof Kakao==='undefined') throw new Error('no_kakao_sdk');
  if(!Kakao.isInitialized()) Kakao.init(CFG.kakao_js_key);
  try{ sessionStorage.setItem('oauth_provider','kakao'); }catch(e){}
  Kakao.Auth.authorize({ redirectUri: CFG.kakao_redirect_uri || (location.origin + '/') });
}
/* 카카오가 ?code=... 를 달고 돌려보냈을 때 */
async function handleKakaoCallback(code){
  try{
    saveSession(await api('/auth/kakao/code', {method:'POST', body: JSON.stringify({code})}));
    history.replaceState({}, '', location.pathname);
    toast('카카오로 로그인했어요');
    return true;
  }catch(e){
    const m = String(e.message||'');
    console.error('[MATSU] 카카오 로그인 실패:', m);
    let msg = '카카오 로그인에 실패했어요';
    if(m.includes('missing_code_or_env'))        msg = '서버에 카카오 REST 키가 없어요';
    else if(m.includes('KOE006'))                msg = '카카오 콘솔에 Redirect URI 가 등록되지 않았어요';
    else if(m.includes('KOE320'))                msg = '인증 코드가 만료됐어요 · 다시 시도해 주세요';
    else if(m.includes('invalid_client'))        msg = 'REST API 키가 틀렸어요';
    else if(m.includes('token_exchange_failed')) msg = `카카오가 거절했어요 · ${m.slice(0,90)}`;
    toast(msg);
    history.replaceState({}, '', location.pathname);
    return false;
  }
}
/* 서버는 살아있지만 카카오 키가 없을 때 — 실제 DB 계정 생성 */
/* 네이버는 SDK 없이 표준 OAuth 리다이렉트를 쓴다.
   ① 동의창으로 이동 → ② 네이버가 ?code=..&state=.. 로 돌려보냄 → ③ 서버가 교환 */
function naverAuthUrl(){
  const st = Math.random().toString(36).slice(2);
  try{ sessionStorage.setItem('naver_state', st); }catch(e){}
  const redirect = CFG.naver_redirect_uri || (location.origin + '/');
  const q = new URLSearchParams({ response_type:'code', client_id:CFG.naver_client_id,
    redirect_uri:redirect, state:st });
  return 'https://nid.naver.com/oauth2.0/authorize?' + q;
}
function naverLogin(){
  try{ sessionStorage.setItem('oauth_provider','naver'); }catch(e){}
  location.href = naverAuthUrl();
}
/* 페이지가 code 를 달고 돌아왔을 때 처리 */
async function handleNaverCallback(){
  const u = new URL(location.href);
  const code = u.searchParams.get('code'), st = u.searchParams.get('state');
  if(!code) return false;
  let saved = null;
  try{ saved = sessionStorage.getItem('naver_state'); }catch(e){}
  if(saved && st !== saved){ toast('로그인 검증에 실패했어요'); return false; }
  try{
    const d = await api('/auth/naver', {method:'POST', body: JSON.stringify({code, state:st})});
    saveSession(d);
    history.replaceState({}, '', location.pathname);   // 주소창에서 code 제거
    toast('네이버로 로그인했어요');
    return true;
  }catch(e){ toast('네이버 로그인에 실패했어요'); return false; }
}

/* ═══════════ 대진 서버 동기화 ═══════════
   저장 형태: data = { fmt, cfg, attendees }

let CLUB_IDS = {};          // 클럽 이름 → 서버 id

/* 서버에 내 클럽이 있으면 앱의 클럽을 그것으로 교체한다.
   (이름으로만 매칭하면, 사용자가 만든 클럽 이름이 데모 클럽과 달라
    clubId()가 null → 조용히 데모로 떨어지는 문제가 있었다) */
async function adoptServerClubs(){
  let mine=[];
  try{ mine = await api('/me/clubs'); }catch(e){ return; }
  const active = mine.filter(c=>!c.status || c.status==='active');
  if(!active.length) return;
  state.clubStatus = state.clubStatus||{}; state.clubData = state.clubData||{};
  active.forEach(c=>{
    CLUB_IDS[c.name] = c.id;
    if(!state.clubs.some(x=>x.n===c.name)){
      state.clubs.unshift({n:c.name, r:c.region||'', m:c.member_count||1, ic:SP().ic, sport:c.sport||state.sport,
        entry:c.entry_fee, season:c.season_fee, guestFee:c.guest_fee, guestReq:c.guest_cap});
    }
    if(state.clubStatus[c.name]!=='member') approveMember(c.name);
    const d = state.clubData[c.name];
    if(d){ d.officer = (c.role==='owner'||c.role==='officer'); d.members = c.member_count||d.members; d.region = c.region||d.region; }
  });
  state.myClubs = active.map(c=>c.name);
  state.activeClub = active[0].name;
  state.bcfg.role = (active[0].role==='owner'||active[0].role==='officer') ? 'officer' : 'member';
  // 신청 대기 중인 클럽 표시
  mine.filter(c=>c.status==='pending').forEach(c=>{ CLUB_IDS[c.name]=c.id; state.clubStatus[c.name]='pending'; });
}

function bkApplyLive(scores, timers){

/* 앱 → 서버 */
async function bkPush(publish){
  const cid = clubId();
  if(!SERVER_OK || !cid) return null;
  const b = state.bcfg;
  // renderBracket 이 실제로 편성에 쓴 명단을 그대로 저장해야 회원 기기에서 동일 대진이 재현된다
  // reg(코트별 4인 배정)를 같이 저장한다. 시즌 리포트가 과거 대진을 다시 생성하지 않아도 되게.
  const reg = ((state.bk && state.bk.reg) || []).map(c => ({ key: c.key, names: c.names }));
  const data = { fmt: state.bracketFmt, attendees: (state._roster||[]).slice(), reg,
    cfg: {people:b.people, courts:b.courts, date:b.date, lateNames:[...b.lateNames], lateAfter:b.lateAfter, seed:b.seed, hanulMode:b.hanulMode} };
  const r = await api(`/clubs/${cid}/brackets`, {method:'POST', body: JSON.stringify({
    sport: state.sport, fmt: state.bracketFmt, date: b.date, courts: b.courts, data, publish: publish?1:0 })});
  BK_ID = r.id;
  return r;
}
function bkSyncScore(key){
  if(!SERVER_OK || !BK_ID) return;
  clearTimeout(_scoreDebounce[key]);
  _scoreDebounce[key] = setTimeout(async ()=>{
    const v = state.bcfg.scores[key] || {};
    const a = v.a==='' || v.a===undefined ? null : +v.a;
    const bb = v.b==='' || v.b===undefined ? null : +v.b;
    try{ await api(`/brackets/${BK_ID}/scores/${encodeURIComponent(key)}`, {method:'PUT', body: JSON.stringify({a, b:bb})}); }

/* 폴링 — 다른 사람이 넣은 점수·타이머 반영 */
function bkStopPoll(){ if(BK_POLL){ clearInterval(BK_POLL); BK_POLL=null; } }
function bkStartPoll(){
  bkStopPoll();
  if(!SERVER_OK || !BK_ID) return;
  BK_POLL = setInterval(async ()=>{
    if(state.view!=='bracket'){ bkStopPoll(); return; }
    if(document.activeElement && document.activeElement.classList.contains('sc-in')) return;  // 입력 중엔 건드리지 않음
    try{
      const l = await api(`/brackets/${BK_ID}/live`);
      if(l.updated_at === BK_SEEN) return;
      BK_SEEN = l.updated_at;
      bkApplyLive(l.scores, l.timers);
      renderBracket();
    }catch(e){}
  }, 4000);
}

/* ═══════════ 클럽 일정 · 참석 · 가입 승인 (서버) ═══════════ */
let SRV_EVENT = null;       // 최신 일정 {id,title,date,count,attendees,joined}
let SRV_EVENTS = [];        // 전체 일정 목록 (이번 주 일정 카드용)
let SRV_MYSTATUS = null;    // {role,status}

async function loadClubServer(){
  const cid = clubId();
  if(!SERVER_OK || !cid){ SRV_EVENT=null; SRV_MYSTATUS=null; return false; }
  const c = AC(); if(!c) return false;
  try{
    const [evs, ms] = await Promise.all([
      api(`/clubs/${cid}/events`).catch(()=>[]),
      api(`/clubs/${cid}/my-status`).catch(()=>null),
    ]);
    SRV_MYSTATUS = ms;
    SRV_EVENTS = evs || [];
    SRV_EVENT = SRV_EVENTS[0] || null;
    if(SRV_EVENT){
      c.schedule.dt = SRV_EVENT.date || SRV_EVENT.title;
      c.schedule.attendees = SRV_EVENT.attendees || [];
      c.schedule.attend = SRV_EVENT.joined ? true : c.schedule.attend;
      c.schedule.eventId = SRV_EVENT.id;
    }
    if(ms && ms.role) state.bcfg.role = (ms.role==='owner'||ms.role==='officer') ? 'officer' : 'member';
    return true;
  }catch(e){ return false; }
}

/* 참석 토글 */

/* ═══════════ 실제 회원 명단 (서버) ═══════════
   GET /clubs/:id/roster → 이번 모임 참석자(일정이 있으면) 또는 활성 회원 전원
   이름·성별·등급을 그대로 앱 상태에 반영해 대진 편성에 쓴다.                */
let SRV_ROSTER = null;      // [{user_id,name,gender,grade,is_captain}]
let SRV_UID = {};           // 이름 → user_id

(function(){ // 서버 로그인 상태면 안읽음 배지 폴링 시작 (지연 시작으로 부팅 간섭 없음)
  setTimeout(()=>{ try{ if(SERVER_OK && authToken()) startUnreadPoll(); }catch(e){} }, 3000);
})();
async function loadRoster(){
  const cid = clubId();
  if(!SERVER_OK || !cid){ SRV_ROSTER=null; return false; }
  try{
    const r = await api(`/clubs/${cid}/roster`);
    const ms = (r.members||[]).filter(m=>m.name);
    if(!ms.length){ SRV_ROSTER=null; return false; }
    SRV_ROSTER = ms; SRV_UID = {};
    state._rosterEventBased = !!r.event_id;
    const c = AC(); if(!c) return false;
    c.grades = c.grades || {}; c.genders = c.genders || {};
    ms.forEach(m=>{
      if(m.user_id) SRV_UID[m.name] = m.user_id;
      if(m.grade) c.grades[m.name] = m.grade;
      if(m.gender) c.genders[m.name] = (m.gender==='여성'||m.gender==='F') ? 'F' : 'M';
    });
    c.schedule.attendees = ms.map(m=>m.name);
    c.m = ms.length;
    return true;
  }catch(e){ SRV_ROSTER=null; return false; }
}
/* 등급 변경 → 서버 저장 (임원진) */
async function pushGrades(){
  const cid = clubId(); const c = AC();
  if(!SERVER_OK || !cid || !c || state.bcfg.role!=='officer') return;
  const grades = {};
  Object.entries(c.grades||{}).forEach(([nm,g])=>{ if(SRV_UID[nm]) grades[SRV_UID[nm]] = g; });
  if(!Object.keys(grades).length) return;
  try{ await api(`/clubs/${cid}/grades`, {method:'PATCH', body: JSON.stringify({grades})}); }
  catch(e){ if(String(e.message).includes('officer_only')) toast('등급 설정은 임원진만 가능해요'); }
}

async function openHistory(){

            <div class="ex-v" style="color:${win?'#2f9159':'#cf5418'}">${x.myW+x.myL?`${x.myW}승 ${x.myL}패`:'미참여'}</div></div></div>`; });

  h+=`<div class="card" style="margin:0 0 12px;padding:14px;display:flex;justify-content:space-around;text-align:center">
    <div><div style="font-size:20px;font-weight:900">${c.history.length}</div><div style="font-size:11px;color:var(--gray);font-weight:600">참여 모임</div></div>

async function cycleCourtSrv(id, cur){

  catch(e){ toast('임원진만 바꿀 수 있어요'); }
  openCourtBook();
}
async function addCourtSrv(){

  try{ await api(`/clubs/${clubId()}/courts`,{method:'POST',body:JSON.stringify({label:l.trim(), detail:d.trim()})}); }
  catch(e){ toast('추가하지 못했어요'); }

async function delCourtSrv(id){

}
function cycleCourt(i){ const c=AC(); const order=['open','requested','booked']; const cur=c.courtSlots[i].st; c.courtSlots[i].st=order[(order.indexOf(cur)+1)%3]; openCourtBook(); }

function recommendClubs(){
  const my=state.activeClub;
  const myRow=state.clubStandings.find(c=>c.n===my);
  const div=myRow?myRow.div:'2부';
  return state.clubStandings
    .filter(c=>c.n!==my && c.div===div)
    .map(c=>({...c, wr: c.p?Math.round(c.w/c.p*100):50}))
    .sort((a,b)=>Math.abs(a.pt-(myRow?myRow.pt:10))-Math.abs(b.pt-(myRow?myRow.pt:10)));
}

function smartOpponents(){
  const me = state.rating, gd = state.gender || '남자부';
  if(SERVER_OK){
    const myId = (state.serverUser||{}).id;
    return PEOPLE
      .filter(p => p.id !== myId)
      .map(p => ({ n:p.n, id:p.id, r:p.rating||1000, reg:p.region||'', gd,
                   note: Math.abs((p.rating||1000)-me) <= 60 ? '실력 비슷' : '한 단계 위 도전 상대' }))
      .sort((a,b) => Math.abs(a.r-me) - Math.abs(b.r-me))
      .slice(0,3);
  }
  return [
    {n:'이준호',r:me+22,reg:'경기 용인',gd,note:'실력 비슷 · 같은 지역'},
    {n:'서지민',r:me-15,reg:'경기 용인',gd,note:'최근 폼 상승 · 좋은 매너'},
    {n:'한지웅',r:me+41,reg:'경기 용인',gd,note:'한 단계 위 도전 상대'},
  ];
}

const CHAL_DAILY = 3;
function challengePlayer(n){
  const today=new Date().toDateString();
  if(state._chalDay!==today){ state._chalDay=today; state._chalN=0; }
  if(state._chalN>=CHAL_DAILY){ toast(`도전 신청은 하루 ${CHAL_DAILY}번까지예요 · 내일 다시 시도해 주세요`); return; }
  state._chalN++;
  closeOv(); pushNotif('⚔️','도전 신청을 보냈어요',`${n}님의 수락을 기다리고 있어요`);
  toast(`도전을 신청했어요 · 오늘 ${CHAL_DAILY-state._chalN}번 남음`);
}
async function challengePlayerSrv(uid, name){
  const today=new Date().toDateString();
  if(state._chalDay!==today){ state._chalDay=today; state._chalN=0; }
  if(state._chalN>=CHAL_DAILY){ toast(`도전 신청은 하루 ${CHAL_DAILY}번까지예요`); return; }
  try{
    await api('/matches',{method:'POST',body:JSON.stringify({sport:state.sport||'tennis', kind:'singles', away_user_id:uid})});
    state._chalN++;
    closeOv(); toast(`${name} 님에게 도전을 신청했어요 · 상대에게 알림이 갔어요`);
    if(state.view==='match') renderMatch();
  }catch(e){ toast('신청하지 못했어요 · 잠시 후 다시 시도해 주세요'); }
}

function timeAgo(t){
  if(!t) return '';
  const s = Math.max(0, Date.now()-t);
  if(s<60e3) return '방금'; if(s<3600e3) return Math.floor(s/60e3)+'분 전';
  if(s<86400e3) return Math.floor(s/3600e3)+'시간 전';
  return Math.floor(s/86400e3)+'일 전';
}

function tierMeta(r){

async function openSportProfile(){
  const sp = SP(), meta = SM();
  let saved = {};
  if(SERVER_OK){ try{ saved = (await api('/me/sport-profile'))[sp.id] || {}; }catch(e){} }
  else { saved = (state.sportProfile||{})[sp.id] || {}; }

  const row = f => {
    if(f.opts){
      return `<div class="fld"><label>${f.label}</label>
        <select id="sp_${f.k}">
          <option value="">선택 안 함</option>
          ${f.opts.map(o=>`<option value="${o}" ${saved[f.k]===o?'selected':''}>${o}</option>`).join('')}
        </select></div>`;
    }
    return `<div class="fld"><label>${f.label}</label>
      <input id="sp_${f.k}" ${f.type==='number'?'inputmode="numeric"':''}
        placeholder="${f.placeholder||''}" value="${esc(saved[f.k]||'')}"></div>`;
  };

  document.getElementById('sheet').innerHTML=`

      ? '입력하면 <b>선수 비교</b>와 매칭에 쓰여요.'
      : '입력하면 팀 편성과 모임 추천에 쓰여요.'}</div>
    <div class="fld"><label>출생 연도</label>
      <input id="sp_birth" inputmode="numeric" maxlength="4" placeholder="예) 1994" value="${esc(saved.birth||'')}"></div>
    ${meta.fields.map(row).join('')}
    <button class="btn" style="margin-top:6px" onclick="saveSportProfile()">저장</button>`;
  document.getElementById('ov').classList.add('on');
}
async function saveSportProfile(){
  const sp = SP(), meta = SM();
  const val = k => ((document.getElementById('sp_'+k)||{}).value||'').trim();
  const body = { birth: val('birth') };
  meta.fields.forEach(f => { body[f.k] = val(f.k); });
  if(body.birth && !/^(19|20)\d{2}$/.test(body.birth)){ toast('출생 연도를 네 자리로 입력해 주세요'); return; }

  if(SERVER_OK){
    try{ await api(`/me/sport-profile/${sp.id}`,{method:'PUT',body:JSON.stringify(body)}); }
    catch(e){ toast('저장하지 못했어요'); return; }
  }else{
    state.sportProfile = state.sportProfile||{}; state.sportProfile[sp.id]=body;
  }
  toast(`${sp.n} 정보를 저장했어요`); closeOv();
  if(state.view==='me') renderMe();
}

(function(){

  let y0=null, pulled=0, spin=null;
  sc.addEventListener('touchstart', e=>{ y0 = sc.scrollTop<=0 ? e.touches[0].clientY : null; pulled=0; }, {passive:true});

/* 사진 고르기 → 서버에 올리고 URL 을 받는다.
   base64 를 그대로 글에 넣으면 DB 가 순식간에 부풀어 오른다. */
/* 사진을 긴 변 1600px, JPEG 품질 0.82 로 줄인다.
   폰 사진은 4~8MB 라 그대로 올리면 서버 한도에 걸리고, 회원들 데이터도 축낸다. */
async function shrinkImage(file, maxSide=1600, quality=0.82){
  const bmp = await createImageBitmap(file).catch(()=>null);
  if(!bmp){                                        // 지원 안 하는 브라우저 → 원본
    return await new Promise((ok,ng)=>{ const r=new FileReader(); r.onload=()=>ok(r.result); r.onerror=ng; r.readAsDataURL(file); });
  }
  const scale = Math.min(1, maxSide / Math.max(bmp.width, bmp.height));
  const w = Math.round(bmp.width*scale), h = Math.round(bmp.height*scale);
  const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
  cv.getContext('2d').drawImage(bmp, 0, 0, w, h);
  bmp.close && bmp.close();
  const url = cv.toDataURL('image/jpeg', quality);
  // 그래도 크면 품질을 더 낮춘다
  return url.length > 4_000_000 ? cv.toDataURL('image/jpeg', 0.6) : url;
}

function _rng(seed){let x=seed*9301+49297;return ()=>{x=(x*9301+49297)%233280;return x/233280;};}
function buildClubSchedule(players,courts,lateNames,lateAfter,seed,opts){
  const GAMES=4; const n=players.length; if(n<2) return {rounds:[],gc:[],type:'none',rcount:0,helper:0};
  const dbl=n>=4; const per=dbl?4:2;
  const mpr=Math.max(1,Math.min(courts,Math.floor(n/per)));
  // 헬퍼: 출전 가능 인원이 코트를 못 채우거나 균등이 안 맞을 때 필요한 자리
  const rem=n%per; const helper=(dbl&&rem!==0)?(per-rem):0;
  const startR=Array(n).fill(0);
  (lateNames||[]).forEach(nm=>{const i=players.indexOf(nm); if(i>=0) startR[i]=Math.max(0,lateAfter||0);});
  const gc=Array(n).fill(0);
  const pc={}; const pk=(a,b)=>a<b?a+'-'+b:b+'-'+a;
  const rnd=_rng((n*7+courts*13+(seed||1)*101+1));
  const sched=[]; let guard=0;
  // 모두 4게임 채울 때까지 라운드 생성 (안전장치 14R)
  while(guard<14){
    const elig=[]; for(let i=0;i<n;i++) if(startR[i]<=guard) elig.push(i);
    elig.sort((a,b)=> gc[a]-gc[b] || rnd()-0.5);
    const cap=mpr*per;
    let playing=elig.slice(0,Math.min(cap, Math.floor(elig.length/per)*per));
    if(opts&&opts.levelSort&&opts.grades){ playing=[...playing].sort((a,b)=> gradeRank(opts.grades[players[a]]||'B')-gradeRank(opts.grades[players[b]]||'B')); }
    const waiting=elig.filter(i=>!playing.includes(i));
    const courtsArr=[];
    for(let ci=0; ci<playing.length; ci+=per){
      const grp=playing.slice(ci,ci+per); let t1,t2;
      if(dbl){
        const combos=[[[grp[0],grp[1]],[grp[2],grp[3]]],[[grp[0],grp[2]],[grp[1],grp[3]]],[[grp[0],grp[3]],[grp[1],grp[2]]]];
        let best=combos[0],bs=1e9;
        combos.forEach(cm=>{const cost=(pc[pk(cm[0][0],cm[0][1])]||0)+(pc[pk(cm[1][0],cm[1][1])]||0);if(cost<bs){bs=cost;best=cm;}});
        t1=best[0];t2=best[1];
        pc[pk(t1[0],t1[1])]=(pc[pk(t1[0],t1[1])]||0)+1; pc[pk(t2[0],t2[1])]=(pc[pk(t2[0],t2[1])]||0)+1;
      } else { t1=[grp[0]]; t2=[grp[1]]; }
      grp.forEach(i=>gc[i]++); courtsArr.push({t1,t2});
    }
    sched.push({courts:courtsArr,waiting});
    guard++;
    if(Math.min(...gc.filter((_,i)=>startR[i]<=guard||startR[i]<guard))>=GAMES && gc.every((v,i)=>startR[i]>guard||v>=GAMES)) break;
    if(Math.min(...gc)>=GAMES) break;
  }
  return {rounds:sched,gc,type:dbl?'double':'single',mpr,rcount:sched.length,helper,GAMES};
}
function buildBW(roster,courts,seed,lateNames,lateAfter){
  const n=roster.length; if(n<4) return {blue:[],white:[],capB:null,capW:null,rounds:[],mpr:0,R:0};
  const rnd=_rng((seed||1)*131+n*7+courts*5+3);
  // 균형 팀 분할: 섞은 뒤 짝/홀로 청/백
  const idx=[...Array(n).keys()].sort(()=>rnd()-0.5);
  const blue=[],white=[]; idx.forEach((pi,k)=>{(k%2?white:blue).push(roster[pi]);});
  // 팀장 무작위
  const capB=blue[Math.floor(rnd()*blue.length)], capW=white[Math.floor(rnd()*white.length)];
  // 늦참 합류 라운드
  const startR={}; (lateNames||[]).forEach(nm=>{startR[nm]=Math.max(0,lateAfter||0);});
  const mpr=Math.max(1,Math.min(courts,Math.floor(Math.min(blue.length,white.length)/2)));
  // 4게임 보장 라운드 수
  const gcB={},gcW={}; blue.forEach(nm=>gcB[nm]=0); white.forEach(nm=>gcW[nm]=0);
  const rounds=[]; let r=0;
  while(r<14){
    const availB=blue.filter(nm=>(startR[nm]||0)<=r).sort((a,b)=>gcB[a]-gcB[b]||rnd()-0.5);
    const availW=white.filter(nm=>(startR[nm]||0)<=r).sort((a,b)=>gcW[a]-gcW[b]||rnd()-0.5);
    const useC=Math.max(0,Math.min(mpr,Math.floor(availB.length/2),Math.floor(availW.length/2)));
    const playB=availB.slice(0,useC*2), playW=availW.slice(0,useC*2);
    const cs=[];
    for(let ci=0;ci<useC;ci++){ cs.push({b:[playB[ci*2],playB[ci*2+1]],w:[playW[ci*2],playW[ci*2+1]]}); }
    playB.forEach(nm=>gcB[nm]++); playW.forEach(nm=>gcW[nm]++);
    rounds.push({courts:cs, waitB:availB.slice(useC*2), waitW:availW.slice(useC*2)});
    r++;
    const allB=blue.every(nm=>(startR[nm]||0)>r||gcB[nm]>=4), allW=white.every(nm=>(startR[nm]||0)>r||gcW[nm]>=4);
    if(allB&&allW && r>=4) break;
  }
  return {blue,white,capB,capW,rounds,mpr,R:rounds.length};
}
function clubSeasonStats(players,q){
  const qseed={'1분기':11,'2분기':29,'연간':47}[q]||47;
  const yearMul=q==='연간'?2.2:1;
  return players.map((nm,i)=>{
    const rnd=_rng(qseed*131+i*17+nm.length*7);
    const days=Math.max(1,Math.round((2+rnd()*4)*yearMul));
    let g=0,w=0,l=0,sc=0,cc=0,pts=0;
    for(let dd=0; dd<days; dd++){
      const dg=3+Math.floor(rnd()*2); // 그날 3~4경기
      let dw=0;
      for(let x=0;x<dg;x++){ const ms=4+Math.floor(rnd()*3), os=Math.floor(rnd()*6);
        const win=(nm==='곽주영'?rnd()<0.6:rnd()<0.5);
        if(win){w++;dw++;sc+=6;cc+=os%6;} else {l++;sc+=os%5;cc+=6;}
        g++; }
      pts += [40,60,80,100][Math.min(dw,3)] + dw*10;
    }
    return {nm,g,w,l,sc,cc,days,pts,gd:sc-cc,wr:w+l?Math.round(w/(w+l)*100):0,avg:days?Math.round(pts/days*10)/10:0};
  });
}

/* ═══════════ 한울 대진 (Termes genHanulBracket 이식) ═══════════
   실력별과 다름: 등급으로 "나누지" 않고, 실력 스네이크로 조 전력을 "고르게 맞춘다".
   · 참석자를 등급 내림차순 정렬 → 코트 수만큼의 조에 스네이크(지그재그) 배분
     → 각 조의 실력 합이 비슷해짐 (조 안은 A·B·C가 섞임)
   · 각 조는 배정된 코트에 고정, 조원끼리만 4게임씩
   · 매 게임 4명 선발(경기 수 적은 순) → 3가지 팀 분할 중
     파트너 중복 + 상대 중복 + 실력차가 최소인 조합 선택
   · 큰 조를 앞 코트로 (늦게 끝나는 조가 코트를 오래 씀)                       */
const HANUL_GAMES = 4;
function hanulScore(g){ return g==='A'?3 : g==='C'?1 : 2; }

function buildHanul(roster, courts, grades, seed, genders, opts){
  const T = roster.length;
  if(T < 4) return {groups:[], games:[], types:[], sizes:[], gmix:[], maxDup:0};
  const GD = genders || {};
  const O = opts||{};
  const lateSet = new Set(O.lateNames||[]);
  const lateAfter = Math.max(0, O.lateAfter||0);
  const mode = O.mode==='level' ? 'level' : 'balance';
  const rnd = _rng((seed||1)*211 + T*17 + courts*29);
  const numGroups = Math.min(courts, Math.max(1, Math.floor(T/4)));
  const isLate = i => lateSet.has(roster[i]);

  const bySkill = arr => arr.sort((a,b)=> hanulScore(grades[roster[b]]) - hanulScore(grades[roster[a]]) || rnd()-0.5);
  let groups;
  if(mode==='level'){
    // ① 실력별(인접 등급): 실력 내림차순 연속 슬라이스 → A↔C가 같은 코트에 오지 않음 (경계에서 인접 등급만 허용)
    const all = bySkill([...Array(T).keys()]);
    const sizes = Array.from({length:numGroups}, (_,g)=> Math.floor(T/numGroups) + (g < T%numGroups ? 1 : 0));
    groups=[]; let p=0;
    sizes.forEach(sz=>{ groups.push(all.slice(p,p+sz)); p+=sz; });
  } else {
    // ① 전력 균형: 실력 스네이크 — 남자 먼저, 이어서 여자 (조 전력·성비 동시 균형)
    const men = bySkill([...Array(T).keys()].filter(i=>GD[roster[i]]!=='F'));
    const women = bySkill([...Array(T).keys()].filter(i=>GD[roster[i]]==='F'));
    groups = Array.from({length:numGroups}, ()=>[]);
    let gi=0, dir=1;
    const put = idx => { groups[gi].push(idx); gi+=dir;
      if(gi<0){ gi=0; dir=1; } else if(gi>=numGroups){ gi=numGroups-1; dir=-1; } };
    men.forEach(put); women.forEach(put);
  }
  // ② 큰 조를 앞 코트로
  groups.sort((a,b)=> b.length-a.length);
  // ②-1 늦참자 분산: 정시 인원이 4명 미만인 조가 생기면, 정시 인원이 넉넉한 조와 같은 성별끼리 교환
  if(lateSet.size){
    for(let pass=0; pass<groups.length*2; pass++){
      const onTime = groups.map(g=>g.filter(i=>!isLate(i)).length);
      const need = onTime.findIndex(v=>v<4);
      if(need<0) break;
      let from=-1, best=-1;
      onTime.forEach((v,g)=>{ if(g!==need && v>4 && v>best){ best=v; from=g; } });
      if(from<0) break;
      const lateIdx = groups[need].find(i=>isLate(i));
      const swapIn = groups[from].find(i=>!isLate(i) && GD[roster[i]]===GD[roster[lateIdx]])
                  ?? groups[from].find(i=>!isLate(i));
      if(lateIdx===undefined || swapIn===undefined) break;
      groups[need][groups[need].indexOf(lateIdx)] = swapIn;
      groups[from][groups[from].indexOf(swapIn)] = lateIdx;
    }
  }

  // ③ 조별 4게임 편성 — 혼복/남복/여복 자동 판정, 파트너·상대 중복 최소화
  const pk=(a,b)=> a<b ? a+'_'+b : b+'_'+a;
  const isF = i => GD[roster[i]]==='F';
  const pu={}, ou={};
  const gameSoFar = {}; groups.flat().forEach(i=>gameSoFar[i]=0);
  const games = groups.map(()=>[]);
  const types = groups.map(()=>[]);

  groups.forEach((grp, g)=>{
    if(grp.length < 4) return;
    let guard=0, maxG=grp.length + 8;
    while(grp.some(i=>gameSoFar[i] < HANUL_GAMES) && guard < maxG){
      guard++;
      const kNow = games[g].length;
      const elig = grp.filter(i=>gameSoFar[i] < HANUL_GAMES && (!isLate(i) || kNow >= lateAfter))
                      .sort((a,b)=> gameSoFar[a]-gameSoFar[b] || rnd()-0.5);
      if(elig.length < 4) break;
      let four = elig.slice(0,4);
      // 여자 수가 홀수면 뒤쪽 한 명을 바꿔 짝수로 (혼복 성립 · 1명 혼성 방지)
      if(four.filter(isF).length % 2 === 1 && elig.length > 4){
        const swapIn = elig.slice(4).find(i=> isF(i)!==isF(four[3]));
        if(swapIn!==undefined) four[3]=swapIn;
      }
      const fN = four.filter(isF).length;
      const type = fN===2 ? '혼복' : fN===4 ? '여복' : fN===0 ? '남복' : '복식';

      let cands;
      if(type==='혼복'){
        // 각 팀 남+여 고정, 파트너 조합 2가지
        const F=four.filter(isF), M=four.filter(i=>!isF(i));
        cands = [ [M[0],F[0],M[1],F[1]], [M[0],F[1],M[1],F[0]] ];
      } else {
        const s = four.slice().sort((a,b)=> hanulScore(grades[roster[b]]) - hanulScore(grades[roster[a]]));
        cands = [ [s[0],s[3],s[1],s[2]], [s[0],s[1],s[2],s[3]], [s[0],s[2],s[1],s[3]] ];
      }
      const court = cands.map(cc=>({cc, cost:
          (pu[pk(cc[0],cc[1])]||0) + (pu[pk(cc[2],cc[3])]||0)
        + ((ou[pk(cc[0],cc[2])]||0)+(ou[pk(cc[0],cc[3])]||0)+(ou[pk(cc[1],cc[2])]||0)+(ou[pk(cc[1],cc[3])]||0)) * 0.5
        + Math.abs((hanulScore(grades[roster[cc[0]]])+hanulScore(grades[roster[cc[1]]]))
                 - (hanulScore(grades[roster[cc[2]]])+hanulScore(grades[roster[cc[3]]])))
        })).sort((a,b)=>a.cost-b.cost)[0].cc;

      pu[pk(court[0],court[1])] = (pu[pk(court[0],court[1])]||0)+1;
      pu[pk(court[2],court[3])] = (pu[pk(court[2],court[3])]||0)+1;
      for(const a of [court[0],court[1]]) for(const b of [court[2],court[3]]) ou[pk(a,b)]=(ou[pk(a,b)]||0)+1;

      games[g].push(court);
      types[g].push(type);
      four.forEach(x=>gameSoFar[x]++);
    }
  });

  const dupVals = Object.values(pu);
  return {
    groups, games, types,
    sizes: groups.map(g=>g.length),
    gmix: groups.map(g=>({m:g.filter(i=>!isF(i)).length, f:g.filter(isF).length})),
    maxDup: dupVals.length ? Math.max(...dupVals) : 0,
    gc: gameSoFar,
  };
}

/* ════════════════════════════════════════════════════════════════
   결제 라우팅 — 애플 App Store Review Guideline 3.1.1 대응

   [디지털 상품] 앱 안에서 소비되는 것 → 반드시 애플 IAP
     · M캐쉬 충전       (소모성 IAP)
     · 클럽 프리미엄     (자동 갱신 구독)
   [실물/오프라인 서비스] IAP 대상 아님 → 앱에서 결제하지도 않음
     · 회비, 게스트비    (앱은 장부만. 돈은 클럽 계좌로)

   iOS 앱 빌드(IS_IOS_APP)에서는 IAP가 붙기 전까지 디지털 상품
   판매 UI를 '조용히' 숨긴다. 웹 결제로 유도하는 문구·링크를 남기면
   3.1.1 위반(안티 스티어링)으로 반려된다. 한국 스토어프론트는
   미국과 달리 외부 링크 예외가 적용되지 않는다.
   ════════════════════════════════════════════════════════════════ */
const IS_IOS_APP = (()=>{
  try{
    if(window.Capacitor && Capacitor.getPlatform && Capacitor.getPlatform()==='ios') return true;
    if(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.matsuNative) return true;
  }catch(e){}
  return false;
})();
const IAP_READY = false;   // 애플 IAP 연동을 마치면 true
// PG/IAP 가 붙기 전에는 유료 상품을 팔지 않는다. 서버도 402 로 막는다.
// 결제가 열리면 이 값을 false 로 바꾼다.
const PAY_PENDING = true;

async function claimRef(){

async function watchAd(){

}

async function openClubPremium(){
  const cid=clubId(); if(!SERVER_OK||!cid){ toast('서버 연결이 필요해요'); return; }
  let p={}, my=null;
  try{ [p,my]=await Promise.all([api(`/clubs/${cid}/premium`), api(`/clubs/${cid}/my-status`)]); }catch(e){ return; }
  const owner = my && my.role==='owner';
  const until = p.premium_until ? new Date(p.premium_until).toLocaleDateString('ko-KR') : null;
  let h=`<div class="sh-top"><h3>클럽 프리미엄</h3><div class="cl" role="button" tabindex="0" onclick="closeOv()">×</div></div>`;
  if(p.premium){
    h+=`<div class="prm-hero on"><div class="prm-b">${ic('crown',15,'#a5750d')} 이용 중</div>
      <div class="prm-t">${state.activeClub}</div><div class="prm-d">${until} 까지</div></div>`;
  } else if(canSellDigital() && (DEMO || !PAY_PENDING)){
    h+=`<div class="prm-hero"><div class="prm-t">월 ${p.price.toLocaleString()}원</div>
      <div class="prm-d">회원 ${p.members}명이면 1인당 ${Math.round(p.price/Math.max(p.members,1)).toLocaleString()}원</div></div>`;
  } else {
    // 결제할 수 없는 빌드에서는 가격도 표시하지 않는다 (외부 결제 유도로 읽힐 수 있음)
    h+=`<div class="prm-hero"><div class="prm-t">클럽 프리미엄</div>
      <div class="prm-d">클럽 운영을 돕는 확장 기능</div></div>`;
  }
  const row=(t,free,prem)=>`<div class="prm-row"><span>${t}</span><i>${free}</i><b>${prem}</b></div>`;
  h+=`<div class="card"><div class="prm-row hd"><span></span><i>무료</i><b>프리미엄</b></div>
    ${row('정회원 수', `${p.member_limit}명`, '무제한')}
    ${row('월 대진 생성', `${p.bracket_limit}회`, '무제한')}
    ${row('회비 장부 · 입금 확인', '—', '○')}
    ${row('출석 통계 · 내보내기', '—', '○')}
    ${row('클럽 공지 푸시', '—', '○')}
    <div class="note" style="text-align:left;margin-top:10px">지금 정회원 <b>${p.members}/${p.member_limit}</b>명 · 이번 달 대진 <b>${p.brackets_this_month}/${p.bracket_limit}</b>회</div>
  </div>`;
  if(owner && p.premium) h+=`<button class="btn ghost" onclick="cancelClubPremium()">프리미엄 해지</button>`;
  else if(owner && PAY_PENDING && !DEMO) h+=`<div class="note" style="text-align:left">결제 기능을 준비하고 있어요. 열리면 알려드릴게요.</div>`;
  else if(owner && canSellDigital()) h+=`<button class="btn" onclick="buyClubPremium()">프리미엄 시작하기 · 월 ${p.price.toLocaleString()}원</button>`;
  else if(!owner) h+=`<div class="note" style="text-align:left">결제는 <b>클럽장</b>만 할 수 있어요.</div>`;
  // iOS 빌드 + IAP 미연동: 결제 버튼도, 외부 결제 안내도 노출하지 않는다.
  document.getElementById('sheet').innerHTML=h; document.getElementById('ov').classList.add('on');
}
async function buyClubPremium(){
  if(!canSellDigital()) return;
  if(IS_IOS_APP && IAP_READY) return iapPurchase('club_premium_monthly');
  try{ await api(`/clubs/${clubId()}/premium`,{method:'POST',body:JSON.stringify({months:1})});
    toast('프리미엄이 시작됐어요'); openClubPremium();
  }catch(e){ const m=String(e.message);
    toast(m.includes('owner_only') ? '클럽장만 결제할 수 있어요'
        : m.includes('payments_not_ready') ? '결제 준비 중이에요 · 곧 열립니다'
        : '결제에 실패했어요'); }
}
async function cancelClubPremium(){
  if(!confirm('프리미엄을 해지할까요? 회비 장부를 볼 수 없게 돼요.')) return;
  try{ await api(`/clubs/${clubId()}/premium`,{method:'DELETE'}); toast('해지했어요'); openClubPremium(); }catch(e){ toast('실패했어요'); }
}

        Kakao.Share.sendDefault({ objectType:'text', text: `${title}\n${text}`,
          link:{ mobileWebUrl:url, webUrl:url } });
        return;
      }catch(e){}
    }
    if(navigator.share){
      try{ await navigator.share({title, text, url}); return; }
      catch(e){ if(e && e.name==='AbortError') return; }
    }
    copyText(url);
    toast('초대 링크를 복사했어요 · 카카오톡에 붙여넣어 보내세요 (7일 유효)');
  }catch(e){
    toast(String(e.message).includes('officer_only')?'클럽장·임원만 만들 수 있어요':'만들지 못했어요');
  }
}

const WD = ['일','월','화','수','목','금','토'];
/* ═══════════ 오픈매치 (클럽 밖 모집 경기) ═══════════
   참가비는 앱이 받지 않는다. 주최자가 현장에서 정산.        */
/* 오픈매치 카드 목록 HTML (화면·시트 공용) */
/* "2026-07-18T09:00" ~ "2026-07-18T12:00" → "07.18(토) 09:00–12:00" */
function fmtRange(sa, ea, fallback){
  if(!sa) return fallback || '';
  const p = n => String(n).padStart(2,'0');
  const s1 = new Date(sa);
  if(isNaN(s1)) return fallback || sa;
  let out = `${p(s1.getMonth()+1)}.${p(s1.getDate())}(${WD[s1.getDay()]}) ${p(s1.getHours())}:${p(s1.getMinutes())}`;
  if(ea){
    const e1 = new Date(ea);
    if(!isNaN(e1)){
      const sameDay = e1.toDateString()===s1.toDateString();
      out += '–' + (sameDay ? `${p(e1.getHours())}:${p(e1.getMinutes())}`
                            : `${p(e1.getMonth()+1)}.${p(e1.getDate())} ${p(e1.getHours())}:${p(e1.getMinutes())}`);
    }
  }
  return out;
}

             <button class="om-act danger" onclick="deleteMatch(${m.id})">삭제</button>`
          : closed ? ''
            : m.joined

                : `<button class="om-act primary" onclick="joinMatch(${m.id})">참가 신청</button>`}

    </div>`;
  });

}

/* 형식 이름에 성별이 들어 있으면 그대로 쓴다 (혼합복식 → 혼성) */
function gdFromFmt(f){
  f = f || '';
  if(f.includes('혼합')) return '혼성';
  if(f.includes('남자')) return '남자부';
  if(f.includes('여자')) return '여자부';
  return state.gender==='여성' ? '여자부' : '남자부';
}

function fillSigungu(){
  const sd = (document.getElementById('omSido')||{}).value;
  const sel = document.getElementById('omSigungu');
  if(!sel) return;
  const list = REGIONS[sd] || [];
  sel.innerHTML = `<option value="">시/군/구</option>` + list.map(x=>`<option value="${x}">${x}</option>`).join('');
}
/* 2026-07-18T09:00 → "07.18(토) 09:00" */
function fmtMatchDate(iso){
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  const p = n => String(n).padStart(2,'0');
  return `${p(d.getMonth()+1)}.${p(d.getDate())}(${WD[d.getDay()]}) ${p(d.getHours())}:${p(d.getMinutes())}`;
}
async function createMatch(){
  const v = id => ((document.getElementById(id)||{}).value||'').trim();
  const start=v('omStart'), end=v('omEnd'), loc=v('omLoc'), note=v('omNote'), dong=v('omDong');
  if(!start){ toast('시작 시각을 골라주세요'); return; }
  if(!loc){ toast('장소를 입력해 주세요'); return; }
  if(new Date(start) < new Date()){ toast('지난 시각은 고를 수 없어요'); return; }
  if(end && new Date(end) <= new Date(start)){ toast('종료가 시작보다 빨라요'); return; }
  const bad = findContact(`${loc} ${note} ${dong}`);
  if(bad){ toast(`${bad}는 모집글에 올릴 수 없어요 · 1:1 대화를 이용해 주세요`); return; }
  const num = id => parseInt(v(id).replace(/[^0-9]/g,''),10) || 0;
  const cap = num('omCap')||8, min_cnt = num('omMin')||6;
  if(min_cnt > cap){ toast('최소 인원이 정원보다 많아요'); return; }
  try{
    await api('/open-matches',{method:'POST',body:JSON.stringify({
      sport:state.sport, dt:fmtMatchDate(start), start_at:start, end_at:end||null,
      sido:v('omSido')||null, sigungu:v('omSigungu')||null, dong:dong||null,
      loc, fmt:v('omFmt')||SM().formats[0], gd:gdFromFmt(v('omFmt')),
      price:num('omPrice'), cap, min_cnt, note, account:v('omAccount')||null })});
    toast('오픈매치를 열었어요'); closeOv(); go('match');
  }catch(e){
    const m = String(e.message||'');
    toast( m.includes('contact_blocked') ? '연락처는 모집글에 올릴 수 없어요'
         : m.includes('end_before_start') ? '종료가 시작보다 빨라요'
         : m.includes('dt_loc_required') ? '시각과 장소를 모두 입력해 주세요'
         : m.includes('401') || m.includes('no_token') ? '다시 로그인해 주세요'
         : m.includes('Failed to fetch') ? '서버에 연결할 수 없어요'
         : `개설 실패 · ${m.slice(0,40)}` );
  }
}

/* ═══════════ 회비 납부 요청 ═══════════ */
async function remindDues(uid, name){
  const body = uid ? {user_id:uid} : {};
  if(!uid && !confirm('미납 회원에게 회비 납부 요청 알림을 보낼까요?')) return;
  try{
    const r = await api(`/clubs/${clubId()}/dues/remind`, {method:'POST', body: JSON.stringify(body)});
    if(r.sent) toast(uid ? `${name} 님에게 납부 요청을 보냈어요` : `${r.sent}명에게 납부 요청을 보냈어요`);
    else if(r.skipped) toast('오늘 이미 보냈어요 · 하루 한 번만 요청할 수 있어요');
    else toast('보낼 대상이 없어요');
    openDuesLedger();
  }catch(e){ toast(String(e.message).includes('officer_only')?'임원진만 보낼 수 있어요':'실패했어요'); }
}

/* 앱 진입 시 내 미납 회비 팝업 (하루 한 번) */
async function checkMyDues(retry){
  if(!SERVER_OK || !authToken()) return;
  // 다른 시트(퀵스타트 등)가 열려 있으면 덮어쓰지 않고 기다린다
  if(document.getElementById('ov').classList.contains('on')){
    if((retry||0) < 8) setTimeout(()=>checkMyDues((retry||0)+1), 2500);
    return;
  }
  let rows=[];
  try{ rows = await api('/me/dues/unpaid'); }catch(e){ return; }
  if(!rows.length) return;
  const today = new Date().toDateString();
  try{ if(localStorage.getItem('matsu_due_seen')===today) return; }catch(e){}
  const d = rows[0];
  const acct = d.bank ? `${d.bank} ${d.number}` : '클럽장에게 문의해 주세요';
  document.getElementById('sheet').innerHTML=`<div class="sh-top"><h3>회비 납부 요청</h3><div class="cl" role="button" tabindex="0" onclick="dismissDue()">×</div></div>
    <div class="due-pop">
      <div class="due-pop-c">${d.club_name}</div>
      <div class="due-pop-a">${d.amount.toLocaleString()}<span>원</span></div>
      <div class="due-pop-p">${d.period} 회비</div>
    </div>
    <div class="card" style="background:#fffdf6"><div class="ch" style="font-size:14px">입금 계좌</div>
      <div style="font-size:15px;font-weight:900;letter-spacing:-.02em">${acct}</div>
      <div class="note" style="text-align:left;margin-top:8px">입금자명을 <b>본인 이름</b>으로 해주세요. 클럽장이 확인 후 처리해요.</div></div>
    ${rows.length>1?`<div class="note" style="text-align:left">미납 ${rows.length}건이 있어요.</div>`:''}
    <button class="btn" onclick="dismissDue()">확인했어요</button>`;
  document.getElementById('ov').classList.add('on');
}
function dismissDue(){
  try{ localStorage.setItem('matsu_due_seen', new Date().toDateString()); }catch(e){}
  closeOv();
}

/* ═══════════ 연락처 차단 (서버와 동일 규칙) ═══════════
   공개 글·댓글엔 못 올리고, 1:1 대화에서만 주고받을 수 있어요.  */
const _FW={'０':'0','１':'1','２':'2','３':'3','４':'4','５':'5','６':'6','７':'7','８':'8','９':'9'};
const _HN={'영':'0','공':'0','일':'1','이':'2','삼':'3','사':'4','오':'5','육':'6','륙':'6','칠':'7','팔':'8','구':'9'};
const _SEPRE=/[\s\-\u00b7_/|,()\[\]{}<>+*~^$#!?"'`]/g;
function _kwText(t){ return String(t||'').toLowerCase().replace(/[０-９]/g,c=>_FW[c]).replace(_SEPRE,''); }
function _dgText(t){ let x=String(t||'').toLowerCase().replace(/[０-９]/g,c=>_FW[c]);
  Object.entries(_HN).forEach(([k,v])=>{x=x.split(k).join(v);}); return x.replace(/[^0-9]/g,''); }
const _KW=[
  [/openkakao|open\.kakao|kakao\.com|오픈채팅|오카방|톡방/,'오픈채팅 링크'],
  [/(카톡|카카오톡|kakaotalk|katalk)\s*(아이디|id|:|=|는|은)?/,'카카오톡 아이디'],
  [/(라인|line|텔레|telegram|텔레그램)(아이디|id|:|=)/,'메신저 아이디'],
  [/[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/,'이메일 주소'],
  [/(인스타|instagram|insta)(아이디|id|:|=|@)?|@[a-z0-9._]{3,}/,'SNS 아이디'],
];
const _PH=[/01[016789]\d{7,8}/, /8210\d{7,8}/];
function findContact(text){
  const k=_kwText(text);
  for(const [re,r] of _KW) if(re.test(k)) return r;
  const d=_dgText(text);
  for(const re of _PH) if(re.test(d)) return '전화번호';
  return null;
}
/* 입력창 아래 실시간 경고 */
function contactWarn(elId, warnId){
  const el=document.getElementById(elId), w=document.getElementById(warnId);
  if(!el||!w) return;
  const bad=findContact(el.value);
  w.innerHTML = bad ? `${ic('lock',13,'#c0503a')} <b>${bad}</b>는 공개 글에 올릴 수 없어요 · 1:1 대화를 이용해 주세요` : '';
  w.style.display = bad ? 'flex' : 'none';
}

/* ═══════════ 선수 비교 (Head-to-Head) ═══════════
   윔블던 중계 스타일. 상금은 빼고 MMR·전적·상대전적 중심.        */
const NOW_YEAR = new Date().getFullYear();
// 데모 상대 프로필 (서버 연결 시 GET /users/:id/profile 로 대체)
const PLAYER_META = {
  '이준호': {by:1994, handed:'오른손', backhand:'양손 백핸드', peak:1180, w:38, l:31, style:'베이스라이너'},
  '서지민': {by:1997, handed:'왼손',  backhand:'한손 백핸드', peak:1090, w:24, l:26, style:'서브 앤 발리'},
  '한지웅': {by:1990, handed:'오른손', backhand:'한손 백핸드', peak:1240, w:52, l:29, style:'올라운더'},
};
function myMeta(){
  return {by: state.birthYear||1996, handed: state.handed||'오른손',
          backhand: state.backhand||'양손 백핸드', peak: state.peakMmr||Math.max(state.mmr||1000, state.rating),
          w: (state.record&&state.record.w)||myRecord().w, l: (state.record&&state.record.l)||myRecord().l,
          style: state.style||'베이스라이너'};
}
function h2h(name){
  const m = relRecord()[name];
  return m ? {w:m.w, l:m.l} : {w:0, l:0};
}
function ageOf(by){ return by ? (NOW_YEAR - by) + '세' : '—'; }
function pct(a,b){ return (a+b)===0 ? 0 : Math.round(a/(a+b)*100); }

/* 값이 더 좋은 쪽을 강조 (higher: 큰 값이 우세) */
function cmpRow(label, left, right, higher){
  let lw='', rw='';
  if(higher!==undefined && typeof left.v==='number' && typeof right.v==='number' && left.v!==right.v){
    const leftWins = higher ? left.v>right.v : left.v<right.v;
    lw = leftWins ? 'win' : ''; rw = leftWins ? '' : 'win';
  }
  return `<div class="cmp-row">
    <div class="cmp-v ${lw}">${left.t}</div>
    <div class="cmp-l">${label}</div>
    <div class="cmp-v ${rw}">${right.t}</div></div>`;
}

    <div class="cmp-tbl">

  document.getElementById('sheet').innerHTML=h; document.getElementById('ov').classList.add('on');
