/* ═══════════ 개인 리포트 (Termes loadReport 이식) ═══════════
   대진 점수에서 집계 → 내 성적을 클럽 평균과 비교
   · 승률 / 경기당 득점 / 접전(2점차 이내) 승률
   · 파트너 궁합 · 상대 상성 · 최근 폼                          */
const ME_NAME = () => state.userName || '곽주영';
const CLOSE_DIFF = 2;   // 접전 기준: 점수차 2점 이내

/* 세션(모임) 배열을 받아 집계한다.
   session = { date, reg:[{key,names[4]}], scores:{key:{a,b}} }
   이번 모임만 보려면 세션 하나, 시즌 누적이면 여러 개를 넘긴다. */
function aggregateSessions(sessions){
  const P = {};
  const ens = nm => P[nm] || (P[nm] = {g:0,w:0,l:0,sc:0,cc:0,cg:0,cw:0});
  const me = ME_NAME();
  const R = { me, games:[], partner:{}, opp:{}, sessions:[], attended:0 };

  sessions.forEach(S=>{
    const my = {g:0,w:0,l:0,sc:0,cc:0};
    let played = false;
    (S.reg||[]).forEach(c=>{
      const sv = (S.scores||{})[c.key] || {};
      if(sv.a===undefined||sv.a===''||sv.b===undefined||sv.b==='') return;
      const a = parseInt(sv.a), b = parseInt(sv.b);
      if(isNaN(a)||isNaN(b)) return;
      const t1 = c.names.slice(0,2), t2 = c.names.slice(2,4);
      const close = Math.abs(a-b) <= CLOSE_DIFF;

      [[t1,a,b,t2],[t2,b,a,t1]].forEach(([team,mine,op,foe])=>{
        team.forEach((nm,k)=>{
          const st = ens(nm);
          st.g++; st.sc += mine; st.cc += op;
          if(mine>op) st.w++; else if(mine<op) st.l++;
          if(close){ st.cg++; if(mine>op) st.cw++; }
          if(nm===me){
            played = true;
            my.g++; my.sc+=mine; my.cc+=op;
            if(mine>op) my.w++; else if(mine<op) my.l++;
            const mate = team[1-k];
            R.games.push({won:mine>op, my:mine, op, close, mate, foes:foe.slice(), key:c.key, date:S.date});
            const pt = R.partner[mate] || (R.partner[mate]={g:0,w:0});
            pt.g++; if(mine>op) pt.w++;
            foe.forEach(f=>{ const o = R.opp[f] || (R.opp[f]={g:0,w:0}); o.g++; if(mine>op) o.w++; });
          }
        });
      });
    });
    if(played){ R.attended++; R.sessions.push({date:S.date||'', ...my}); }
  });

  R.stats = P;
  R.mine = P[me] || {g:0,w:0,l:0,sc:0,cc:0,cg:0,cw:0};
  R.meetings = sessions.length;
  const mem = Object.entries(P).filter(([nm,v])=>nm!==me && v.g>=2).map(([,v])=>v);
  const avg = arr => arr.length ? arr.reduce((x,y)=>x+y,0)/arr.length : 0;
  R.club = {
    n: mem.length,
    win:   Math.round(avg(mem.map(m=>m.w/m.g*100))),
    score: avg(mem.map(m=>m.sc/m.g)),
    close: (()=>{ const c=mem.filter(m=>m.cg>0); return c.length?Math.round(avg(c.map(m=>m.cw/m.cg*100))):0; })(),
  };
  return R;
}

/* 지금 화면에 있는 대진 하나 = 세션 하나 */
function currentSession(){
  const reg = ((state.bk && state.bk.reg) || []).map(c=>({key:c.key, names:c.names}));
  return { date: (state.bcfg && state.bcfg.date) || '이번 모임', reg, scores: state.bcfg.scores || {} };
}
function computeMyReport(){ return aggregateSessions([currentSession()]); }

/* 서버에서 발행된 과거 대진을 전부 가져와 시즌 누적 */
async function loadSeasonSessions(){
  const cid = clubId();
  if(!SERVER_OK || !cid) return null;
  try{
    const hist = await api(`/clubs/${cid}/brackets/history?limit=40`);
    const ss = hist.filter(b => (b.reg||[]).length).map(b => ({ date: b.date || '', reg: b.reg, scores: b.scores }));
    return ss.length ? ss : null;
  }catch(e){ return null; }
}


function _bar(label, mine, club, unit, better){
  const max = Math.max(mine, club, 1) * 1.12;
  const pm = Math.round(mine/max*100), pc = Math.round(club/max*100);
  const up = better ? mine>=club : mine<=club;
  return `<div class="rp-bar">
    <div class="rp-bl"><span>${label}</span><b class="${up?'up':'dn'}">${mine}${unit}</b></div>
    <div class="rp-track"><i class="me" style="width:${pm}%"></i></div>
    <div class="rp-track club"><i style="width:${pc}%"></i></div>
    <div class="rp-cap">클럽 평균 ${club}${unit} · 나는 ${up?'<b class="up">위</b>':'<b class="dn">아래</b>'}</div>
  </div>`;
}

let _seasonCache;
async function openMyReport(scope){
  // 대진 화면을 아직 안 열었으면 레지스트리가 비어 있으므로 한 번 렌더해서 채운다
  try{ if(!(state.bk&&state.bk.reg&&state.bk.reg.length) && AC() && SP().cat==='racket') renderBracket(); }catch(e){}
  scope = scope || state._rpScope || 'meet';
  if(_seasonCache === undefined) _seasonCache = await loadSeasonSessions();
  const seasonAvailable = !!(_seasonCache && _seasonCache.length);
  let R;
  if(scope==='season' && seasonAvailable) R = aggregateSessions(_seasonCache);
  else { scope='meet'; R = computeMyReport(); }
  state._rpScope = scope;
  const m = R.mine;
  let h = `<div class="sh-top"><h3>내 리포트</h3><div class="cl" role="button" tabindex="0" aria-label="닫기" onclick="closeOv()">×</div></div>
    ${seasonAvailable?`<div class="miniseg" style="margin:2px 0 12px">
      <div class="ms-b ${scope==='meet'?'on':''}" onclick="openMyReport('meet')">이번 모임</div>
      <div class="ms-b ${scope==='season'?'on':''}" onclick="openMyReport('season')">시즌 누적</div></div>`:''}
    <div class="sd">${scope==='season'
      ? `발행된 대진 <b>${R.meetings}회</b> 중 <b>${R.attended}회</b> 참석했어요. 클럽 평균과 비교해 보여줍니다.`
      : `이번 모임 대진의 <b>입력된 점수</b>로 집계했어요. 클럽 평균과 비교해 보여줍니다.`}</div>`;

  if(!m.g){
    h += `<div class="empty" style="padding:50px 20px"><div class="ei">${ic('chart',34)}</div>
      <div class="et">아직 기록이 없어요</div>
      <div class="es">${scope==='season'?'발행된 대진에 점수가 입력되면<br>시즌 기록이 쌓여요.':'대진에서 점수를 입력하면<br>리포트가 채워져요.'}</div></div>`;
    document.getElementById('sheet').innerHTML=h; document.getElementById('ov').classList.add('on'); return;
  }

  const wr = Math.round(m.w/m.g*100);
  const diff = m.sc - m.cc;
  const spg = +(m.sc/m.g).toFixed(1);
  const cwr = m.cg ? Math.round(m.cw/m.cg*100) : 0;

  // 요약
  h += `<div class="rp-hero">
    <div class="rp-hn">${R.me}</div>
    <div class="rp-grid">
      <div><b>${m.g}</b><span>경기</span></div>
      <div><b>${m.w}<i>승</i> ${m.l}<i>패</i></b><span>승률 ${wr}%</span></div>
      <div><b class="${diff>=0?'up':'dn'}">${diff>0?'+':''}${diff}</b><span>득실차</span></div>
    </div></div>`;

  // 모임별 추이 (시즌 누적에서만)
  if(scope==='season' && R.sessions.length>1){
    const mx = Math.max(...R.sessions.map(x=>x.g), 1);
    h += `<div class="card"><div class="ch" style="font-size:15px">모임별 성적</div>
      <div class="tl-wrap">`;
    R.sessions.slice(-10).forEach(x=>{
      const wr = x.g ? Math.round(x.w/x.g*100) : 0;
      h += `<div class="tl-col" title="${x.date} · ${x.w}승 ${x.l}패">
        <div class="tl-bar" style="height:${Math.max(8, x.g/mx*74)}px">
          <i style="height:${wr}%"></i></div>
        <div class="tl-d">${(x.date||'').replace(/^\d{4}[-.]/,'').slice(0,5)}</div></div>`;
    });
    h += `</div><div class="rp-cap">막대 높이 = 경기 수 · 색칠된 부분 = 승리 비율 (최근 10회)</div></div>`;
  }

  // 최근 폼
  const form = R.games.slice(-5);
  h += `<div class="card"><div class="ch" style="font-size:15px">최근 ${form.length}경기</div>
    <div class="rp-form">${form.map(g=>`<span class="rp-f ${g.won?'w':'l'}" title="${g.my}:${g.op}">${g.won?'승':'패'}</span>`).join('')}</div>
    <div class="rp-fcap">${form.map(g=>`${g.my}:${g.op}`).join(' · ')}</div></div>`;

  // 클럽 평균 비교
  if(R.club.n){
    h += `<div class="card"><div class="ch" style="font-size:15px">클럽 평균과 비교 <span style="font-size:11.5px;color:var(--gray);font-weight:600">· 2경기 이상 ${R.club.n}명</span></div>
      ${_bar('승률', wr, R.club.win, '%', true)}
      ${_bar('경기당 득점', spg, +R.club.score.toFixed(1), '점', true)}
      ${m.cg?_bar(`접전(${CLOSE_DIFF}점차 이내) 승률`, cwr, R.club.close, '%', true):''}
    </div>`;
  }

  // 파트너 궁합
  const pl = Object.entries(R.partner).sort((a,b)=>(b[1].w/b[1].g)-(a[1].w/a[1].g)||b[1].g-a[1].g);
  if(pl.length){
    h += `<div class="card"><div class="ch" style="font-size:15px">파트너 궁합</div>
      ${pl.map(([nm,v])=>{const r=Math.round(v.w/v.g*100);
        return `<div class="rp-row"><span class="rp-nm">${nm}</span>
          <span class="rp-mini"><i style="width:${r}%;background:${r>=50?'#3f9e6e':'#d6633f'}"></i></span>
          <b class="${r>=50?'up':'dn'}">${r}%</b><em>${v.w}승 ${v.g-v.w}패</em></div>`;}).join('')}</div>`;
  }

  // 상대 상성
  const ol = Object.entries(R.opp).sort((a,b)=>(a[1].w/a[1].g)-(b[1].w/b[1].g)||b[1].g-a[1].g);
  if(ol.length){
    h += `<div class="card"><div class="ch" style="font-size:15px">상대 상성 <span style="font-size:11.5px;color:var(--gray);font-weight:600">· 약한 상대부터</span></div>
      ${ol.map(([nm,v])=>{const r=Math.round(v.w/v.g*100);
        return `<div class="rp-row"><span class="rp-nm">${nm}</span>
          <span class="rp-mini"><i style="width:${r}%;background:${r>=50?'#3f9e6e':'#d6633f'}"></i></span>
          <b class="${r>=50?'up':'dn'}">${r}%</b><em>${v.w}승 ${v.g-v.w}패</em></div>`;}).join('')}</div>`;
  }

  h += `<div class="note" style="text-align:left">득실차·접전 승률은 점수가 입력된 경기만 반영해요.</div>`;
  document.getElementById('sheet').innerHTML=h; document.getElementById('ov').classList.add('on');
}

/* ═══════════ 한울 수기 방식 경기 기록표 (Termes showHanulSheet 이식) ═══════════
   옛날 종이 기록표 그대로: 남=1·2·3 / 여=A·B·C 코드,
   게임 순서표(1A : 2B), 세트별 점수 그리드, 승·패·득점·실점·득실차·순위 자동 */
function defaultGenders(roster){
  const set=(AC()&&AC().genders)||{};
  const out={};
  roster.forEach(nm=>{ let h=0; for(const ch of String(nm)) h=(h*31+ch.charCodeAt(0))>>>0;
    out[nm] = set[nm] || (h%100<62?'M':'F'); });  // 미설정: 이름 해시로 고정 (편성 재현성)
  return out;
}
function genderUnset(roster){
  const set=(AC()&&AC().genders)||{};
  return roster.filter(nm=>!set[nm]);
}
async function pushGenders(){
  const cid = clubId(); const c = AC();
  if(!SERVER_OK || !cid || !c || state.bcfg.role!=='officer') return;
  const genders = {};
  Object.entries(c.genders||{}).forEach(([nm,g])=>{ if(SRV_UID[nm]) genders[SRV_UID[nm]] = g; });
  if(!Object.keys(genders).length) return;
  try{ await api(`/clubs/${cid}/genders`, {method:'PATCH', body: JSON.stringify({genders})}); }
  catch(e){ if(String(e.message).includes('officer_only')) toast('성별 설정은 임원진만 가능해요'); }
}
function setGenderFor(nm,g){
  const c=AC(); if(!c)return; c.genders=c.genders||{};
  c.genders[nm]=g; state.bcfg.scores={}; c.published=null; pushGenders(); openGrades();
}
function openHanulSheet(){
  const c=AC(); if(!c) return;
  const att=state._hanul; if(!att){ toast('한울 대진을 먼저 편성해 주세요'); return; }
  const {attendees, hn, G, GD} = att;

  let sheets='';
  hn.groups.forEach((grp, gi)=>{
    if(grp.length<4){ return; }
    const males   = grp.filter(i=>GD[attendees[i]]==='M');
    const females = grp.filter(i=>GD[attendees[i]]!=='M');
    const code={};
    males.forEach((i,k)=>code[i]=String(k+1));
    females.forEach((i,k)=>code[i]=String.fromCharCode(65+k));
    const ordered=[...males, ...females];
    const games=hn.games[gi];

    // 개인별 세트 결과
    const stat={};
    ordered.forEach(i=>{
      const gl=[];
      games.forEach((m,k)=>{
        if(!m.includes(i)) return;
        const sv=state.bcfg.scores['h'+gi+'-'+k]||{};
        const has=sv.a!==undefined&&sv.a!==''&&sv.b!==undefined&&sv.b!=='';
        const s1=parseInt(sv.a)||0, s2=parseInt(sv.b)||0;
        const onA=(m[0]===i||m[1]===i);
        gl.push({has, my:onA?s1:s2, op:onA?s2:s1, won:has&&((onA?s1:s2)>(onA?s2:s1))});
      });
      const p=gl.filter(x=>x.has);
      stat[i]={gl, w:p.filter(x=>x.won).length, l:p.filter(x=>!x.won).length,
               sc:p.reduce((a,x)=>a+x.my,0), co:p.reduce((a,x)=>a+x.op,0), played:p.length};
      stat[i].diff=stat[i].sc-stat[i].co;
    });
    // 순위 (승 > 득실차)
    const rl=ordered.map(i=>({i,w:stat[i].w,diff:stat[i].diff,played:stat[i].played}))
                    .sort((a,b)=>b.w-a.w||b.diff-a.diff);
    const rank={}; let rk=1;
    rl.forEach((r,k)=>{ if(k>0&&(r.w<rl[k-1].w||(r.w===rl[k-1].w&&r.diff<rl[k-1].diff))) rk=k+1;
                        rank[r.i]=r.played?rk:'-'; });
    const nG=Math.max(HANUL_GAMES, ...ordered.map(i=>stat[i].gl.length));

    // 게임 순서표
    const cc=i=>code[i]||'·';
    let sched='';
    games.forEach((m,k)=>{ sched+=`<tr><td class="g">게임 ${k+1}</td><td class="code">${cc(m[0])}${cc(m[1])} : ${cc(m[2])}${cc(m[3])}</td></tr>`; });

    // 점수표
    let head=`<tr><th rowspan="2">번호</th><th rowspan="2">이름</th>`;
    for(let k=0;k<nG;k++) head+=`<th rowspan="2">${k+1}세트</th>`;
    head+=`<th colspan="2" class="grp">승패</th><th colspan="3" class="grp">게임 득실</th><th rowspan="2">순위</th></tr>
      <tr><th>승</th><th>패</th><th>득점</th><th>실점</th><th>득실차</th></tr>`;
    let body='';
    ordered.forEach(i=>{
      const d=stat[i]; let sets='';
      for(let k=0;k<nG;k++){
        const x=d.gl[k];
        sets += (x&&x.has) ? `<td class="set${x.won?' win':''}">${x.my} : ${x.op}</td>`
                           : `<td class="set empty">·</td>`;
      }
      const isMe = attendees[i]==='곽주영';
      body+=`<tr class="${isMe?'me':''}">
        <td class="${GD[attendees[i]]==='M'?'lblM':'lblF'}"><span>${code[i]}</span></td>
        <td class="nm">${attendees[i]}${gradeBadge(G[attendees[i]]||'B')}</td>${sets}
        <td>${d.w}</td><td>${d.l}</td><td>${d.sc}</td><td>${d.co}</td>
        <td class="${d.diff<0?'neg':'pos'}">${d.diff>0?'+':''}${d.diff}</td>
        <td class="rk">${rank[i]}</td></tr>`;
    });

    sheets+=`<div class="sh-court">
      <div class="sh-ct">코트 ${gi+1} <span>${grp.length}명 · 전원 ${HANUL_GAMES}게임</span></div>
      <div class="sh-sub">게임 순서 <span>· 남 1·2·3 / 여 A·B·C</span></div>
      <table class="sh-sched"><tbody>${sched||'<tr><td>경기 없음</td></tr>'}</tbody></table>
      <div class="sh-sub" style="margin-top:16px">점수표 <span>· 승패·득실·순위 자동</span></div>
      <div class="sh-scroll"><table class="sh-grid"><thead>${head}</thead><tbody>${body}</tbody></table></div>
    </div>`;
  });

  const ov=document.createElement('div'); ov.className='sh-ov'; ov.id='shOv';
  ov.innerHTML=`<div class="sh-panel">
    <div class="sh-head"><div><div class="sh-eye">한울 · 수기 방식</div><div class="sh-title">경기 기록표</div></div>
      <button class="sh-x" onclick="document.getElementById('shOv').remove()">×</button></div>
    ${sheets||'<div class="note">편성된 조가 없어요.</div>'}</div>`;
  ov.onclick=e=>{ if(e.target===ov) ov.remove(); };
  document.body.appendChild(ov);
}

/* ═══════════ 대진 운영(라이브) 레이어 — Termes 이식 ═══════════
   · 코트 상태머신 (진행가능 / 대기 / 진행중 / 완료)
   · 코트 타이머 (시작 시각 기록 → 경과 m:ss 실시간)
   · 30분 초과 경기 경고
   · 내 다음 가능 매치 안내
   · 헬퍼 후보 (가장 오래 쉰 인원)
   · 게임 칩 네비게이션                                            */
const BK_LONG_MIN = 30;   // 장시간 진행 경고 기준(분)

function bkState(){ state.bk = state.bk || {startedAt:{}, reg:[], tick:null}; return state.bk; }
function bkReset(){ const b=bkState(); b.reg=[]; }
function bkRegister(key, ri, ci, names, lane){ bkState().reg.push({key, ri:+ri, ci, names, lane}); }
function bkScored(key){ const s=state.bcfg.scores[key]||{}; return s.a!==undefined&&s.a!=='' && s.b!==undefined&&s.b!==''; }
function bkStartedAt(key){ return bkState().startedAt[key]||null; }
function bkFmtElapsed(ms){ const t=Math.max(0,Math.floor(ms/1000)); return Math.floor(t/60)+':'+String(t%60).padStart(2,'0'); }
function bkElapsedMin(key){ const t=bkStartedAt(key); return t?Math.floor((Date.now()-t)/60000):null; }

/* 코트 상태: done > playing > now > wait
   now 조건: 미시작 · 소속 선수가 다른 진행중 코트에 없음 · 동시 진행 코트 < 코트 수 */
function bkStatuses(courts){
  const busy = new Set();
  let playingCount = 0;
  courts.forEach(c=>{ if(bkStartedAt(c.key) && !bkScored(c.key)){ playingCount++; c.names.forEach(n=>busy.add(n)); } });
  const cap = state.bcfg.courts;
  // 레인(고정 코트) 순서 게이트: 같은 레인의 앞 게임이 끝나야 다음 게임이 열림
  const laneBlocked = new Set();
  courts.forEach(c=>{
    if(c.lane===undefined) return;
    const earlier = courts.filter(o=>o.lane===c.lane && o.ri < c.ri);
    if(earlier.some(o=>!bkScored(o.key))) laneBlocked.add(c.key);
  });
  const out = {};
  courts.forEach(c=>{
    if(bkScored(c.key)) out[c.key]='done';
    else if(bkStartedAt(c.key)) out[c.key]='playing';
    else if(laneBlocked.has(c.key)) out[c.key]='wait';
    else if(c.names.some(n=>busy.has(n))) out[c.key]='wait';
    else if(playingCount>=cap) out[c.key]='wait';
    else out[c.key]='now';
  });
  return out;
}
const BK_ST = {
  now:    {t:'진행 가능', c:'#1f7d4d', bg:'#e7f4ec'},
  playing:{t:'진행 중',  c:'#c47d10', bg:'#fdf2dd'},
  wait:   {t:'대기',     c:'#8a8172', bg:'#efe9dd'},
  done:   {t:'완료',     c:'#5b7fd4', bg:'#e7eefb'},
};

function bkStart(key){
  const b=bkState();
  if(b.startedAt[key]) delete b.startedAt[key];
  else { b.startedAt[key]=Date.now(); toast('경기를 시작했어요 · 타이머가 돌아갑니다'); }
  bkSyncTimer(key);
  renderBracket();
}

/* 실시간 타이머 (1초) */
function bkTick(){
  document.querySelectorAll('[data-bkt]').forEach(el=>{
    const t = bkStartedAt(el.getAttribute('data-bkt'));
    if(t) el.textContent = bkFmtElapsed(Date.now()-t);
  });
}
function bkTimerLoop(){ const b=bkState(); if(b.tick) return; b.tick=setInterval(bkTick,1000); }

/* 코트 우측 컨트롤 (상태칩 · 시작 버튼 · 타이머) */
function bkControl(key){
  const st = (bkState()._st||{})[key] || 'wait';
  const S = BK_ST[st];
  if(st==='done') return `<span class="bk-chip" style="background:${S.bg};color:${S.c}">${S.t}</span>`;
  if(st==='playing'){
    const t = bkStartedAt(key);
    const hhmm = new Date(t).toTimeString().slice(0,5);
    return `<span class="bk-chip playing"><span class="bk-dot"></span><b data-bkt="${key}">${bkFmtElapsed(Date.now()-t)}</b><em>${hhmm} 시작</em></span>
      <button class="bk-btn stop" onclick="event.stopPropagation();bkStart('${key}')">중단</button>`;
  }
  if(st==='now') return `<button class="bk-btn go" onclick="event.stopPropagation();bkStart('${key}')">${ic('clock',13,'#fff')}시작</button>`;
  return `<span class="bk-chip" style="background:${S.bg};color:${S.c}">${S.t}</span>`;
}

/* 내 다음 가능 매치 · 30분 경고 · 헬퍼 후보 · 게임 네비 */
function bkPanel(){
  const b = bkState(), reg = b.reg;
  if(!reg.length) return '';
  const st = bkStatuses(reg); b._st = st;

  // 라운드별 상태 요약
  const rounds = [...new Set(reg.map(c=>c.ri))].sort((a,b2)=>a-b2);
  const rStat = {};
  rounds.forEach(ri=>{
    const cs = reg.filter(c=>c.ri===ri).map(c=>st[c.key]);
    rStat[ri] = cs.every(x=>x==='done') ? 'done'
      : cs.some(x=>x==='playing') ? 'playing'
      : cs.some(x=>x==='now') ? 'now' : 'wait';
  });

  let h = `<div class="bk-nav">${rounds.map(ri=>{
    const s=rStat[ri];
    return `<div class="bk-n ${s}">${ri+1}게임${s==='done'?' ✓':s==='playing'?' ●':''}</div>`;
  }).join('')}</div>`;

  // 내 다음 경기
  const ME=meName();
  const mine = reg.filter(c=>c.names.includes(ME) && st[c.key]!=='done');
  if(mine.length){
    const nx = mine[0];
    const s = st[nx.key], S = BK_ST[s];
    const ahead = reg.filter(c=>c.ri<nx.ri && st[c.key]!=='done').length;
    const sub = s==='now' ? '지금 바로 시작할 수 있어요'
      : s==='playing' ? '지금 진행 중이에요'
      : `앞선 경기 ${ahead}건이 끝나면 시작해요`;
    h += `<div class="bk-next">
      <span class="bk-next-ic" style="background:${S.bg};color:${S.c}">${ic(s==='playing'?'live':'clock',18)}</span>
      <div class="bk-next-x"><div class="bk-next-t">내 다음 경기 · ${nx.ri+1}게임 코트 ${nx.ci+1}</div>
        <div class="bk-next-d">${sub}</div></div>
      <span class="bk-chip" style="background:${S.bg};color:${S.c}">${S.t}</span></div>`;
  } else if(reg.some(c=>c.names.includes(ME))){
    h += `<div class="bk-next done"><span class="bk-next-ic" style="background:#e7f4ec;color:#1f7d4d">${ic('award',18)}</span>
      <div class="bk-next-x"><div class="bk-next-t">오늘 경기 완료</div><div class="bk-next-d">배정된 ${reg.filter(c=>c.names.includes(ME)).length}경기를 모두 마쳤어요</div></div></div>`;
  } else {
    h += `<div class="bk-next"><span class="bk-next-ic" style="background:var(--coral-s);color:var(--coral-d)">${ic('user',18)}</span>
      <div class="bk-next-x"><div class="bk-next-t">아직 내 경기가 없어요</div><div class="bk-next-d">클럽 일정에서 참석을 체크하면 대진에 자동 배정돼요</div></div></div>`;
  }

  // 30분 초과 경고
  const longRun = reg.filter(c=>st[c.key]==='playing' && (bkElapsedMin(c.key)||0)>=BK_LONG_MIN);
  if(longRun.length){
    h += `<div class="bk-warn">${ic('hourglass',16)}<span><b>${BK_LONG_MIN}분</b> 넘게 진행 중인 경기 ${longRun.length}건
      (${longRun.map(c=>`${c.ri+1}게임 코트${c.ci+1}`).join(', ')}) — 끝났다면 점수를 입력해 주세요</span></div>`;
  }

  // 헬퍼 후보: 완료 경기 수가 가장 적은 인원
  const played = {};
  reg.forEach(c=>{ if(st[c.key]==='done') c.names.forEach(n=>played[n]=(played[n]||0)+1); });
  const all = [...new Set(reg.flatMap(c=>c.names))];
  const min = Math.min(...all.map(n=>played[n]||0));
  const rested = all.filter(n=>(played[n]||0)===min);
  if(rounds.length && rested.length && rested.length<=4 && Object.keys(played).length){
    h += `<div class="bk-help">${ic('people',16)}<span><b>가장 오래 쉰 회원</b> — 헬퍼가 필요하면 먼저 불러주세요
      <em>${rested.join(' · ')}</em></span></div>`;
  }
  return h;
}

function courtLine(ci,aNames,bNames,typeLabel,key,ri,lane){
  const col=CCB[ci%CCB.length];
  if(key!==undefined) bkRegister(key, ri, ci, [...aNames,...bNames], lane);
  const ctrl = key!==undefined ? `<div class="bk-ctrl"><!--BKC:${key}--></div>` : '';
  const tb=typeLabel?`<span class="ct-type" style="background:${ctTypeColor(typeLabel)}20;color:${ctTypeColor(typeLabel)}">${typeLabel}</span>`:'';

function clubRoster(){
  const key=state.activeClub||'우리 클럽';
  state.roster=state.roster||{};
  if(!state.roster[key]){
    const mem=clubMembersList(); const nums=[10,7,9,4,11,8,2,5,3,6,1,13,14,17];
    const capName=mem.includes('곽주영')?'곽주영':mem[0];
    state.roster[key]=mem.map((nm,i)=>({name:nm,no:nums[i%nums.length],captain:nm===capName}));
  }
  return state.roster[key];
}
function rosterEntry(nm){ return clubRoster().find(r=>r.name===nm)||{name:nm,no:'-',captain:false}; }
// 종목별 기록 항목
function statCats(){ const id=SP().id;
  if(id==='soccer') return [['goal','골'],['assist','도움']];
  if(id==='basketball') return [['pt','득점'],['reb','리바운드'],['ast','어시스트']];
  if(id==='baseball') return [['hit','안타'],['hr','홈런'],['rbi','타점'],['save','세이브']];
  return [['pt','득점']];
}

function lineupState(){ state.lineup=state.lineup||{drafted:false,confirmed:false}; return state.lineup; }
function minsToKickoff(){ return state.kickoffMin==null?95:state.kickoffMin; }
function fmtCountdown(m){ if(m<=0) return '경기 시작'; const hh=Math.floor(m/60), mm=m%60; return hh?`${hh}시간 ${mm}분 뒤`:`${mm}분 뒤`; }
function lineupStatusCard(){

let CHAT_POLL=null, CHAT_MSGS=[];
function stopChatPoll(){ if(CHAT_POLL){ clearInterval(CHAT_POLL); CHAT_POLL=null; } }
function isSrvRoom(id){ return !!id && (id.startsWith('dm:') || id.startsWith('club:')); }

async function loadRoomMsgs(){
  const id=state.chatRoom; if(!isSrvRoom(id)) return;
  try{
    if(id.startsWith('dm:')){
      const ms = await api(`/dm/with/${+id.slice(3)}`);
      CHAT_MSGS = ms.map(m=>({me:m.mine, t:m.body, at:m.created_at, read:!!m.read}));
      UNREAD.dm = 0; paintUnreadBadge();
    } else {
      const cid = +id.slice(5);
      const ms = await api(`/clubs/${cid}/chat`);
      CHAT_MSGS = ms.map(m=>({me:m.mine, who:m.name, t:m.body, at:m.created_at, unread:m.unread||0}));
      const lastId = ms.length ? ms[ms.length-1].id : 0;
      if(lastId) api(`/clubs/${cid}/chat/read`,{method:'POST',body:JSON.stringify({last_id:lastId})}).catch(()=>{});
      if(UNREAD.clubs){ delete UNREAD.clubs[cid]; paintUnreadBadge(); }
    }
  }catch(e){}
}
function roomBubbles(msgs, isGroup){
  let h=''; let lastWho=null;
  msgs.forEach(m=>{
    if(m.me){
      const meta = isGroup
        ? (m.unread>0 ? `안읽음 ${m.unread}` : '읽음')
        : (m.read ? '읽음' : '');
      h+=`<div class="msg me">${esc(m.t)}</div>${meta?`<div class="msg-meta">${meta}</div>`:''}`;
      lastWho=null;
    }
    else {
      const showWho = isGroup && m.who && m.who!==lastWho;
      h+=`<div class="msg them">${showWho?`<div class="who2">${esc(m.who)}</div>`:''}${esc(m.t)}</div>`;
      lastWho = m.who||null;
    }
  });
  if(!msgs.length) h=`<div class="note" style="text-align:left;margin:8px 4px">아직 대화가 없어요. 첫 메시지를 보내보세요.</div>`;
  return h;
}
function paintMsgs(){
  const id=state.chatRoom; if(!id) return;
  const box=document.getElementById('msgsBox'); if(!box) return;
  const srv=isSrvRoom(id);
  const isGroup = srv ? id.startsWith('club:') : (state.chats[id]||{}).type==='group';
  box.innerHTML = roomBubbles(srv?CHAT_MSGS:(state.chats[id]||{msgs:[]}).msgs, isGroup);
  const sc=document.getElementById('scroll'); if(sc) sc.scrollTop=sc.scrollHeight;
}
function renderRoom(){
  const id=state.chatRoom;
  const srv=isSrvRoom(id);
  let name, sub, isGroup, isDM;
  if(srv){
    isGroup=id.startsWith('club:'); isDM=!isGroup;
    name = state._roomName || (isGroup ? (state.activeClub||'클럽')+' 단체방' : '대화');
    sub = isGroup ? '클럽 단체방 · 회원 전용' : '1:1 대화';
  } else {
    const r=state.chats[id]; if(!r){ state.chatRoom=null; return renderChat(); }
    name=r.name; isGroup=r.type==='group'; isDM=!isGroup; sub=isGroup?'클럽 단체방':'1:1 대화';
  }
  let h=`<div class="chead"><div class="bk" onclick="backChat()">‹</div><div style="flex:1"><div class="ti">${esc(name)}</div><div class="su">${sub}</div></div>${isDM?`<span onclick="openReport('${String(name).replace(/'/g,'')}')" style="font-size:12.5px;color:var(--lgray);font-weight:700;cursor:pointer">⚠ 신고</span>`:''}</div>`;
  h+=`<div class="msgs" id="msgsBox"></div>
      <div class="chatbar"><input id="chatIn" placeholder="메시지 입력..." maxlength="500" onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">전송</button></div>`;
  document.getElementById('s-chat').innerHTML=h;
  paintMsgs();
  const inp=document.getElementById('chatIn'); if(inp) inp.focus();
  // 서버 방은 5초마다 새 메시지 폴링 — 입력창은 다시 그리지 않아 타이핑이 안 끊긴다
  stopChatPoll();
  if(srv){
    CHAT_POLL=setInterval(async ()=>{
      if(state.view!=='chat' || state.chatRoom!==id){ stopChatPoll(); return; }
      const before=CHAT_MSGS.length && CHAT_MSGS[CHAT_MSGS.length-1];
      await loadRoomMsgs();
      const after=CHAT_MSGS.length && CHAT_MSGS[CHAT_MSGS.length-1];
      if(before!==after || (before&&after&&before.at!==after.at)) paintMsgs();
    }, 5000);
  }
}
function openRoom(id){state.chatRoom=id;renderChat();}
function openClubRoom(){
  const cid=clubId();
  if(SERVER_OK && cid){
    state.chatRoom='club:'+cid; state._roomName=(state.activeClub||'클럽')+' 단체방';
    go('chat'); loadRoomMsgs().then(()=>{ if(state.view==='chat') renderChat(); });
  } else if(state.chats['grp:'+state.activeClub]) openRoomGo('grp:'+state.activeClub);
  else toast('클럽 단체방은 클럽 가입 후 이용할 수 있어요');
}
function openRoomGo(id){ state.chatRoom=id; go('chat'); renderChat(); }
function backChat(){stopChatPoll();state.chatRoom=null;renderChat();}
async function sendChat(){
  const inp=document.getElementById('chatIn');if(!inp)return;
  const t=inp.value.trim();if(!t)return;
  const id=state.chatRoom;
  if(isSrvRoom(id)){
    inp.value='';
    CHAT_MSGS.push({me:1,t});                                  // 낙관적 표시
    paintMsgs();
    try{
      if(id.startsWith('dm:')){
        const r=await api('/dm',{method:'POST',body:JSON.stringify({to:+id.slice(3), body:t})});
        if(r.charged) toast(`대화를 시작했어요 · M캐쉬 ${r.charged} 사용 (잔액 ${r.cash})`);
        else if(r.cash!==undefined) toast('대화를 시작했어요 · 오늘 무료 시작 사용');
        state.cash=r.cash;
      } else {
        await api(`/clubs/${+id.slice(5)}/chat`,{method:'POST',body:JSON.stringify({body:t})});
      }
      await loadRoomMsgs(); paintMsgs();
      loadDMThreads && loadDMThreads();
    }catch(e){
      CHAT_MSGS.pop(); paintMsgs(); inp.value=t;
      const m=String(e.message);
      if(m.includes('insufficient_cash')){ toast('M캐쉬가 부족해요'); setTimeout(canSellDigital()?openStore:openEarn,650); }
      else if(m.includes('blocked')) toast('상대가 대화를 받지 않아요');
      else if(m.includes('member_only')) toast('클럽 회원만 쓸 수 있어요');
      else toast('보내지 못했어요');
    }
    return;
  }
  const r=state.chats[id];r.msgs.push({me:1,t});
  inp.value='';
  renderRoom();
  setTimeout(()=>{
    const rep=REPLIES[Math.floor(Math.random()*REPLIES.length)];
    const who=r.type==='group'?'이석용':null;
    r.msgs.push(who?{them:1,who,t:rep}:{them:1,t:rep});
    if(state.view==='chat'&&state.chatRoom)renderRoom();
  },900);
}

function relRecord(){

function sparkline(hist){
  if(hist.length<2) return '';
  const w=260,h=58,mn=Math.min(...hist),mx=Math.max(...hist),rng=(mx-mn)||1;
  const pts=hist.map((v,i)=>[8+i*(w-16)/(hist.length-1), h-6-((v-mn)/rng)*(h-16)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block"><path d="${d}" fill="none" stroke="#e8845a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="#e8845a"/></svg>`;
}

  if(!clubs.length && !mems.length && !posts.length){

  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.s===v));
  document.getElementById('scroll').scrollTop=0;
  if(v==='club' && SERVER_OK && clubId()){ loadClubServer().then(ok=>{ if(ok) renderClub(); }); }
  ({home:renderHome,league:renderLeague,club:renderClub,bracket:renderBracket,match:renderMatch,lounge:renderLounge,chat:renderChat,me:renderMe})[v]();
  saveMatsu();
}
function closeOv(){document.getElementById('ov').classList.remove('on');}
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeOv();});
// 서버 확인 → 데모 데이터 제거 → 화면 다시 그리기
checkServer().then(async ok=>{
  if(!ok) return;
  renderHome();renderLeague();renderClub();renderLounge();renderChat();renderMe();renderAuthReviews();
  if(state.view) go(state.view);
  const _mid = new URL(location.href).searchParams.get('match');
  if(_mid){
    try{ sessionStorage.setItem('pending_match', _mid); }catch(e){}
    history.replaceState({}, '', location.pathname);
    if(state.loggedIn && authToken()) setTimeout(()=>handleMatchLink(+_mid), 900);
  }
  const _inv = new URL(location.href).searchParams.get('invite');
  if(_inv){
    try{ sessionStorage.setItem('pending_invite', _inv); }catch(e){}
    history.replaceState({}, '', location.pathname);
    if(state.loggedIn && authToken()) handleInviteToken(_inv);
    // 로그인 전이면 로그인 뒤에 처리된다 (아래 저장분 확인)
  }
  if(new URL(location.href).searchParams.get('code')){
    let provider = 'naver';
    try{ provider = sessionStorage.getItem('oauth_provider') || 'naver'; }catch(e){}
    try{ sessionStorage.removeItem('oauth_provider'); }catch(e){}
    const code = new URL(location.href).searchParams.get('code');
    const done = provider==='kakao' ? await handleKakaoCallback(code) : await handleNaverCallback();
    if(done){
      document.getElementById('auth').classList.remove('on');
      try{ const t=sessionStorage.getItem('pending_invite');
        if(t){ sessionStorage.removeItem('pending_invite'); setTimeout(()=>handleInviteToken(t), 800); } }catch(e){}
      try{ const mI=sessionStorage.getItem('pending_match');
        if(mI){ sessionStorage.removeItem('pending_match'); setTimeout(()=>handleMatchLink(+mI), 1000); } }catch(e){}
      await loadClubIds();
      if(clubId()){ await loadClubServer(); await loadRoster(); }
      if(state.loggedIn) go(state.view||'home');
      else resumeOrOnboard();
    }
  }
});
const _restored=loadMatsu();
if(_restored){ document.getElementById('auth').classList.remove('on'); document.getElementById('onboard').classList.remove('on'); }
setTimeout(()=>{ if(state.loggedIn){ syncMe(); checkMyDues(); afterLoginNative();
  try{ const t=sessionStorage.getItem('pending_invite');
    if(t && SERVER_OK && authToken()){ sessionStorage.removeItem('pending_invite'); handleInviteToken(t); } }catch(e){}
  try{ const mI=sessionStorage.getItem('pending_match');
    if(mI && SERVER_OK && authToken()){ sessionStorage.removeItem('pending_match'); handleMatchLink(+mI); } }catch(e){}
} }, 1500);
renderHome();renderLeague();renderClub();renderBracket();renderLounge();renderChat();renderMe();renderAuthReviews();
if(_restored){ go(state.view||'home'); } else { populateAuthSaved(); }
window.addEventListener('beforeunload',saveMatsu);
setInterval(saveMatsu,2500);

/* ═══════════ 네이티브 앱 (Capacitor) ═══════════
   App Store 심사 4.2 "최소 기능": 웹뷰만 감싼 앱은 반려된다.
   푸시 알림을 네이티브로 붙여 네이티브 기능을 갖춘다.               */
const IS_NATIVE = (()=>{ try{ return !!(window.Capacitor && Capacitor.isNativePlatform && Capacitor.isNativePlatform()); }catch(e){ return false; } })();

/* 웹 푸시 구독. VAPID 공개키가 서버에서 오면 켠다.
   구독 객체(JSON)를 그대로 /push/register 에 보낸다. 서버는 이걸로 발송한다. */
function urlB64ToUint8(b64){
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
async function enableWebPush(){
  if(IS_NATIVE || !SERVER_OK || !CFG.vapid_public) return false;
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){ toast('이 브라우저는 알림을 지원하지 않아요'); return false; }
  const perm = await Notification.requestPermission();
  if(perm !== 'granted'){ toast('알림 권한이 꺼져 있어요'); return false; }
  try{
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if(!sub) sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8(CFG.vapid_public),
    });
    await api('/push/register', {method:'POST', body: JSON.stringify({token: JSON.stringify(sub), platform:'web'})});
    state.pushOn = true; saveMatsu(); renderMe();
    toast('알림을 켰어요');
    return true;
  }catch(e){ console.error('[MATSU] 웹 푸시 실패:', e); toast('알림을 켜지 못했어요'); return false; }
}
async function disableWebPush(){
  try{
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if(sub){ await api('/push/unregister',{method:'POST',body:JSON.stringify({token:JSON.stringify(sub)})}).catch(()=>{}); await sub.unsubscribe(); }
  }catch(e){}
  state.pushOn = false; saveMatsu(); renderMe();
  toast('알림을 껐어요');
}

async function initNativePush(){
  if(!IS_NATIVE || !SERVER_OK) return;
  const P = window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications;
  if(!P) return;
  try{
    let perm = await P.checkPermissions();
    if(perm.receive !== 'granted') perm = await P.requestPermissions();
    if(perm.receive !== 'granted'){ return; }         // 거부해도 앱은 정상 동작

    P.addListener('registration', async (t)=>{        // APNs 토큰
      try{ await api('/push/register', {method:'POST', body: JSON.stringify({token:t.value, platform:'ios'})}); }catch(e){}
    });
    P.addListener('registrationError', ()=>{});
    P.addListener('pushNotificationReceived', (n)=>{  // 앱이 켜져 있을 때
      if(n && n.title) toast(n.title);
    });
    P.addListener('pushNotificationActionPerformed', ()=>{ go('home'); });
    await P.register();
  }catch(e){}
}
// 로그인 뒤에 등록해야 user_id 와 토큰이 묶인다
async function afterLoginNative(){ if(IS_NATIVE) setTimeout(initNativePush, 800); }

/* ═══════════ PWA ═══════════ */
// file:// 로 열었을 땐 서비스워커를 등록할 수 없다 (데모 모드).
if('serviceWorker' in navigator && location.protocol.startsWith('http') && !IS_NATIVE){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').then(reg=>{
      // 새 버전이 배포되면 알려준다
      reg.addEventListener('updatefound', ()=>{
        const nw = reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange', ()=>{
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            toast('새 버전이 있어요 · 앱을 다시 열면 적용돼요');
          }
        });
      });
    }).catch(()=>{});
  });
}
// 홈 화면 추가 안내 (안드로이드/크롬). iOS 는 공유 버튼을 눌러야 해서 별도 안내.
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); _installPrompt = e; });
function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
}
async function promptInstall(){
  if(_installPrompt){ _installPrompt.prompt(); _installPrompt = null; return; }
  const ios = /iPad|iPhone|iPod/.test(navigator.userAgent);
  toast(ios ? '공유 버튼 → "홈 화면에 추가" 를 눌러주세요' : '브라우저 메뉴에서 "앱 설치" 를 눌러주세요');
}
