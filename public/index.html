<head>

<title>MATSU · 데모</title>
<style>
  :root{
    /* ── bold cream + colorful-cards editorial palette ── */
    --ink:#1b1813;--ink2:#2c2619;--coral:#ec6a2e;--coral-d:#cf5418;--coral-s:#fbe8d7;
    --felt:#e1ea54;--felt-d:#c2cc2c;--cream:#f5f2e9;--cream2:#ece6d6;

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#cdbfae;font-size:15px;font-family:'Pretendard Variable',Pretendard,'SUIT Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;display:flex;justify-content:center;color:var(--ink);letter-spacing:-0.012em;line-height:1.55;word-break:keep-all}
  .app{width:100%;max-width:440px;min-height:100vh;background:var(--cream);position:relative;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.18)}

  .screen{display:none;animation:fade .25s ease}.screen.on{display:block}

  h2.t{font-size:25px;font-weight:800;margin:10px 4px 2px}
  p.sub{font-size:14px;color:var(--gray);margin:0 4px 16px;font-weight:500}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px}
  .ch{font-size:17px;font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}

  .note{font-size:12px;color:var(--lgray);font-weight:600;margin-top:9px;text-align:center;line-height:1.5}

  .info-banner .ic{width:38px;height:38px;border-radius:11px;background:var(--felt);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0}

  .clubrow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}

  .auth-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;background:linear-gradient(160deg,#1b1813,#244064);color:#fff;position:relative;overflow:hidden}

  /* ════════════════════════════════════════════════
     REDESIGN LAYER v2 — bold cream · colorful blocks · black ink
     refs: cream editorial type + saturated cards + dark floating nav
     ════════════════════════════════════════════════ */

  /* — warm cream backdrop — */
  body{ background:linear-gradient(180deg,#ece5d3 0%,#e3dbc8 100%); background-attachment:fixed; }
  .app{ background:var(--cream); }
  @media(min-width:480px){ .app{ border-radius:40px; box-shadow:0 30px 80px rgba(60,45,20,.28); } }

  /* — demo strip — */
  .demo-tag{ background:#efe7d5; color:#a08a5e; font-weight:700; letter-spacing:.2px; }

  /* — top bar / logo — */
  .appbar{ padding:18px 22px 4px; }
  .logo{ font-size:23px; font-weight:900; letter-spacing:-.7px; color:var(--ink); }
  .logo b{ color:var(--coral); }
  .bell{ width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow-s); }

  /* — SIGNATURE: oversized black editorial headline + short accent bar (golden-ratio scale) — */
  /* type scale φ≈1.6:  36 · 22 · 18 · 15(body) · 13 · 11.5 */
  h2.t{
    position:relative; font-size:36px; line-height:1.05; font-weight:900;
    letter-spacing:-.05em; color:var(--ink); margin:22px 4px 6px 0; padding-top:14px;
  }
  h2.t::before{
    content:""; position:absolute; left:0; top:0;
    width:30px; height:5px; border-radius:3px; background:var(--coral);
  }
  p.sub{ margin-left:0; margin-right:4px; color:var(--gray); font-weight:500; font-size:14.5px; line-height:1.5; }

  /* — section headers — */
  .ch{ font-size:18px; font-weight:900; letter-spacing:-.03em; color:var(--ink); }

  /* — warm cards, generous radius — */
  .card,.match,.item,.post,.sched,.clubrow,.composer,.bracket{
    background:#fffdf6; border-radius:24px; border:1px solid var(--line2); box-shadow:var(--shadow-s);
  }
  .card{ padding:18px; }

  /* — buttons: black ink pills (editorial / on-trend) — */
  .btn{
    background:var(--ink); color:#fff; border-radius:18px; padding:16px; font-weight:800;
    letter-spacing:-.02em; box-shadow:0 8px 20px rgba(27,24,19,.22);
  }
  .btn:active{ transform:translateY(1px); }
  .btn.ghost{ background:#fffdf6; border:1.8px solid var(--ink); color:var(--ink); box-shadow:var(--shadow-s); }
  .btn.felt{ background:var(--felt); color:var(--ink); box-shadow:0 8px 20px rgba(194,204,44,.35); }
  .btn.sm{ border-radius:13px; box-shadow:none; padding:9px 16px; }
  .btn.done{ background:#e9f6ec; color:#2f9159; box-shadow:none; }
  .btn.cancel{ background:#efe9da; color:#8b8170; box-shadow:none; }

  /* — chips & segments: black active pill — */
  .chip{ border-radius:20px; border:1.5px solid var(--line); background:#fffdf6; }
  .chip.on{ background:var(--ink); border-color:var(--ink); color:#fff; box-shadow:0 4px 12px rgba(27,24,19,.22); }
  .seg{ background:#ece6d5; border-radius:16px; padding:5px; }
  .seg .o{ border-radius:12px; }
  .seg .o.on{ background:var(--brand); color:#fff; box-shadow:0 3px 10px rgba(237,124,48,.20); }
  .cs.on{ background:var(--ink); border-color:var(--ink); color:#fff; }

  /* — SIGNATURE league hero: lavender colour block, ink text — */
  .info-banner{
    background:var(--purple); color:var(--ink); border-radius:24px; padding:18px;
    box-shadow:0 12px 28px rgba(150,120,220,.28); position:relative; overflow:hidden;
  }
  .info-banner::after{
    content:""; position:absolute; right:-26px; bottom:-34px; width:130px; height:130px;
    border-radius:42px; background:rgba(255,255,255,.20); transform:rotate(20deg);
  }
  .info-banner .ic{ background:var(--ink); color:var(--felt); border-radius:14px; }
  .info-banner .x b{ color:var(--ink); }
  .info-banner .x span{ color:#4a3f6b; }
  .info-banner .arr{ color:var(--ink); }

  /* — club hero: vibrant blue colour block — */
  .club-hd{
    border-radius:26px; padding:22px; color:#fff;
    background:linear-gradient(140deg,#8c6fd6 0%,#7079df 60%,#6f86e2 100%);
    box-shadow:0 16px 36px rgba(120,110,220,.32); position:relative; overflow:hidden;
  }
  .club-hd::after{
    content:""; position:absolute; right:-30px; top:-40px; width:150px; height:150px;

  /* — SIGNATURE login hero: cream editorial, huge black logo — */

  .auth-logo{ font-size:54px; font-weight:900; letter-spacing:-2px; color:var(--ink); }

  .auth-hero .court{ opacity:.10; }
  .sbtn{ border-radius:16px; }

  /* — FLOATING dark bottom nav, orange active — */
  .tabbar{
    left:14px; right:14px; bottom:14px; height:64px;
    background:var(--ink); border:none; border-radius:26px;
    box-shadow:0 14px 32px rgba(27,24,19,.40); padding:0 6px;
  }
  .tab{ position:relative; color:#8e8576; font-size:10.5px; gap:3px; border-radius:18px; margin:8px 2px; }

    content:""; position:absolute; top:7px; width:48px; height:34px;

  /* — bottom sheet — */
  .sheet{ border-radius:28px 28px 0 0; background:var(--cream); }
  .sheet::before{
    content:""; display:block; width:42px; height:5px; border-radius:3px;
    background:var(--lgray); margin:-8px auto 16px; opacity:.6;
  }

  /* — chat bubbles & misc — */
  .av2{ border-radius:16px; }
  .msg.me{ background:var(--ink); color:#fff; }
  .chatbar button{ background:var(--ink); box-shadow:0 6px 16px rgba(27,24,19,.22); }
  .chatbar input{ background:#fffdf6; }

  /* — photo placeholders → warm neutral — */
  .post .photo,.ph-mini{ background:linear-gradient(135deg,#efe7d6,#e4dac4); color:#a99e87; }

  /* — inputs — */
  .fld input,.search{ background:#fffdf6; }
  .fld input:focus{ border-color:var(--coral); box-shadow:0 0 0 3px rgba(236,106,46,.16); }

  /* — warm utility surfaces — */
  .opsbtn{ background:#f3eddd; border-color:#e6dfcc; }
  .opsbtn:active{ background:#ece4d1; }
  .note{ background:#f3eddd; }
  .miniseg div{ background:#ece6d5; color:#7a7163; }
  .miniseg div.on{ background:var(--ink); color:#fff; }
  .roletog{ background:#ece6d5; }
  .roletog div.on{ background:#fffdf6; color:var(--ink); }
  .stepper button{ background:var(--ink); }

  /* — tactile press feedback — */
  .clubrow,.chrow,.opsbtn,.ob-opt,.info-banner,.nrow,.card{ transition:transform .12s ease, box-shadow .12s ease; }
  .clubrow:active,.chrow:active,.opsbtn:active,.ob-opt:active,.info-banner:active{ transform:scale(.985); }

  /* — keyboard focus ring — */
  a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,
  .tab:focus-visible,.chip:focus-visible,.seg .o:focus-visible,.cs:focus-visible,
  .clubrow:focus-visible,.chrow:focus-visible,.ob-opt:focus-visible,.opsbtn:focus-visible{
    outline:2.5px solid var(--coral); outline-offset:2px; border-radius:12px;
  }

     PATTERN LAYER — reference layouts mapped to functions
     ════════════════════════════════════════════════ */

  /* ② Checkmyfile → stacked expandable TIER BANDS (실력 티어) */

  .tierband:active{ transform:scale(.99); }
  .tierband .tb-h{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .tierband .tb-l{ min-width:0; }
  .tierband .tb-n{ font-size:19px; font-weight:900; letter-spacing:-.03em; }

  /* ⑧ Affitto → amenity ICON ROW (경기·클럽 스펙 한눈에) */
  .amen-row{ display:flex; gap:6px; margin:13px 0; padding:13px 2px; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .amen{ flex:1; text-align:center; min-width:0; }
  .amen .am-ic{ width:40px; height:40px; border-radius:13px; background:var(--coral-s); color:var(--coral-d);
    display:flex; align-items:center; justify-content:center; font-size:17px; margin:0 auto 6px; }
  .amen .am-v{ font-size:13px; font-weight:800; color:var(--ink); letter-spacing:-.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .amen .am-l{ font-size:10.5px; color:var(--gray); font-weight:600; margin-top:1px; }

  /* ⑧ Affitto → club LISTING card (클럽 찾기) */
  .listing{ background:#fffdf6; border:1px solid var(--line2); border-radius:22px; padding:16px;
    margin-bottom:12px; box-shadow:var(--shadow-s); cursor:pointer; transition:transform .12s ease; }
  .listing:active{ transform:scale(.99); }
  .listing .ls-top{ display:flex; align-items:center; gap:13px; }
  .listing .ls-ic{ width:52px; height:52px; border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center;
    font-size:21px; font-weight:900; flex-shrink:0; }
  .listing .ls-x{ flex:1; min-width:0; }
  .listing .ls-n{ font-size:17px; font-weight:900; letter-spacing:-.03em; color:var(--ink); }
  .listing .ls-r{ font-size:12.5px; color:var(--gray); font-weight:600; margin-top:2px; }

  /* ⑤ Yoga → SESSION card (다가오는 모임) */
  .session{ background:#fffdf6; border:1px solid var(--line2); border-radius:20px; padding:15px 16px; margin-top:10px; box-shadow:var(--shadow-s); }
  .session .ss-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .session .ss-tag{ display:inline-block; font-size:11px; font-weight:800; padding:4px 11px; border-radius:20px; background:#ece6d5; color:var(--ink); }
  .session .ss-n{ font-size:16px; font-weight:900; letter-spacing:-.02em; margin-top:9px; }
  .session .ss-m{ font-size:12.5px; color:var(--gray); font-weight:600; margin-top:3px; }
  .session .ss-foot{ display:flex; align-items:center; justify-content:space-between; margin-top:12px; }

  /* ⑤ Yoga DASHBOARD — faithful reproduction (클럽 홈) */
  .greet{ display:flex; align-items:center; gap:12px; margin:4px 2px 16px; }
  .greet .gv-av{ width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#ec6a2e,#cf5418);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0; }
  .greet .gv-x{ flex:1;min-width:0; }
  .greet .gv-h{ font-size:20px;font-weight:900;letter-spacing:-.03em;color:var(--ink); }
  .greet .gv-d{ font-size:12.5px;color:var(--gray);font-weight:600;margin-top:3px;line-height:1.5; }
  .greet .gv-s{ width:42px;height:42px;border-radius:50%;background:#fffdf6;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:var(--shadow-s);flex-shrink:0;cursor:pointer; }

  .yhero{ position:relative; border-radius:28px; padding:22px; overflow:hidden; margin-bottom:16px;
    background:var(--purple); box-shadow:0 16px 32px rgba(150,120,220,.30); }
  .yhero .yh-n{ font-size:30px; font-weight:900; letter-spacing:-.04em; line-height:1.05; color:var(--ink); max-width:62%; }
  .yhero .yh-s{ font-size:13.5px; font-weight:700; color:#473c69; margin-top:9px; max-width:62%; }
  .yhero .yh-foot{ display:flex; align-items:center; gap:10px; margin-top:18px; }
  .yhero .yh-deco{ position:absolute; right:42px; top:50%; transform:translateY(-50%) rotate(8deg); font-size:62px; line-height:1; filter:drop-shadow(0 8px 12px rgba(0,0,0,.14)); pointer-events:none; }

  .plan2{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .psess{ border-radius:24px; padding:16px; cursor:pointer; position:relative; min-height:158px; display:flex; flex-direction:column; transition:transform .12s ease; }
  .psess:active{ transform:scale(.985); }
  .psess .ps-tag{ align-self:flex-start; font-size:11px; font-weight:800; padding:4px 12px; border-radius:20px; background:rgba(255,255,255,.6); color:var(--ink); }
  .psess .ps-n{ font-size:19px; font-weight:900; letter-spacing:-.03em; margin-top:12px; color:var(--ink); }
  .psess .ps-m{ font-size:12px; font-weight:700; color:rgba(27,24,19,.62); margin-top:7px; line-height:1.55; }
  .psess .ps-foot{ margin-top:auto; padding-top:12px; display:flex; align-items:center; gap:7px; }
  .psess .ps-av{ width:26px;height:26px;border-radius:50%;background:rgba(27,24,19,.20);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800; }
  .psess .ps-who{ font-size:11.5px;font-weight:700;color:rgba(27,24,19,.66);line-height:1.2; }
  .psess .ps-chk{ position:absolute; top:15px; right:15px; font-size:13px; font-weight:900; color:#1b7a4d; }

  .qlinks{ display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-top:11px; }
  .qlink{ background:#fffdf6; border:1px solid var(--line2); border-radius:18px; padding:13px 4px; text-align:center; cursor:pointer; box-shadow:var(--shadow-s); transition:transform .12s ease; }
  .qlink:active{ transform:scale(.97); }
  .qlink .ql-ic{ font-size:20px; } .qlink .ql-l{ font-size:11px; font-weight:700; color:var(--gray); margin-top:5px; }

  /* 6-tab nav fit */
  .tabbar{ padding:0 4px; }
  .tab{ font-size:9.5px; gap:2px; margin:8px 1px; }
  .tab svg{ width:20px; height:20px; }
  .tab.on::before{ width:42px; height:33px; }

  /* 시즌 배지 grid */
  .badgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:6px; }
  .badgi{ text-align:center; padding:15px 6px; border-radius:18px; background:#fffdf6; border:1px solid var(--line2); }
  .badgi.on{ background:var(--coral-s); border-color:transparent; }
  .badgi.off{ opacity:.42; filter:grayscale(.65); }
  .badgi .bg-e{ font-size:27px; line-height:1; }
  .badgi .bg-l{ font-size:11.5px; font-weight:800; margin-top:7px; color:var(--ink); }

  /* 개인 랭킹 rows */
  .lbrow{ display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:16px; margin-bottom:7px; background:#fffdf6; border:1px solid var(--line2); }
  .lbrow.me{ background:var(--purple); border-color:transparent; box-shadow:0 6px 16px rgba(150,120,220,.25); }
  .lbrow .lb-rk{ width:24px; text-align:center; font-weight:900; font-size:15px; flex-shrink:0; }
  .lb-av{ display:flex; align-items:center; justify-content:center; line-height:1; }
  .lbrow .lb-av{ width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0; }
  .lbrow .lb-x{ flex:1; min-width:0; }
  .lbrow .lb-n{ font-weight:800; font-size:14.5px; color:var(--ink); }
  .lbrow .lb-s{ font-size:11.5px; color:var(--gray); font-weight:600; margin-top:1px; }
  .lbrow.me .lb-s{ color:#4a3f6b; }
  .lbrow .lb-r{ font-weight:900; font-size:15px; color:var(--coral-d); }
  .lbrow.me .lb-r{ color:var(--ink); }
  .lbrow .lb-mv{ font-size:11px; font-weight:800; width:28px; text-align:right; flex-shrink:0; }

  /* 온보딩 인트로 */
  .ob-intro{ text-align:center; padding:20px 6px 4px; }
  .ob-intro .ob-ic{ font-size:64px; line-height:1; margin-bottom:12px; }
  .ob-intro h3{ font-size:25px; font-weight:900; letter-spacing:-.03em; line-height:1.16; }
  .ob-intro .obs{ margin-top:12px; }

  /* 접근성 — 큰 글씨 / 고대비 */
  .app.a11y-big{ zoom:1.14; }
  .app.a11y-contrast{ --ink:#000; --ink2:#191307; --gray:#45402f; --lgray:#6a6150; --line:#c6bca5; --line2:#c6bca5; }
  @media (prefers-contrast: more){ :root{ --gray:#574f3d; --lgray:#6f6654; } }
  /* 최소 탭 타깃 */
  .qlink, .toolrow, .lbrow, .badgi, .chip, .o{ min-height:44px; }

  /* 소개 한 장 요약 (피치) */
  .pitch h4{ font-size:13px; font-weight:900; color:var(--coral-d); letter-spacing:.04em; margin:0 4px 8px; text-transform:uppercase; }
  .pitch .p-flow{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .pitch .p-node{ background:var(--coral-s); color:var(--ink); border-radius:12px; padding:9px 12px; font-size:12.5px; font-weight:800; }
  .pitch .p-arr{ color:var(--lgray); font-weight:900; }
  .pitch .p-metric{ text-align:center; padding:14px 6px; background:#fffdf6; border:1px solid var(--line2); border-radius:18px; }
  .pitch .p-metric .pm-v{ font-size:24px; font-weight:900; color:var(--coral-d); letter-spacing:-.02em; }
  .pitch .p-metric .pm-l{ font-size:11px; color:var(--gray); font-weight:700; margin-top:3px; }

  /* 대진 — 라운드 블록 디자인 (업로드 admin/member 이식) */
  .round-block{ background:#fffdf6; border:1px solid var(--line2); border-radius:20px; box-shadow:var(--shadow-s); margin-bottom:12px; overflow:hidden; }
  .round-top{ padding:13px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); }
  .round-name{ font-size:16px; font-weight:900; color:var(--ink); letter-spacing:-.02em; }
  .round-mode{ font-size:12px; font-weight:800; color:var(--coral-d); background:var(--coral-s); padding:4px 11px; border-radius:8px; }
  .round-body{ padding:11px 12px; display:flex; flex-direction:column; gap:8px; }
  .court-line{ display:flex; align-items:center; gap:10px; padding:11px 13px; border-radius:13px; flex-wrap:wrap; }
  .court-tag{ font-size:12px; font-weight:800; color:var(--gray); min-width:44px; letter-spacing:.2px; }
  .ct-type{ font-size:11px; font-weight:800; padding:2px 8px; border-radius:6px; }
  .match-group{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; flex:1; }
  .team-pair{ display:flex; gap:5px; flex-wrap:wrap; }
  .p-chip{ background:#fffdf6; border:1.5px solid var(--line2); border-radius:9px; padding:5px 11px; font-size:13.5px; font-weight:700; white-space:nowrap; color:var(--ink); }
  .p-chip.me{ border-color:var(--coral); color:var(--coral-d); background:var(--coral-s); }
  .vs-label{ font-size:11px; font-weight:900; color:var(--lgray); letter-spacing:1px; }
  .wait-line{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; padding:9px 13px; background:var(--cream2); border-radius:11px; }
  .wait-tag{ font-size:12px; font-weight:800; color:var(--gray); min-width:28px; }
  .wait-chip{ background:#fffdf6; border:1px solid var(--line2); border-radius:7px; padding:4px 10px; font-size:12.5px; color:var(--gray); font-weight:600; }

  /* 로그인 — bleet 스타일 (로고 + 후기 슬라이드) */
  .auth2{ flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; justify-content:safe center; padding:14px 0; gap:clamp(10px,2.6vh,32px); background:linear-gradient(180deg,#f7f3e8,#efe6d2); padding:clamp(10px,2.4vh,26px) 0 max(clamp(10px,2.4vh,26px),env(safe-area-inset-bottom)); }
  .auth2-top{ flex:0 0 auto; display:flex; flex-direction:column; justify-content:flex-start; }
  .auth2-logo{ text-align:center; font-size:clamp(34px,6vh,52px); font-weight:900; letter-spacing:-3px; color:var(--ink); }
  .auth2-logo b{ color:var(--coral); }
  .rowic{ width:34px;height:34px;border-radius:50%;background:var(--cream2);display:flex;align-items:center;justify-content:center;color:var(--ink);flex:none; }
  .mtile{ display:flex; flex-direction:column; align-items:center; gap:7px; cursor:pointer; color:var(--ink); }
  .mtile>div{ font-size:12.5px; font-weight:800; }
  .qlink .ql-ic{ display:flex; align-items:center; justify-content:center; height:26px; font-size:21px; line-height:1; color:var(--ink); }
  .tr-ic svg{ display:block; }
  .uic{ display:inline-block; vertical-align:-.18em; flex:none; margin-right:4px; }
  .bic .uic, .am-ic .uic, .ql-ic .uic, .ei .uic, .tr-ic .uic, .rowic .uic, .lu-ic .uic,
  .mtile .uic, .qlink .uic, .search .uic, .ob-ic .uic, .phc .uic{ margin-right:0; }
  .bic{ display:inline-flex; align-items:center; justify-content:center; gap:7px; }
  .am-ic svg, .ql-ic svg, .ei svg, .tr-ic svg, .search svg{ display:block; margin:0 auto; }
  .am-ic{ display:flex; align-items:center; justify-content:center; color:var(--gray); line-height:1; }
  .amen .am-ic{ height:24px; font-size:20px; }
  .ei{ display:flex; justify-content:center; color:var(--lgray); }
  .search{ display:flex; align-items:center; gap:8px; color:var(--gray); }
  .ps-m{ display:flex; flex-direction:column; gap:4px; }
  .ps-m span{ display:flex; align-items:center; gap:5px; }
  /* — 개인 리포트 — */
  .rp-hero{ background:linear-gradient(140deg,#2f2a24,#1b1813); border-radius:20px; padding:18px 18px 16px; color:#fff; margin-bottom:14px; }
  .rp-hn{ font-size:13px; font-weight:800; color:#cbb8a6; letter-spacing:-.01em; }
  .rp-grid{ display:flex; margin-top:12px; text-align:center; }
  .rp-grid>div{ flex:1; }
  .rp-grid>div+div{ border-left:1px solid rgba(255,255,255,.12); }
  .rp-grid b{ display:block; font-size:22px; font-weight:900; letter-spacing:-.03em; }
  .rp-grid b i{ font-style:normal; font-size:12px; font-weight:700; color:#cbb8a6; margin:0 1px 0 1px; }
  .rp-grid span{ display:block; font-size:11px; font-weight:700; color:#a99e8d; margin-top:3px; }
  .rp-grid b.up{ color:var(--felt); } .rp-grid b.dn{ color:#f0907a; }
  .rp-form{ display:flex; gap:7px; }
  .rp-f{ width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900; }
  .rp-f.w{ background:#e7f4ec; color:#1f7d4d; } .rp-f.l{ background:#fbeae6; color:#c0503a; }
  .rp-fcap{ font-size:11.5px; font-weight:700; color:var(--lgray); margin-top:8px; font-variant-numeric:tabular-nums; }
  .rp-bar{ margin-top:14px; }
  .rp-bar+.rp-bar{ border-top:1px solid #f4efe9; padding-top:14px; }
  .rp-bl{ display:flex; justify-content:space-between; align-items:baseline; font-size:13px; font-weight:800; color:var(--ink); }
  .rp-bl b{ font-size:16px; font-weight:900; }
  .rp-track{ height:9px; border-radius:6px; background:#efe9dd; margin-top:7px; overflow:hidden; }
  .rp-track i{ display:block; height:100%; border-radius:6px; background:var(--brand); }
  .rp-track.club{ height:5px; margin-top:4px; opacity:.55; }
  .rp-track.club i{ background:var(--lgray); }
  .rp-cap{ font-size:11px; font-weight:700; color:var(--gray); margin-top:6px; }
  .rp-row{ display:flex; align-items:center; gap:9px; padding:9px 2px; }
  .rp-row+.rp-row{ border-top:1px solid #f7f3ec; }
  .rp-nm{ width:66px; font-size:13px; font-weight:800; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rp-mini{ flex:1; height:7px; border-radius:5px; background:#efe9dd; overflow:hidden; }
  .rp-mini i{ display:block; height:100%; border-radius:5px; }
  .rp-row b{ width:38px; text-align:right; font-size:13px; font-weight:900; }
  .rp-row em{ width:56px; text-align:right; font-style:normal; font-size:11px; font-weight:700; color:var(--lgray); }
  b.up,.rp-row b.up{ color:#1f7d4d; } b.dn,.rp-row b.dn{ color:#c0503a; }
  /* — 한울 수기 기록표 — */
  .sh-ov{ position:fixed; inset:0; background:rgba(27,24,19,.55); z-index:80; overflow-y:auto;
          padding:26px 12px; -webkit-overflow-scrolling:touch; }
  .sh-panel{ max-width:640px; margin:0 auto; background:#fdfbf4; border-radius:22px; padding:20px 18px 26px;
             box-shadow:0 24px 60px rgba(0,0,0,.35); }
  .sh-head{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; }
  .sh-eye{ font-size:11px; font-weight:900; letter-spacing:1.4px; color:var(--coral-d); }
  .sh-title{ font-size:24px; font-weight:900; letter-spacing:-.04em; color:var(--ink); margin-top:3px; }
  .sh-x{ width:34px;height:34px;border:none;border-radius:50%;background:#efe9dd;color:var(--gray);
         font-size:20px;cursor:pointer;font-family:inherit;line-height:1; }
  .sh-court{ border:1.5px solid #e3d9c4; border-radius:16px; padding:15px 14px; margin-bottom:16px; background:#fff; }
  .sh-ct{ font-size:16px; font-weight:900; color:var(--ink); letter-spacing:-.02em; }
  .sh-ct span{ font-size:11.5px; font-weight:700; color:var(--gray); margin-left:6px; }
  .sh-sub{ font-size:12.5px; font-weight:800; color:var(--ink); margin:12px 0 7px; }
  .sh-sub span{ color:#b3a894; font-weight:700; }
  .sh-sched{ width:100%; border-collapse:collapse; }
  .sh-sched td{ border:1px solid #e6ddc9; padding:7px 9px; font-size:13px; font-weight:700; }
  .sh-sched td.g{ width:78px; color:var(--gray); background:#faf7ef; font-size:12px; }
  .sh-sched td.code{ font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:15px;
                     font-weight:800; letter-spacing:2px; color:var(--ink); }
  .sh-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .sh-grid{ border-collapse:collapse; width:100%; min-width:520px; }
  .sh-grid th,.sh-grid td{ border:1px solid #e6ddc9; padding:6px 5px; text-align:center;
                           font-size:11.5px; font-weight:700; white-space:nowrap; }
  .sh-grid th{ background:#f6f1e5; color:var(--gray); font-weight:800; font-size:11px; }
  .sh-grid th.grp{ background:#efe8d8; }
  .sh-grid td.nm{ font-weight:800; color:var(--ink); font-size:12.5px; text-align:left; padding-left:8px; }
  .sh-grid td.lblM,.sh-grid td.lblF{ width:30px; }
  .sh-grid td.lblM span{ display:inline-block;width:20px;height:20px;line-height:20px;border-radius:6px;
                         background:#e7eefb;color:#3f6bc2;font-weight:900; }
  .sh-grid td.lblF span{ display:inline-block;width:20px;height:20px;line-height:20px;border-radius:6px;
                         background:#fbe7f2;color:#d6336c;font-weight:900; }
  .sh-grid td.set{ font-variant-numeric:tabular-nums; }
  .sh-grid td.set.win{ background:#eef7ee; color:#2f7a4d; font-weight:900; }
  .sh-grid td.set.empty{ color:#d5cabc; }
  .sh-grid td.pos{ color:#2f7a4d; } .sh-grid td.neg{ color:#c0392b; }
  .sh-grid td.rk{ font-weight:900; color:var(--ink); background:#faf7ef; }
  .sh-grid tr.me td{ background:#fdf3ea; }
  .sh-grid tr.me td.nm{ color:var(--coral-d); }
  /* — 스코어 입력 (크게) — */
  .sc-row{ display:flex; align-items:center; justify-content:center; gap:9px; margin-top:10px; }
  .sc-lb{ font-size:11px; font-weight:800; color:var(--lgray); width:38px; text-align:center; }
  .sc-in{ width:62px; height:52px; text-align:center; border:2px solid var(--line);
          border-radius:14px; font-size:24px; font-weight:900; font-family:inherit;
          background:#fff; color:var(--ink); outline:none; transition:.12s;
          font-variant-numeric:tabular-nums; -moz-appearance:textfield; }
  .sc-in:focus{ border-color:var(--brand); box-shadow:0 0 0 4px rgba(237,124,48,.14); }
  .sc-in::placeholder{ color:#d8cfc0; font-weight:700; }
  .sc-co{ font-size:19px; font-weight:900; color:var(--lgray); }
  .sc-row.done .sc-in{ border-color:#cfe2b8; background:#f7fbf3; }
  /* 코트 박스 안의 시작/타이머 */
  .court-line .bk-ctrl{ width:100%; margin:9px 0 0; justify-content:flex-end; }
  .bk-chip.playing{ background:#fdf2dd; color:#c47d10; }
  .bk-chip.playing em{ font-style:normal; font-weight:700; opacity:.7; margin-left:3px; font-size:10.5px; }
  .bk-dot{ width:6px;height:6px;border-radius:50%;background:#e0912a; animation:bkpulse 1.1s infinite; }
  @keyframes bkpulse{ 0%,100%{opacity:1} 50%{opacity:.25} }
  .bk-btn.go{ display:inline-flex; align-items:center; gap:5px; padding:8px 16px; font-size:12.5px; }
  /* — 대진 운영(라이브) 레이어 — */
  .bk-nav{ display:flex; gap:7px; overflow-x:auto; padding:2px 0 12px; scrollbar-width:none; }
  .bk-nav::-webkit-scrollbar{ display:none; }
  .bk-n{ flex:0 0 auto; padding:8px 13px; border-radius:999px; font-size:12.5px; font-weight:800;
         background:#efe9dd; color:var(--gray); white-space:nowrap; }
  .bk-n.now{ background:#e7f4ec; color:#1f7d4d; }
  .bk-n.playing{ background:#fdf2dd; color:#c47d10; }
  .bk-n.done{ background:#e7eefb; color:#5b7fd4; }
  .bk-next{ display:flex; align-items:center; gap:12px; background:#fffdf6; border:1px solid var(--line2);
            border-radius:18px; padding:14px 15px; margin-bottom:12px; box-shadow:var(--shadow-s); }
  .bk-next.done{ background:#f1f8f3; border-color:#cfe6d8; }
  .bk-next-ic{ width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none; }
  .bk-next-x{ flex:1; min-width:0; }
  .bk-next-t{ font-size:14px; font-weight:900; letter-spacing:-.02em; color:var(--ink); }
  .bk-next-d{ font-size:12px; font-weight:700; color:var(--gray); margin-top:2px; }
  .bk-chip{ display:inline-flex; align-items:center; gap:4px; padding:5px 10px; border-radius:999px;
            font-size:11.5px; font-weight:800; white-space:nowrap; }
  .bk-chip b{ font-variant-numeric:tabular-nums; font-weight:900; }
  .bk-btn{ border:none; border-radius:999px; padding:6px 13px; font-size:11.5px; font-weight:900;
           font-family:inherit; cursor:pointer; }
  .bk-btn.go{ background:var(--ink); color:#fff; }
  .bk-btn.stop{ background:#fff; color:var(--gray); border:1px solid var(--line); margin-left:5px; }
  .bk-ctrl{ margin-left:auto; display:flex; align-items:center; flex:none; }
  .bk-warn{ display:flex; align-items:flex-start; gap:9px; background:#fdeee6; border:1px solid #f3c9ac;
            border-radius:14px; padding:12px 14px; margin-bottom:12px; font-size:12.5px; font-weight:700;
            color:#b85c2e; line-height:1.5; }
  .bk-help{ display:flex; align-items:flex-start; gap:9px; background:#f0faf5; border:1px solid #cdeade;
            border-radius:14px; padding:12px 14px; margin-bottom:12px; font-size:12.5px; font-weight:700;
            color:#1f4536; line-height:1.5; }
  .bk-help em{ display:block; font-style:normal; font-weight:800; color:#12805e; margin-top:4px; font-size:13px; }
  /* — 라인업 카드 — */
  .lu{ background:var(--coral-s); border:1px solid rgba(236,106,46,.18); }
  .lu.ok{ background:#e9f6ee; border-color:rgba(63,158,110,.28); }
  .lu-top{ display:flex; align-items:flex-start; gap:11px; }
  .lu-ic{ width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;flex:none;box-shadow:0 2px 6px rgba(27,24,19,.10); }
  .lu-x{ flex:1; min-width:0; }
  .lu-n{ font-size:14.5px; font-weight:900; letter-spacing:-.02em; color:var(--ink); }
  .lu-d{ font-size:12px; font-weight:700; color:#8a5a33; margin-top:2px; line-height:1.45; }
  .lu.ok .lu-d{ color:#3c6f52; }
  .lu-cd{ display:flex; justify-content:space-between; font-size:11.5px; font-weight:800; color:#8a5a33; }
  .lu-btns{ display:flex; gap:9px; margin-top:14px; }
  .lu-btns .btn{ flex:1; }
  .btn.sm{ padding:11px; font-size:14px; }
  .btn:disabled{ background:#d9cfc2; color:#fff; cursor:not-allowed; box-shadow:none; }
  .lu-note{ font-size:11.5px; font-weight:700; color:#9a7a5e; margin-top:10px; line-height:1.5; }
  .lu-demo{ color:var(--coral-d); text-decoration:underline; cursor:pointer; margin-left:4px; }
  /* — 클럽 로고 — */
  .clogo{ display:inline-flex; align-items:center; justify-content:center; border-radius:50%;
          color:#fff; flex:none; line-height:1; box-shadow:0 2px 6px rgba(27,24,19,.16); }
  .clabel{ display:inline-flex; align-items:center; gap:8px; min-width:0; }
  .clabel>span:last-child{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lgrid{ display:grid; grid-template-columns:repeat(6,1fr); gap:9px; }
  .lopt{ aspect-ratio:1; border-radius:50%; display:flex; align-items:center; justify-content:center;
         font-size:22px; background:#fffdf6; border:2px solid var(--line2); cursor:pointer; }
  .lopt.on{ border-color:var(--coral); background:var(--coral-s); }
  .lopt.bgopt{ border:3px solid transparent; box-shadow:0 0 0 2px var(--line2); }
  .lopt.bgopt.on{ box-shadow:0 0 0 3px var(--coral); }
  /* — 프로필 사진 원형 그리드 — */
  .phgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .phc{ position:relative; aspect-ratio:1; border-radius:22px; cursor:pointer;
        display:flex; align-items:center; justify-content:center; overflow:visible;
        background:#f1ede3; border:2px dashed #cabfa9; transition:.14s; }
  .phc.on{ background:linear-gradient(140deg,#cfd8e6,#a9b6c8); border:2px solid transparent;
           box-shadow:0 4px 12px rgba(27,24,19,.10); }
  .phc:active{ transform:scale(.96); }
  .phc .ph-em{ font-size:30px; line-height:1; }
  .phc .ph-plus{ font-size:26px; color:var(--lgray); line-height:1; }
  .phc .ph-main{ position:absolute; top:8px; left:8px;
                 background:var(--coral); color:#fff; border-radius:999px;
                 padding:2px 9px; font-size:10.5px; font-weight:900; white-space:nowrap; }
  /* — 종목 선택 캡슐 — */
  .spcaps{ display:flex; flex-direction:column; gap:9px; }
  .spcap{ display:flex; align-items:center; gap:13px; width:100%; padding:13px 16px;
          border-radius:999px; background:#fffdf6; border:2px solid var(--line2);
          cursor:pointer; transition:.14s; }
  .spcap:active{ transform:scale(.985); }
  .spcap.on{ background:var(--coral-s); border-color:var(--coral); }
  .spcap .sc-ic{ width:42px; height:42px; border-radius:50%; background:var(--cream2);
                 display:flex; align-items:center; justify-content:center; font-size:22px; flex:none; }
  .spcap.on .sc-ic{ background:#fff; }
  .spcap .sc-x{ flex:1; min-width:0; text-align:left; }
  .spcap .sc-n{ font-size:15.5px; font-weight:900; letter-spacing:-.02em; color:var(--ink); }
  .spcap .sc-d{ font-size:11.5px; font-weight:700; color:var(--gray); margin-top:1px; }
  .spcap .sc-ck{ width:22px; height:22px; border-radius:50%; flex:none;
                 border:2px solid var(--line2); background:#fff; }
  .spcap.on .sc-ck{ border-color:var(--coral); background:var(--coral);
                    box-shadow:inset 0 0 0 3px #fff; }
  /* — 날씨 (캡슐 없음, 아이콘 + 텍스트) — */
  .wx{ display:inline-flex; align-items:center; gap:6px; white-space:nowrap; line-height:1; vertical-align:middle; }
  .wx .wx-i{ width:17px; height:17px; flex:none; display:block; }
  .wx .wx-t{ font-size:14px; font-weight:900; letter-spacing:-.03em; color:inherit; font-variant-numeric:tabular-nums; }
  .wx .wx-d{ font-size:12.5px; font-weight:700; color:inherit; opacity:.72; letter-spacing:-.01em; }
  .wx .wx-dot{ width:3px; height:3px; border-radius:50%; background:currentColor; opacity:.35; flex:none; }
  /* — MATSU 브랜드: 마스코트 심볼(+ 로그인 전용 워드마크) — */
  .mk{ display:block; width:auto; aspect-ratio:834/714; flex:none; }
  .brand{ display:inline-flex; align-items:center; }
  .brand .wm{ font-family:'Pretendard Variable',Pretendard,sans-serif;
              font-weight:900; letter-spacing:-.02em; line-height:1;
              color:var(--ink); white-space:nowrap; }
  .logo .mk{ height:30px; }
  .pitch-logo .mk{ height:22px; }
  /* 로그인: 심볼 위, 워드마크 아래 (세로 락업) */
  .auth2-logo .brand{ flex-direction:column; gap:clamp(5px,1.2vh,13px); }
  .auth2-logo .mk{ height:clamp(46px,10vh,100px); }
  .auth2-logo .wm{ font-size:clamp(22px,4.2vh,38px); }
  .auth2-logo .dot{ display:inline-block; width:11px; height:11px; border-radius:50%; background:var(--ink); margin-left:5px; vertical-align:6px; }
  .auth2-sub{ text-align:center; font-size:clamp(16px,2.2vh,19px); font-weight:900; color:var(--ink); letter-spacing:-.02em; margin:clamp(9px,1.6vh,14px) 22px clamp(10px,1.8vh,16px); line-height:1.3; }
  .rev-track{ display:flex; overflow-x:auto; scroll-snap-type:x mandatory; gap:14px; padding:4px 30px 0; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .rev-track::-webkit-scrollbar{ display:none; }
  .rev-card{ flex:0 0 84%; scroll-snap-align:center; background:#fff; border-radius:24px; padding:clamp(16px,2.6vh,24px) 22px; box-shadow:0 12px 30px rgba(120,100,60,.14); }
  .rev-card .rv-t{ font-size:21px; font-weight:900; color:var(--ink); letter-spacing:-.02em; line-height:1.25; }
  .rev-card .rv-b{ font-size:15px; color:#4a453b; font-weight:500; line-height:1.55; margin-top:12px; min-height:clamp(36px,6.4vh,70px); white-space:pre-line; }
  .rev-card .rv-f{ display:flex; align-items:center; gap:10px; margin-top:16px; }
  .rev-card .rv-av{ width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#f0a9cf,#b9a6ea); flex-shrink:0; }
  .rev-card .rv-who{ flex:1; font-size:13.5px; font-weight:700; color:var(--gray); }
  .rev-card .rv-time{ font-size:13.5px; color:var(--lgray); font-weight:600; }
  .rev-dots{ display:flex; justify-content:center; gap:6px; margin-top:clamp(9px,1.5vh,15px); }
  .rev-dots i{ width:7px; height:7px; border-radius:50%; background:#d8cdb5; transition:.2s; }
  .rev-dots i.on{ background:var(--coral); width:20px; border-radius:4px; }
  .auth2-btns{ padding:0 22px; display:flex; flex-direction:column; gap:11px; }
  .sbtn2{ display:flex; align-items:center; background:#fff; border:none; border-radius:30px; padding:clamp(13px,1.9vh,17px) 20px; font-family:inherit; font-size:16px; font-weight:800; color:var(--ink); cursor:pointer; box-shadow:0 3px 10px rgba(120,100,60,.12); position:relative; }
  .sbtn2 .ic{ width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; position:absolute; left:20px; }
  .sbtn2 .lbl{ flex:1; text-align:center; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
  }
</style>

    if(p==='kakao' && SERVER_OK && KAKAO_JS_KEY){ await kakaoLogin(); toast('카카오로 로그인했어요'); }
    else if(SERVER_OK){ await devLogin(nm); toast('서버 계정으로 로그인했어요'); }
    else { /* 데모 모드 */ }
  }catch(e){
    const msg=String(e.message||e);
    if(msg==='no_kakao_key') toast('카카오 키가 설정되지 않았어요 · 데모로 진행합니다');

  }
  await loadClubIds();

/* ═══════════ 서버 연결 (Railway · server.js) ═══════════
   · 같은 도메인에서 서빙되면 자동으로 API를 씀 (public/index.html)
   · 서버가 없으면(file:// 로 열거나 /health 실패) 데모 모드로 자동 폴백
   · 카카오: JS 키를 넣으면 실제 로그인 → POST /auth/kakao 로 우리 JWT 발급  */
const KAKAO_JS_KEY = '';                       // ← developers.kakao.com 의 JavaScript 키
const API_BASE = (location.protocol==='http:'||location.protocol==='https:') ? location.origin : '';
const TOKEN_KEY = 'matsu_jwt';
let SERVER_OK = false;

function authToken(){ try{ return localStorage.getItem(TOKEN_KEY); }catch(e){ return null; } }
async function api(path, opts){
  const t = authToken();
  const r = await fetch(API_BASE + path, {
    ...opts,
    headers: { 'Content-Type':'application/json', ...(t?{Authorization:'Bearer '+t}:{}) , ...((opts&&opts.headers)||{}) },
  });
  if(!r.ok) throw new Error((await r.text().catch(()=>'')) || ('HTTP '+r.status));
  return r.json();
}
async function checkServer(){
  if(!API_BASE) return false;
  try{
    const c = new AbortController(); setTimeout(()=>c.abort(), 2500);
    const r = await fetch(API_BASE + '/health', {signal:c.signal});
    SERVER_OK = r.ok;
  }catch(e){ SERVER_OK = false; }
  const el = document.getElementById('srvTag');
  if(el){ el.textContent = SERVER_OK ? '서버 연결됨 · 실제 계정으로 로그인' : '데모 · 실제 결제·예약은 작동하지 않습니다'; el.className = 'demo-tag' + (SERVER_OK?' live':''); }
  return SERVER_OK;
}
function saveSession(d){
  try{ localStorage.setItem(TOKEN_KEY, d.token); }catch(e){}
  state.userName = d.user.name || state.userName;
  state.serverUser = d.user;
  if(d.user.anon_nick) state.anonNick = d.user.anon_nick;
}

/* 카카오: SDK → access_token → 서버가 검증 후 우리 JWT 발급 */
async function kakaoLogin(){
  if(!SERVER_OK) throw new Error('server_down');
  if(!KAKAO_JS_KEY) throw new Error('no_kakao_key');
  if(typeof Kakao==='undefined') throw new Error('no_kakao_sdk');
  if(!Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY);
  const at = await new Promise((ok,ng)=>Kakao.Auth.login({success:r=>ok(r.access_token), fail:ng}));
  saveSession(await api('/auth/kakao', {method:'POST', body:JSON.stringify({access_token:at})}));
}
/* 서버는 살아있지만 카카오 키가 없을 때 — 실제 DB 계정 생성 */
async function devLogin(name){
  saveSession(await api('/auth/dev-login', {method:'POST',
    body: JSON.stringify({name, provider:'kakao', gender:state.gender||'남성', region:'경기 용인', sport:state.sport})}));
}

/* ═══════════ 대진 서버 동기화 ═══════════
   저장 형태: data = { fmt, cfg, attendees }
   대진 편성은 cfg.seed 기반 결정론이라, 임원진이 발행한 cfg 로
   회원 기기에서 같은 대진이 그대로 재현된다 (전체 라운드를 전송할 필요 없음).   */
let CLUB_IDS = {};          // 클럽 이름 → 서버 id
let BK_ID = null;           // 현재 대진 id
let BK_POLL = null, BK_SEEN = 0;
const _scoreDebounce = {};

function clubId(){ return CLUB_IDS[state.activeClub] || null; }
async function loadClubIds(){
  if(!SERVER_OK) return;
  try{ (await api('/clubs')).forEach(c=>{ CLUB_IDS[c.name] = c.id; }); }catch(e){}
}

/* 서버 → 앱 */
async function bkPull(){
  const cid = clubId();
  if(!SERVER_OK || !cid) return false;
  try{
    const b = await api(`/clubs/${cid}/brackets/latest`);
    BK_ID = b.id; BK_SEEN = b.updated_at;
    const d = b.data || {};
    if(d.cfg) Object.assign(state.bcfg, d.cfg);
    if(d.fmt) state.bracketFmt = d.fmt;
    state._pubRoster = Array.isArray(d.attendees) && d.attendees.length ? d.attendees : null;
    bkApplyLive(b.scores, b.timers);
    const c = AC();
    if(c) c.published = b.published ? {fmt:b.fmt, cfg:d.cfg, ts:b.updated_at} : null;
    return true;
  }catch(e){ BK_ID = null; return false; }
}
function bkApplyLive(scores, timers){
  state.bcfg.scores = {};
  Object.entries(scores||{}).forEach(([k,v])=>{
    state.bcfg.scores[k] = { a: v.a==null?'':String(v.a), b: v.b==null?'':String(v.b) };
  });
  bkState().startedAt = { ...(timers||{}) };
}

/* 앱 → 서버 */
async function bkPush(publish){
  const cid = clubId();
  if(!SERVER_OK || !cid) return null;
  const b = state.bcfg;
  // renderBracket 이 실제로 편성에 쓴 명단을 그대로 저장해야 회원 기기에서 동일 대진이 재현된다
  const data = { fmt: state.bracketFmt, attendees: (state._roster||[]).slice(),
    cfg: {people:b.people, courts:b.courts, date:b.date, lateNames:[...b.lateNames], lateAfter:b.lateAfter, seed:b.seed} };
  const r = await api(`/clubs/${cid}/brackets`, {method:'POST', body: JSON.stringify({
    sport: state.sport, fmt: state.bracketFmt, date: b.date, courts: b.courts, data, publish: publish?1:0 })});
  BK_ID = r.id;
  return r;
}
function bkSyncScore(key){
  if(!SERVER_OK || !BK_ID) return;
  clearTimeout(_scoreDebounce[key]);
  _scoreDebounce[key] = setTimeout(async ()=>{
    const v = state.bcfg.scores[key] || {};
    const a = v.a==='' || v.a===undefined ? null : +v.a;
    const bb = v.b==='' || v.b===undefined ? null : +v.b;
    try{ await api(`/brackets/${BK_ID}/scores/${encodeURIComponent(key)}`, {method:'PUT', body: JSON.stringify({a, b:bb})}); }
    catch(e){ toast('점수 저장 실패 · 잠시 후 다시 시도해 주세요'); }
  }, 350);
}
async function bkSyncTimer(key){
  if(!SERVER_OK || !BK_ID) return;
  try{ await api(`/brackets/${BK_ID}/timer/${encodeURIComponent(key)}`, {method:'POST'}); }catch(e){}
}

/* 폴링 — 다른 사람이 넣은 점수·타이머 반영 */
function bkStopPoll(){ if(BK_POLL){ clearInterval(BK_POLL); BK_POLL=null; } }
function bkStartPoll(){
  bkStopPoll();
  if(!SERVER_OK || !BK_ID) return;
  BK_POLL = setInterval(async ()=>{
    if(state.view!=='bracket'){ bkStopPoll(); return; }
    if(document.activeElement && document.activeElement.classList.contains('sc-in')) return;  // 입력 중엔 건드리지 않음
    try{
      const l = await api(`/brackets/${BK_ID}/live`);
      if(l.updated_at === BK_SEEN) return;
      BK_SEEN = l.updated_at;
      bkApplyLive(l.scores, l.timers);
      renderBracket();
    }catch(e){}
  }, 4000);
}

function nextSeasonName(cur){
  const order=['봄','여름','가을','겨울']; const m=cur.match(/(\d{4})\s*(봄|여름|가을|겨울)/);
  if(!m) return cur; let y=+m[1], idx=order.indexOf(m[2]); idx++; if(idx>3){idx=0;y++;}
  return `${y} ${order[idx]} 시즌`;
}

function _rng(seed){let x=seed*9301+49297;return ()=>{x=(x*9301+49297)%233280;return x/233280;};}
function buildClubSchedule(players,courts,lateNames,lateAfter,seed,opts){
  const GAMES=4; const n=players.length; if(n<2) return {rounds:[],gc:[],type:'none',rcount:0,helper:0};
  const dbl=n>=4; const per=dbl?4:2;
  const mpr=Math.max(1,Math.min(courts,Math.floor(n/per)));
  // 헬퍼: 출전 가능 인원이 코트를 못 채우거나 균등이 안 맞을 때 필요한 자리
  const rem=n%per; const helper=(dbl&&rem!==0)?(per-rem):0;
  const startR=Array(n).fill(0);
  (lateNames||[]).forEach(nm=>{const i=players.indexOf(nm); if(i>=0) startR[i]=Math.max(0,lateAfter||0);});
  const gc=Array(n).fill(0);
  const pc={}; const pk=(a,b)=>a<b?a+'-'+b:b+'-'+a;
  const rnd=_rng((n*7+courts*13+(seed||1)*101+1));
  const sched=[]; let guard=0;
  // 모두 4게임 채울 때까지 라운드 생성 (안전장치 14R)
  while(guard<14){
    const elig=[]; for(let i=0;i<n;i++) if(startR[i]<=guard) elig.push(i);
    elig.sort((a,b)=> gc[a]-gc[b] || rnd()-0.5);
    const cap=mpr*per;
    let playing=elig.slice(0,Math.min(cap, Math.floor(elig.length/per)*per));
    if(opts&&opts.levelSort&&opts.grades){ playing=[...playing].sort((a,b)=> gradeRank(opts.grades[players[a]]||'B')-gradeRank(opts.grades[players[b]]||'B')); }
    const waiting=elig.filter(i=>!playing.includes(i));
    const courtsArr=[];
    for(let ci=0; ci<playing.length; ci+=per){
      const grp=playing.slice(ci,ci+per); let t1,t2;
      if(dbl){
        const combos=[[[grp[0],grp[1]],[grp[2],grp[3]]],[[grp[0],grp[2]],[grp[1],grp[3]]],[[grp[0],grp[3]],[grp[1],grp[2]]]];
        let best=combos[0],bs=1e9;
        combos.forEach(cm=>{const cost=(pc[pk(cm[0][0],cm[0][1])]||0)+(pc[pk(cm[1][0],cm[1][1])]||0);if(cost<bs){bs=cost;best=cm;}});
        t1=best[0];t2=best[1];
        pc[pk(t1[0],t1[1])]=(pc[pk(t1[0],t1[1])]||0)+1; pc[pk(t2[0],t2[1])]=(pc[pk(t2[0],t2[1])]||0)+1;
      } else { t1=[grp[0]]; t2=[grp[1]]; }
      grp.forEach(i=>gc[i]++); courtsArr.push({t1,t2});
    }
    sched.push({courts:courtsArr,waiting});
    guard++;
    if(Math.min(...gc.filter((_,i)=>startR[i]<=guard||startR[i]<guard))>=GAMES && gc.every((v,i)=>startR[i]>guard||v>=GAMES)) break;
    if(Math.min(...gc)>=GAMES) break;
  }
  return {rounds:sched,gc,type:dbl?'double':'single',mpr,rcount:sched.length,helper,GAMES};
}
function buildBW(roster,courts,seed,lateNames,lateAfter){
  const n=roster.length; if(n<4) return {blue:[],white:[],capB:null,capW:null,rounds:[],mpr:0,R:0};
  const rnd=_rng((seed||1)*131+n*7+courts*5+3);
  // 균형 팀 분할: 섞은 뒤 짝/홀로 청/백
  const idx=[...Array(n).keys()].sort(()=>rnd()-0.5);
  const blue=[],white=[]; idx.forEach((pi,k)=>{(k%2?white:blue).push(roster[pi]);});
  // 팀장 무작위
  const capB=blue[Math.floor(rnd()*blue.length)], capW=white[Math.floor(rnd()*white.length)];
  // 늦참 합류 라운드
  const startR={}; (lateNames||[]).forEach(nm=>{startR[nm]=Math.max(0,lateAfter||0);});
  const mpr=Math.max(1,Math.min(courts,Math.floor(Math.min(blue.length,white.length)/2)));
  // 4게임 보장 라운드 수
  const gcB={},gcW={}; blue.forEach(nm=>gcB[nm]=0); white.forEach(nm=>gcW[nm]=0);
  const rounds=[]; let r=0;
  while(r<14){
    const availB=blue.filter(nm=>(startR[nm]||0)<=r).sort((a,b)=>gcB[a]-gcB[b]||rnd()-0.5);
    const availW=white.filter(nm=>(startR[nm]||0)<=r).sort((a,b)=>gcW[a]-gcW[b]||rnd()-0.5);
    const useC=Math.max(0,Math.min(mpr,Math.floor(availB.length/2),Math.floor(availW.length/2)));
    const playB=availB.slice(0,useC*2), playW=availW.slice(0,useC*2);
    const cs=[];
    for(let ci=0;ci<useC;ci++){ cs.push({b:[playB[ci*2],playB[ci*2+1]],w:[playW[ci*2],playW[ci*2+1]]}); }
    playB.forEach(nm=>gcB[nm]++); playW.forEach(nm=>gcW[nm]++);
    rounds.push({courts:cs, waitB:availB.slice(useC*2), waitW:availW.slice(useC*2)});
    r++;
    const allB=blue.every(nm=>(startR[nm]||0)>r||gcB[nm]>=4), allW=white.every(nm=>(startR[nm]||0)>r||gcW[nm]>=4);
    if(allB&&allW && r>=4) break;
  }
  return {blue,white,capB,capW,rounds,mpr,R:rounds.length};
}
function clubSeasonStats(players,q){
  const qseed={'1분기':11,'2분기':29,'연간':47}[q]||47;
  const yearMul=q==='연간'?2.2:1;
  return players.map((nm,i)=>{
    const rnd=_rng(qseed*131+i*17+nm.length*7);
    const days=Math.max(1,Math.round((2+rnd()*4)*yearMul));
    let g=0,w=0,l=0,sc=0,cc=0,pts=0;
    for(let dd=0; dd<days; dd++){
      const dg=3+Math.floor(rnd()*2); // 그날 3~4경기
      let dw=0;
      for(let x=0;x<dg;x++){ const ms=4+Math.floor(rnd()*3), os=Math.floor(rnd()*6);
        const win=(nm==='곽주영'?rnd()<0.6:rnd()<0.5);
        if(win){w++;dw++;sc+=6;cc+=os%6;} else {l++;sc+=os%5;cc+=6;}
        g++; }
      pts += [40,60,80,100][Math.min(dw,3)] + dw*10;
    }
    return {nm,g,w,l,sc,cc,days,pts,gd:sc-cc,wr:w+l?Math.round(w/(w+l)*100):0,avg:days?Math.round(pts/days*10)/10:0};
  });
}

/* ═══════════ 한울 대진 (Termes genHanulBracket 이식) ═══════════
   실력별과 다름: 등급으로 "나누지" 않고, 실력 스네이크로 조 전력을 "고르게 맞춘다".
   · 참석자를 등급 내림차순 정렬 → 코트 수만큼의 조에 스네이크(지그재그) 배분
     → 각 조의 실력 합이 비슷해짐 (조 안은 A·B·C가 섞임)
   · 각 조는 배정된 코트에 고정, 조원끼리만 4게임씩
   · 매 게임 4명 선발(경기 수 적은 순) → 3가지 팀 분할 중
     파트너 중복 + 상대 중복 + 실력차가 최소인 조합 선택
   · 큰 조를 앞 코트로 (늦게 끝나는 조가 코트를 오래 씀)                       */
const HANUL_GAMES = 4;
function hanulScore(g){ return g==='A'?3 : g==='C'?1 : 2; }

function buildHanul(roster, courts, grades, seed){
  const T = roster.length;
  if(T < 4) return {groups:[], games:[], sizes:[], maxDup:0};
  const rnd = _rng((seed||1)*211 + T*17 + courts*29);
  const numGroups = Math.min(courts, Math.max(1, Math.floor(T/4)));

  // ① 실력 내림차순 → 스네이크 배분 (조 간 전력 균형)
  const order = [...Array(T).keys()]
    .sort((a,b)=> hanulScore(grades[roster[b]]) - hanulScore(grades[roster[a]]) || rnd()-0.5);
  let groups = Array.from({length:numGroups}, ()=>[]);
  let gi=0, dir=1;
  order.forEach(idx=>{
    groups[gi].push(idx);
    gi += dir;
    if(gi<0){ gi=0; dir=1; } else if(gi>=numGroups){ gi=numGroups-1; dir=-1; }
  });
  // ② 큰 조를 앞 코트로
  groups.sort((a,b)=> b.length-a.length);

  // ③ 조별 4게임 편성 (파트너 pu / 상대 ou 중복 최소화)
  const pk=(a,b)=> a<b ? a+'_'+b : b+'_'+a;
  const pu={}, ou={};
  const gameSoFar = {}; order.forEach(i=>gameSoFar[i]=0);
  const games = groups.map(()=>[]);

  groups.forEach((grp, g)=>{
    if(grp.length < 4) return;                       // 4명 미만 조는 경기 불가
    let guard=0, maxG=grp.length + 8;
    while(grp.some(i=>gameSoFar[i] < HANUL_GAMES) && guard < maxG){
      guard++;
      const elig = grp.filter(i=>gameSoFar[i] < HANUL_GAMES)
                      .sort((a,b)=> gameSoFar[a]-gameSoFar[b] || rnd()-0.5);
      if(elig.length < 4) break;
      const four = elig.slice(0,4);
      const sorted = four.slice().sort((a,b)=> hanulScore(grades[roster[b]]) - hanulScore(grades[roster[a]]));
      // 3가지 팀 분할 후보 (강-약 짝 우선이 첫 후보)
      const cands = [
        [sorted[0],sorted[3],sorted[1],sorted[2]],
        [sorted[0],sorted[1],sorted[2],sorted[3]],
        [sorted[0],sorted[2],sorted[1],sorted[3]],
      ];
      const court = cands.map(cc=>({cc, cost:
          (pu[pk(cc[0],cc[1])]||0) + (pu[pk(cc[2],cc[3])]||0)
        + ((ou[pk(cc[0],cc[2])]||0)+(ou[pk(cc[0],cc[3])]||0)+(ou[pk(cc[1],cc[2])]||0)+(ou[pk(cc[1],cc[3])]||0)) * 0.5
        + Math.abs((hanulScore(grades[roster[cc[0]]])+hanulScore(grades[roster[cc[1]]]))
                 - (hanulScore(grades[roster[cc[2]]])+hanulScore(grades[roster[cc[3]]])))
        })).sort((a,b)=>a.cost-b.cost)[0].cc;

      pu[pk(court[0],court[1])] = (pu[pk(court[0],court[1])]||0)+1;
      pu[pk(court[2],court[3])] = (pu[pk(court[2],court[3])]||0)+1;
      for(const a of [court[0],court[1]]) for(const b of [court[2],court[3]]) ou[pk(a,b)]=(ou[pk(a,b)]||0)+1;

      games[g].push(court);
      four.forEach(x=>gameSoFar[x]++);
    }
  });

  const dupVals = Object.values(pu);
  return {
    groups, games,
    sizes: groups.map(g=>g.length),
    maxDup: dupVals.length ? Math.max(...dupVals) : 0,
    gc: gameSoFar,
  };
}

/* ═══════════ 개인 리포트 (Termes loadReport 이식) ═══════════
   대진 점수에서 집계 → 내 성적을 클럽 평균과 비교
   · 승률 / 경기당 득점 / 접전(2점차 이내) 승률
   · 파트너 궁합 · 상대 상성 · 최근 폼                          */
const ME_NAME = () => state.userName || '곽주영';
const CLOSE_DIFF = 2;   // 접전 기준: 점수차 2점 이내

function computeMyReport(){
  const reg = (state.bk && state.bk.reg) || [];
  const P = {};   // 이름 → 집계
  const ens = nm => P[nm] || (P[nm] = {g:0,w:0,l:0,sc:0,cc:0,cg:0,cw:0});
  const me = ME_NAME();
  const R = { me, games:[], partner:{}, opp:{} };

  reg.forEach(c=>{
    const sv = state.bcfg.scores[c.key] || {};
    if(sv.a===undefined||sv.a===''||sv.b===undefined||sv.b==='') return;
    const a = parseInt(sv.a), b = parseInt(sv.b);
    if(isNaN(a)||isNaN(b)) return;
    const t1 = c.names.slice(0,2), t2 = c.names.slice(2,4);
    const close = Math.abs(a-b) <= CLOSE_DIFF;

    [[t1,a,b,t2],[t2,b,a,t1]].forEach(([team,my,op,foe])=>{
      team.forEach((nm,k)=>{
        const st = ens(nm);
        st.g++; st.sc += my; st.cc += op;
        if(my>op) st.w++; else if(my<op) st.l++;
        if(close){ st.cg++; if(my>op) st.cw++; }
        if(nm===me){
          const mate = team[1-k];
          R.games.push({won:my>op, my, op, close, mate, foes:foe.slice(), key:c.key, ri:c.ri, ci:c.ci});
          const pt = R.partner[mate] || (R.partner[mate]={g:0,w:0});
          pt.g++; if(my>op) pt.w++;
          foe.forEach(f=>{ const o = R.opp[f] || (R.opp[f]={g:0,w:0}); o.g++; if(my>op) o.w++; });
        }
      });
    });
  });

  R.stats = P;
  R.mine = P[me] || {g:0,w:0,l:0,sc:0,cc:0,cg:0,cw:0};
  // 클럽 평균 (2경기 이상 회원)
  const mem = Object.entries(P).filter(([nm,v])=>nm!==me && v.g>=2).map(([,v])=>v);
  const avg = arr => arr.length ? arr.reduce((x,y)=>x+y,0)/arr.length : 0;
  R.club = {
    n: mem.length,
    win:   Math.round(avg(mem.map(m=>m.w/m.g*100))),
    score: avg(mem.map(m=>m.sc/m.g)),
    close: (()=>{ const c=mem.filter(m=>m.cg>0); return c.length?Math.round(avg(c.map(m=>m.cw/m.cg*100))):0; })(),
  };
  return R;
}

function _bar(label, mine, club, unit, better){
  const max = Math.max(mine, club, 1) * 1.12;
  const pm = Math.round(mine/max*100), pc = Math.round(club/max*100);
  const up = better ? mine>=club : mine<=club;
  return `<div class="rp-bar">
    <div class="rp-bl"><span>${label}</span><b class="${up?'up':'dn'}">${mine}${unit}</b></div>
    <div class="rp-track"><i class="me" style="width:${pm}%"></i></div>
    <div class="rp-track club"><i style="width:${pc}%"></i></div>
    <div class="rp-cap">클럽 평균 ${club}${unit} · 나는 ${up?'<b class="up">위</b>':'<b class="dn">아래</b>'}</div>
  </div>`;
}

function openMyReport(){
  // 대진 화면을 아직 안 열었으면 레지스트리가 비어 있으므로 한 번 렌더해서 채운다
  try{ if(!(state.bk&&state.bk.reg&&state.bk.reg.length) && AC() && SP().cat==='racket') renderBracket(); }catch(e){}
  const R = computeMyReport();
  const m = R.mine;
  let h = `<div class="sh-top"><h3>내 리포트</h3><div class="cl" role="button" tabindex="0" aria-label="닫기" onclick="closeOv()">×</div></div>

  if(!m.g){
    h += `<div class="empty" style="padding:50px 20px"><div class="ei">${ic('chart',34)}</div>
      <div class="et">아직 기록이 없어요</div>
      <div class="es">대진에서 점수를 입력하면<br>리포트가 채워져요.</div></div>`;
    document.getElementById('sheet').innerHTML=h; document.getElementById('ov').classList.add('on'); return;
  }

  const wr = Math.round(m.w/m.g*100);
  const diff = m.sc - m.cc;
  const spg = +(m.sc/m.g).toFixed(1);
  const cwr = m.cg ? Math.round(m.cw/m.cg*100) : 0;

  // 요약
  h += `<div class="rp-hero">
    <div class="rp-hn">${R.me}</div>
    <div class="rp-grid">
      <div><b>${m.g}</b><span>경기</span></div>
      <div><b>${m.w}<i>승</i> ${m.l}<i>패</i></b><span>승률 ${wr}%</span></div>
      <div><b class="${diff>=0?'up':'dn'}">${diff>0?'+':''}${diff}</b><span>득실차</span></div>
    </div></div>`;

  // 최근 폼

/* ═══════════ 한울 수기 방식 경기 기록표 (Termes showHanulSheet 이식) ═══════════
   옛날 종이 기록표 그대로: 남=1·2·3 / 여=A·B·C 코드,
   게임 순서표(1A : 2B), 세트별 점수 그리드, 승·패·득점·실점·득실차·순위 자동 */
function defaultGenders(roster){
  const set=(AC()&&AC().genders)||{};
  const rnd=_rng(roster.length*29+11); const out={};
  roster.forEach(nm=>{ out[nm] = set[nm] || (rnd()<0.62?'M':'F'); });
  return out;
}
function openHanulSheet(){
  const c=AC(); if(!c) return;
  const att=state._hanul; if(!att){ toast('한울 대진을 먼저 편성해 주세요'); return; }
  const {attendees, hn, G, GD} = att;

  let sheets='';
  hn.groups.forEach((grp, gi)=>{
    if(grp.length<4){ return; }
    const males   = grp.filter(i=>GD[attendees[i]]==='M');
    const females = grp.filter(i=>GD[attendees[i]]!=='M');
    const code={};
    males.forEach((i,k)=>code[i]=String(k+1));
    females.forEach((i,k)=>code[i]=String.fromCharCode(65+k));
    const ordered=[...males, ...females];
    const games=hn.games[gi];

    // 개인별 세트 결과
    const stat={};
    ordered.forEach(i=>{
      const gl=[];
      games.forEach((m,k)=>{
        if(!m.includes(i)) return;
        const sv=state.bcfg.scores['h'+gi+'-'+k]||{};
        const has=sv.a!==undefined&&sv.a!==''&&sv.b!==undefined&&sv.b!=='';
        const s1=parseInt(sv.a)||0, s2=parseInt(sv.b)||0;
        const onA=(m[0]===i||m[1]===i);
        gl.push({has, my:onA?s1:s2, op:onA?s2:s1, won:has&&((onA?s1:s2)>(onA?s2:s1))});
      });
      const p=gl.filter(x=>x.has);
      stat[i]={gl, w:p.filter(x=>x.won).length, l:p.filter(x=>!x.won).length,
               sc:p.reduce((a,x)=>a+x.my,0), co:p.reduce((a,x)=>a+x.op,0), played:p.length};
      stat[i].diff=stat[i].sc-stat[i].co;
    });
    // 순위 (승 > 득실차)
    const rl=ordered.map(i=>({i,w:stat[i].w,diff:stat[i].diff,played:stat[i].played}))
                    .sort((a,b)=>b.w-a.w||b.diff-a.diff);
    const rank={}; let rk=1;
    rl.forEach((r,k)=>{ if(k>0&&(r.w<rl[k-1].w||(r.w===rl[k-1].w&&r.diff<rl[k-1].diff))) rk=k+1;
                        rank[r.i]=r.played?rk:'-'; });
    const nG=Math.max(HANUL_GAMES, ...ordered.map(i=>stat[i].gl.length));

    // 게임 순서표
    const cc=i=>code[i]||'·';
    let sched='';
    games.forEach((m,k)=>{ sched+=`<tr><td class="g">게임 ${k+1}</td><td class="code">${cc(m[0])}${cc(m[1])} : ${cc(m[2])}${cc(m[3])}</td></tr>`; });

    // 점수표
    let head=`<tr><th rowspan="2">번호</th><th rowspan="2">이름</th>`;
    for(let k=0;k<nG;k++) head+=`<th rowspan="2">${k+1}세트</th>`;
    head+=`<th colspan="2" class="grp">승패</th><th colspan="3" class="grp">게임 득실</th><th rowspan="2">순위</th></tr>
      <tr><th>승</th><th>패</th><th>득점</th><th>실점</th><th>득실차</th></tr>`;
    let body='';
    ordered.forEach(i=>{
      const d=stat[i]; let sets='';
      for(let k=0;k<nG;k++){
        const x=d.gl[k];
        sets += (x&&x.has) ? `<td class="set${x.won?' win':''}">${x.my} : ${x.op}</td>`
                           : `<td class="set empty">·</td>`;
      }
      const isMe = attendees[i]==='곽주영';
      body+=`<tr class="${isMe?'me':''}">
        <td class="${GD[attendees[i]]==='M'?'lblM':'lblF'}"><span>${code[i]}</span></td>
        <td class="nm">${attendees[i]}${gradeBadge(G[attendees[i]]||'B')}</td>${sets}
        <td>${d.w}</td><td>${d.l}</td><td>${d.sc}</td><td>${d.co}</td>
        <td class="${d.diff<0?'neg':'pos'}">${d.diff>0?'+':''}${d.diff}</td>
        <td class="rk">${rank[i]}</td></tr>`;
    });

    sheets+=`<div class="sh-court">
      <div class="sh-ct">코트 ${gi+1} <span>${grp.length}명 · 전원 ${HANUL_GAMES}게임</span></div>
      <div class="sh-sub">게임 순서 <span>· 남 1·2·3 / 여 A·B·C</span></div>
      <table class="sh-sched"><tbody>${sched||'<tr><td>경기 없음</td></tr>'}</tbody></table>
      <div class="sh-sub" style="margin-top:16px">점수표 <span>· 승패·득실·순위 자동</span></div>
      <div class="sh-scroll"><table class="sh-grid"><thead>${head}</thead><tbody>${body}</tbody></table></div>
    </div>`;
  });

  const ov=document.createElement('div'); ov.className='sh-ov'; ov.id='shOv';
  ov.innerHTML=`<div class="sh-panel">
    <div class="sh-head"><div><div class="sh-eye">한울 · 수기 방식</div><div class="sh-title">경기 기록표</div></div>
      <button class="sh-x" onclick="document.getElementById('shOv').remove()">×</button></div>
    ${sheets||'<div class="note">편성된 조가 없어요.</div>'}</div>`;
  ov.onclick=e=>{ if(e.target===ov) ov.remove(); };
  document.body.appendChild(ov);
}

/* ═══════════ 대진 운영(라이브) 레이어 — Termes 이식 ═══════════
   · 코트 상태머신 (진행가능 / 대기 / 진행중 / 완료)
   · 코트 타이머 (시작 시각 기록 → 경과 m:ss 실시간)
   · 30분 초과 경기 경고
   · 내 다음 가능 매치 안내
   · 헬퍼 후보 (가장 오래 쉰 인원)
   · 게임 칩 네비게이션                                            */
const BK_LONG_MIN = 30;   // 장시간 진행 경고 기준(분)

function bkState(){ state.bk = state.bk || {startedAt:{}, reg:[], tick:null}; return state.bk; }
function bkReset(){ const b=bkState(); b.reg=[]; }
function bkRegister(key, ri, ci, names, lane){ bkState().reg.push({key, ri:+ri, ci, names, lane}); }
function bkScored(key){ const s=state.bcfg.scores[key]||{}; return s.a!==undefined&&s.a!=='' && s.b!==undefined&&s.b!==''; }
function bkStartedAt(key){ return bkState().startedAt[key]||null; }
function bkFmtElapsed(ms){ const t=Math.max(0,Math.floor(ms/1000)); return Math.floor(t/60)+':'+String(t%60).padStart(2,'0'); }
function bkElapsedMin(key){ const t=bkStartedAt(key); return t?Math.floor((Date.now()-t)/60000):null; }

/* 코트 상태: done > playing > now > wait
   now 조건: 미시작 · 소속 선수가 다른 진행중 코트에 없음 · 동시 진행 코트 < 코트 수 */
function bkStatuses(courts){
  const busy = new Set();
  let playingCount = 0;
  courts.forEach(c=>{ if(bkStartedAt(c.key) && !bkScored(c.key)){ playingCount++; c.names.forEach(n=>busy.add(n)); } });
  const cap = state.bcfg.courts;
  // 레인(고정 코트) 순서 게이트: 같은 레인의 앞 게임이 끝나야 다음 게임이 열림
  const laneBlocked = new Set();
  courts.forEach(c=>{
    if(c.lane===undefined) return;
    const earlier = courts.filter(o=>o.lane===c.lane && o.ri < c.ri);
    if(earlier.some(o=>!bkScored(o.key))) laneBlocked.add(c.key);
  });
  const out = {};
  courts.forEach(c=>{
    if(bkScored(c.key)) out[c.key]='done';
    else if(bkStartedAt(c.key)) out[c.key]='playing';
    else if(laneBlocked.has(c.key)) out[c.key]='wait';
    else if(c.names.some(n=>busy.has(n))) out[c.key]='wait';
    else if(playingCount>=cap) out[c.key]='wait';
    else out[c.key]='now';
  });
  return out;
}
const BK_ST = {
  now:    {t:'진행 가능', c:'#1f7d4d', bg:'#e7f4ec'},
  playing:{t:'진행 중',  c:'#c47d10', bg:'#fdf2dd'},
  wait:   {t:'대기',     c:'#8a8172', bg:'#efe9dd'},
  done:   {t:'완료',     c:'#5b7fd4', bg:'#e7eefb'},
};

function bkStart(key){
  const b=bkState();
  if(b.startedAt[key]) delete b.startedAt[key];
  else { b.startedAt[key]=Date.now(); toast('경기를 시작했어요 · 타이머가 돌아갑니다'); }
  bkSyncTimer(key);
  renderBracket();
}

/* 실시간 타이머 (1초) */
function bkTick(){
  document.querySelectorAll('[data-bkt]').forEach(el=>{
    const t = bkStartedAt(el.getAttribute('data-bkt'));
    if(t) el.textContent = bkFmtElapsed(Date.now()-t);
  });
}
function bkTimerLoop(){ const b=bkState(); if(b.tick) return; b.tick=setInterval(bkTick,1000); }

/* 코트 우측 컨트롤 (상태칩 · 시작 버튼 · 타이머) */
function bkControl(key){
  const st = (bkState()._st||{})[key] || 'wait';
  const S = BK_ST[st];
  if(st==='done') return `<span class="bk-chip" style="background:${S.bg};color:${S.c}">${S.t}</span>`;
  if(st==='playing'){
    const t = bkStartedAt(key);
    const hhmm = new Date(t).toTimeString().slice(0,5);
    return `<span class="bk-chip playing"><span class="bk-dot"></span><b data-bkt="${key}">${bkFmtElapsed(Date.now()-t)}</b><em>${hhmm} 시작</em></span>
      <button class="bk-btn stop" onclick="event.stopPropagation();bkStart('${key}')">중단</button>`;
  }
  if(st==='now') return `<button class="bk-btn go" onclick="event.stopPropagation();bkStart('${key}')">${ic('clock',13,'#fff')}시작</button>`;
  return `<span class="bk-chip" style="background:${S.bg};color:${S.c}">${S.t}</span>`;
}

/* 내 다음 가능 매치 · 30분 경고 · 헬퍼 후보 · 게임 네비 */
function bkPanel(){
  const b = bkState(), reg = b.reg;
  if(!reg.length) return '';
  const st = bkStatuses(reg); b._st = st;

  // 라운드별 상태 요약
  const rounds = [...new Set(reg.map(c=>c.ri))].sort((a,b2)=>a-b2);
  const rStat = {};
  rounds.forEach(ri=>{
    const cs = reg.filter(c=>c.ri===ri).map(c=>st[c.key]);
    rStat[ri] = cs.every(x=>x==='done') ? 'done'
      : cs.some(x=>x==='playing') ? 'playing'
      : cs.some(x=>x==='now') ? 'now' : 'wait';
  });

  let h = `<div class="bk-nav">${rounds.map(ri=>{
    const s=rStat[ri];
    return `<div class="bk-n ${s}">${ri+1}게임${s==='done'?' ✓':s==='playing'?' ●':''}</div>`;
  }).join('')}</div>`;

  // 내 다음 경기
  const ME='곽주영';
  const mine = reg.filter(c=>c.names.includes(ME) && st[c.key]!=='done');
  if(mine.length){
    const nx = mine[0];
    const s = st[nx.key], S = BK_ST[s];
    const ahead = reg.filter(c=>c.ri<nx.ri && st[c.key]!=='done').length;
    const sub = s==='now' ? '지금 바로 시작할 수 있어요'
      : s==='playing' ? '지금 진행 중이에요'
      : `앞선 경기 ${ahead}건이 끝나면 시작해요`;
    h += `<div class="bk-next">
      <span class="bk-next-ic" style="background:${S.bg};color:${S.c}">${ic(s==='playing'?'live':'clock',18)}</span>
      <div class="bk-next-x"><div class="bk-next-t">내 다음 경기 · ${nx.ri+1}게임 코트 ${nx.ci+1}</div>
        <div class="bk-next-d">${sub}</div></div>
      <span class="bk-chip" style="background:${S.bg};color:${S.c}">${S.t}</span></div>`;
  } else if(reg.some(c=>c.names.includes(ME))){
    h += `<div class="bk-next done"><span class="bk-next-ic" style="background:#e7f4ec;color:#1f7d4d">${ic('award',18)}</span>
      <div class="bk-next-x"><div class="bk-next-t">오늘 경기 완료</div><div class="bk-next-d">배정된 ${reg.filter(c=>c.names.includes(ME)).length}경기를 모두 마쳤어요</div></div></div>`;
  } else {
    h += `<div class="bk-next"><span class="bk-next-ic" style="background:var(--coral-s);color:var(--coral-d)">${ic('user',18)}</span>
      <div class="bk-next-x"><div class="bk-next-t">아직 내 경기가 없어요</div><div class="bk-next-d">클럽 일정에서 참석을 체크하면 대진에 자동 배정돼요</div></div></div>`;
  }

  // 30분 초과 경고
  const longRun = reg.filter(c=>st[c.key]==='playing' && (bkElapsedMin(c.key)||0)>=BK_LONG_MIN);
  if(longRun.length){
    h += `<div class="bk-warn">${ic('hourglass',16)}<span><b>${BK_LONG_MIN}분</b> 넘게 진행 중인 경기 ${longRun.length}건
      (${longRun.map(c=>`${c.ri+1}게임 코트${c.ci+1}`).join(', ')}) — 끝났다면 점수를 입력해 주세요</span></div>`;
  }

  // 헬퍼 후보: 완료 경기 수가 가장 적은 인원
  const played = {};
  reg.forEach(c=>{ if(st[c.key]==='done') c.names.forEach(n=>played[n]=(played[n]||0)+1); });
  const all = [...new Set(reg.flatMap(c=>c.names))];
  const min = Math.min(...all.map(n=>played[n]||0));
  const rested = all.filter(n=>(played[n]||0)===min);
  if(rounds.length && rested.length && rested.length<=4 && Object.keys(played).length){
    h += `<div class="bk-help">${ic('people',16)}<span><b>가장 오래 쉰 회원</b> — 헬퍼가 필요하면 먼저 불러주세요
      <em>${rested.join(' · ')}</em></span></div>`;
  }
  return h;
}

function courtLine(ci,aNames,bNames,typeLabel,key,ri,lane){

  const tb=typeLabel?`<span class="ct-type" style="background:${ctTypeColor(typeLabel)}20;color:${ctTypeColor(typeLabel)}">${typeLabel}</span>`:'';

function waitLine(names){ return `<div class="wait-line"><span class="wait-tag">대기</span>${names.length?names.map(n=>`<span class="wait-chip">${n}</span>`).join(''):'<span class="wait-chip" style="color:var(--green);border-color:var(--green)">전원 참가</span>'}</div>`; }
// ── 선수단 (등번호·주장) ──
function clubRoster(){

function rosterEntry(nm){ return clubRoster().find(r=>r.name===nm)||{name:nm,no:'-',captain:false}; }
// 종목별 기록 항목
function statCats(){ const id=SP().id;
  if(id==='soccer') return [['goal','골'],['assist','도움']];

// ── 라인업: 미리 편성(언제나) + 확정(경기 1시간 전부터) ──
function lineupState(){ state.lineup=state.lineup||{drafted:false,confirmed:false}; return state.lineup; }
function minsToKickoff(){ return state.kickoffMin==null?95:state.kickoffMin; }
function fmtCountdown(m){ if(m<=0) return '경기 시작'; const hh=Math.floor(m/60), mm=m%60; return hh?`${hh}시간 ${mm}분 뒤`:`${mm}분 뒤`; }
function lineupStatusCard(){
  const L=lineupState(), m=minsToKickoff(), open=m<=60;
  const bar = Math.max(0, Math.min(100, (1-(m-60)/120)*100));
  if(L.confirmed){

  document.getElementById('sheet').innerHTML=h; document.getElementById('ov').classList.add('on');

function playMMR(){ if(!spendCash('dm',1,'1:1 매칭'))return; const win=Math.random()<0.55; const d=win?Math.round(12+Math.random()*10):-Math.round(8+Math.random()*8); state.mmr=Math.max(800,state.mmr+d); if(win)state.mmrWins++; if(state.mmr>=1300)state.plUnlocked=true; toast(`${win?'승리':'패배'} · MMR ${d>0?'+':''}${d} (${state.mmr})`); openMMR(); }

function renderRoom(){
  const r=state.chats[state.chatRoom];if(!r){state.chatRoom=null;return renderChat();}
  let h=`<div class="chead"><div class="bk" onclick="backChat()">‹</div><div style="flex:1"><div class="ti">${r.name}</div><div class="su">${r.type==='group'?'클럽 단체방':'1:1 대화'}</div></div>${r.type==='dm'?`<span onclick="openReport('${r.name}')" style="font-size:12.5px;color:var(--lgray);font-weight:700;cursor:pointer">⚠ 신고</span>`:''}</div>`;
  h+=`<div class="msgs">`;
  r.msgs.forEach(m=>{
    if(m.me) h+=`<div class="msg me">${m.t}</div>`;
    else h+=`<div class="msg them">${r.type==='group'&&m.who?`<div class="who2">${m.who}</div>`:''}${m.t}</div>`;
  });
  h+=`</div><div class="chatbar"><input id="chatIn" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">전송</button></div>`;

function openRoom(id){state.chatRoom=id;renderChat();}
function backChat(){state.chatRoom=null;renderChat();}
function sendChat(){
  const inp=document.getElementById('chatIn');if(!inp)return;
  const t=inp.value.trim();if(!t)return;
  const r=state.chats[state.chatRoom];r.msgs.push({me:1,t});
  renderRoom();
  setTimeout(()=>{
    const rep=REPLIES[Math.floor(Math.random()*REPLIES.length)];
    const who=r.type==='group'?'이석용':null;
    r.msgs.push(who?{them:1,who,t:rep}:{them:1,t:rep});
    if(state.view==='chat'&&state.chatRoom)renderRoom();
  },900);
}

function sparkline(hist){
  if(hist.length<2) return '';
  const w=260,h=58,mn=Math.min(...hist),mx=Math.max(...hist),rng=(mx-mn)||1;
  const pts=hist.map((v,i)=>[8+i*(w-16)/(hist.length-1), h-6-((v-mn)/rng)*(h-16)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block"><path d="${d}" fill="none" stroke="#e8845a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="#e8845a"/></svg>`;
}

    <div class="dpin-row" style="gap:10px;padding-bottom:6px">
      <div style="flex:0 0 auto;width:66px;text-align:center;cursor:pointer" onclick="toast('스토리 올리기 (데모)')"><div style="width:66px;height:88px;border-radius:16px;background:var(--coral-s);border:2px dashed var(--coral);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--coral-d)">＋</div><div style="font-size:11px;font-weight:700;color:var(--gray);margin-top:4px">올리기</div></div>`;
  stories.forEach(([nm,ic])=>{ h+=`<div style="flex:0 0 auto;width:66px;text-align:center"><div style="width:66px;height:88px;border-radius:16px;background:linear-gradient(160deg,var(--purple),var(--blue));display:flex;align-items:flex-end;justify-content:center;font-size:26px;padding-bottom:6px;position:relative"><span style="position:absolute;top:6px;left:6px;font-size:16px">${ic}</span>${'🙂'}</div><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nm}</div></div>`; });
  h+=`</div>`;
  // 글 목록
  h+=`<div style="font-size:16px;font-weight:900;margin:14px 4px 4px">인기 글</div>`;
  posts.forEach((p,i)=>{
    h+=`<div class="card" style="cursor:pointer;padding:16px" onclick="openPost(${LOUNGE_POSTS.indexOf(p)})">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="font-size:11.5px;font-weight:800;background:var(--cream2);border-radius:6px;padding:3px 8px">${p.cat}</span><span style="font-size:11.5px;font-weight:800;color:var(--coral-d)">${p.ic} ${p.sp}</span></div>
      <div style="font-size:16.5px;font-weight:800;color:var(--ink);letter-spacing:-.02em">${p.t}</div>
      <div style="font-size:13.5px;color:var(--gray);font-weight:500;margin-top:4px">${p.b}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px">
        <div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1">
          <span style="width:24px;height:24px;border-radius:50%;flex-shrink:0;background:${genC(p.g).bg};display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:${genC(p.g).c};font-weight:900">${p.g}</span>
          <div style="min-width:0;font-size:12px;color:var(--gray);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"><b style="color:var(--ink)">${p.nick}</b> · ${p.region} · ${p.time}</div></div>
        <div style="display:flex;gap:11px;flex-shrink:0;font-size:12px;color:var(--lgray);font-weight:700">
          <span style="display:inline-flex;align-items:center;gap:3px">${lIcon('view')}${p.v}</span>
          <span style="display:inline-flex;align-items:center;gap:3px">${lIcon('like')}${p.l}</span>
          <span style="display:inline-flex;align-items:center;gap:3px">${lIcon('comment')}${p.c}</span></div></div></div>`;
  });
  h+=`<button class="btn" style="position:sticky;bottom:14px;margin-top:8px" onclick="openLoungeWrite()"><span style="display:inline-flex;align-items:center;gap:7px;justify-content:center">${ic('pencil',17,'#fff')}익명으로 글쓰기</span></button>`;
  document.getElementById('s-lounge').innerHTML=h;
}
function openPost(i){ const p=LOUNGE_POSTS[i]; if(!p)return;
  let h=`<div class="sh-top"><h3>${p.cat} · ${p.ic} ${p.sp}</h3><div class="cl" role="button" tabindex="0" aria-label="닫기" onclick="closeOv()">×</div></div>
    <div style="font-size:19px;font-weight:900;letter-spacing:-.02em">${p.t}</div>
    <div style="display:flex;align-items:center;gap:7px;margin-top:8px"><span style="width:22px;height:22px;border-radius:50%;background:${genC(p.g).bg};display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:${genC(p.g).c};font-weight:900">${p.g}</span><div style="font-size:12px;color:var(--lgray);font-weight:700"><b style="color:var(--ink)">${p.nick}</b> · ${p.region} · ${p.time} · 익명</div></div>
    <div style="font-size:15px;color:var(--ink2);font-weight:500;line-height:1.6;margin-top:14px">${p.b}</div>
    <div style="display:flex;gap:16px;font-size:13px;color:var(--gray);font-weight:700;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)"><span style="display:inline-flex;align-items:center;gap:4px">${lIcon('view')}${p.v}</span><span style="display:inline-flex;align-items:center;gap:4px">${lIcon('like')}${p.l}</span><span style="display:inline-flex;align-items:center;gap:4px">${lIcon('comment')}${p.c}</span></div>
    <div class="card" style="margin-top:14px;background:var(--cream2);border:none"><div style="font-size:13px;color:var(--gray);font-weight:600">익명 댓글은 자유롭게, 쪽지는 M캐쉬가 필요해요.</div></div>
    <button class="btn" style="margin-top:12px" onclick="challengePlayer('작성자')">💌 쪽지 보내기 (M캐쉬)</button>
    <div style="display:flex;gap:9px;margin-top:9px"><button class="btn ghost sm" style="flex:1" onclick="reportPost(${i})">⚠ 신고</button><button class="btn ghost sm" style="flex:1" onclick="blockPostAuthor(${i})">🚫 차단</button></div>
    <button class="btn ghost" style="margin-top:9px" onclick="closeOv()">닫기</button>`;
  document.getElementById('sheet').innerHTML=h; document.getElementById('ov').classList.add('on');
}
function openLoungeWrite(){
  let h=`<div class="sh-top"><h3>익명으로 글쓰기</h3><div class="cl" role="button" tabindex="0" aria-label="닫기" onclick="closeOv()">×</div></div>
    <div class="sd">라운지 글은 <b>익명</b>으로 올라가요. 내 고정 익명 닉네임은 <b>${myAnonNick()}</b>예요.</div>
    <div class="card" style="display:flex;align-items:center;gap:10px;background:var(--cream2);border:none;margin-bottom:12px"><span style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#f0a9cf,#b9a6ea);display:inline-block"></span><div style="font-size:13px;font-weight:800">${state.gender==='여성'?'♀':'♂'} ${myAnonNick()} · 경기 용인</div></div>
    <div class="fld"><label>카테고리</label><div class="chips">${['자유','자랑','질문','모임'].map((c,i)=>`<div class="chip ${i===0?'on':''}">${c}</div>`).join('')}</div></div>
    <div class="fld"><label>제목</label><input id="lwTitle" placeholder="예) 백핸드 팁 좀 주세요" maxlength="30"></div>
    <div class="fld"><label>내용</label><textarea id="lwBody" placeholder="자유롭게 적어보세요" style="width:100%;min-height:90px;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-family:inherit;font-size:14px;background:#fff;resize:none"></textarea></div>
    <button class="btn" onclick="submitLounge()">익명으로 올리기</button>`;
  document.getElementById('sheet').innerHTML=h; document.getElementById('ov').classList.add('on');
  setTimeout(()=>{const e=document.getElementById('lwTitle');if(e)e.focus();},100);
}
function submitLounge(){ const t=(document.getElementById('lwTitle')||{}).value||''; if(!t.trim()){toast('제목을 입력해 주세요');return;}
  LOUNGE_POSTS.unshift({cat:'자유',sp:SP().n,ic:SP().ic,t:t.trim(),b:(document.getElementById('lwBody')||{}).value||'',g:state.gender==='여성'?'♀':'♂',region:'경기 용인',time:'방금',v:1,l:0,c:0,nick:myAnonNick()});
  closeOv(); state.loungeCat='전체'; renderLounge(); toast('익명으로 글을 올렸어요 · '+myAnonNick());
}
function go(v){
  if(state.view==='bracket' && v!=='bracket') bkStopPoll();
  if(v==='bracket' && SERVER_OK && clubId()){ bkPull().then(ok=>{ if(ok){ renderBracket(); bkStartPoll(); } }); }
  state.view=v;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-'+v).classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.s===v));
  document.getElementById('scroll').scrollTop=0;
  ({home:renderHome,league:renderLeague,club:renderClub,bracket:renderBracket,lounge:renderLounge,chat:renderChat,me:renderMe})[v]();
  saveMatsu();
}
function closeOv(){document.getElementById('ov').classList.remove('on');}
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2400);}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeOv();});
checkServer();
const _restored=loadMatsu();
if(_restored){ document.getElementById('auth').classList.remove('on'); document.getElementById('onboard').classList.remove('on'); }
renderHome();renderLeague();renderClub();renderBracket();renderLounge();renderChat();renderMe();renderAuthReviews();
if(_restored){ go(state.view||'home'); } else { populateAuthSaved(); }
window.addEventListener('beforeunload',saveMatsu);
setInterval(saveMatsu,2500);

</script>
</body>
</html>
