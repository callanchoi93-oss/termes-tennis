<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>맞수 관리자</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{ --ink:#1c1b18; --coral:#ec6a2e; --coral-d:#cf5418; --gray:#7d7870; --lgray:#b3aea4; --line:#ececea; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:#edecea; font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo',sans-serif;
    color:var(--ink); letter-spacing:-.012em; line-height:1.55; padding:22px 14px 70px; }
  .wrap{ max-width:620px; margin:0 auto; }
  h1{ font-size:25px; font-weight:900; letter-spacing:-.03em; }
  .sub{ font-size:13px; color:var(--gray); font-weight:600; margin:3px 0 16px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:15px; margin-bottom:11px; }
  .btn{ padding:12px 16px; border:none; border-radius:13px; font-size:13.5px; font-weight:800; font-family:inherit;
    cursor:pointer; background:var(--ink); color:#fff; }
  .btn.coral{ background:var(--coral); }
  .btn.ghost{ background:#fff; border:1.5px solid #e9dfcf; color:#5a544b; }
  .btn.xs{ padding:7px 11px; font-size:11.5px; border-radius:10px; }
  input, textarea{ border:1.5px solid #ece8e0; border-radius:12px; padding:11px 12px; font-size:14px;
    font-family:inherit; font-weight:600; background:#fff; width:100%; }
  .tabs{ display:flex; gap:7px; overflow-x:auto; padding:2px 0 12px; -webkit-overflow-scrolling:touch; }
  .tab{ flex:none; padding:9px 16px; border-radius:22px; background:#fff; border:1px solid var(--line);
    font-size:13px; font-weight:800; cursor:pointer; }
  .tab.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .meta{ font-size:11.5px; color:var(--gray); font-weight:700; }
  .row{ display:flex; align-items:center; gap:10px; padding:11px 2px; border-top:1px solid #f0efec; }
  .row:first-child{ border-top:none; }
  .row b{ font-size:13.5px; }
  .pill{ display:inline-block; font-size:10.5px; font-weight:800; border-radius:20px; padding:3px 9px; margin:0 4px 4px 0; }
  .pill.ok{ background:#edf2ec; color:#4c7a5c; } .pill.warn{ background:#fceee4; color:#cf5418; }
  .pill.gray{ background:#f2f0ea; color:#6b6357; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .stat{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:13px 14px; }
  .stat b{ font-size:20px; font-weight:900; } .stat span{ display:block; font-size:11px; color:var(--gray); font-weight:800; margin-bottom:3px; }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:12px 18px; border-radius:14px; font-size:13px; font-weight:700; opacity:0; transition:.3s; pointer-events:none; z-index:9; max-width:88%; text-align:center; }
  .toast.on{ opacity:1; }
  .sel{ outline:2.5px solid var(--coral); border-radius:14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>맞수 관리자</h1>
  <p class="sub">운영 도구 — 키를 아는 사람만 사용할 수 있어요.</p>

  <div class="card" style="display:flex;gap:8px">
    <input id="key" type="password" placeholder="관리자 키 (ADMIN_KEY)">
    <button class="btn" style="flex:none" onclick="connect()">접속</button>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="view"><div class="card meta">관리자 키로 접속하면 내용이 보여요.</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
const won=n=>Number(n||0).toLocaleString()+'원';
/* created_at이 숫자(ms)든 문자든 안전하게 날짜로 — 기존 회원 탭 오류 수정 지점 */
const fdate=v=>{ if(v==null||v==='') return '—';
  const d=new Date(typeof v==='number'?v:(/^\d+$/.test(String(v))?+v:v));
  return isNaN(d)?'—':`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; };
function toast(t){ const el=$('toast'); el.textContent=t; el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),2600); }
function key(){ return localStorage.getItem('matsu_admin_key')||''; }

async function api(path, opts){
  const r=await fetch(path,{...opts,headers:{'Content-Type':'application/json','x-admin-key':key(),...((opts&&opts.headers)||{})}});
  if(!r.ok){ const t=await r.text().catch(()=>String(r.status)); throw new Error(t); }
  return r.json();
}

const TABS=[['stats','현황'],['users','회원'],['clubs','클럽'],['oms','오픈매치·봇'],['reports','신고'],['payouts','정산'],['banners','배너']];
let TAB='stats', OMS=[], SEL=null;

function drawTabs(){
  $('tabs').innerHTML=TABS.map(([k,l])=>`<div class="tab ${TAB===k?'on':''}" onclick="setTab('${k}')">${l}</div>`).join('');
}
function setTab(k){ TAB=k; drawTabs(); render(); }

async function connect(){
  const v=$('key').value.trim();
  if(v) localStorage.setItem('matsu_admin_key', v);
  if(!key()){ toast('키를 입력해 주세요'); return; }
  try{ await api('/admin/stats'); toast('접속했어요 · 앱의 봇 추가 버튼도 함께 열려요'); render(); }
  catch(e){ toast('키가 달라요'); }
}

async function render(){
  const v=$('view');
  if(!key()){ v.innerHTML='<div class="card meta">관리자 키로 접속하면 내용이 보여요.</div>'; return; }
  v.innerHTML='<div class="card meta">불러오는 중…</div>';
  try{
    if(TAB==='stats'){
      const s=await api('/admin/stats');
      v.innerHTML=`<div class="grid">
        <div class="stat"><span>회원</span><b>${s.users||0}</b></div>
        <div class="stat"><span>클럽</span><b>${s.clubs||0}</b></div>
        <div class="stat"><span>오픈매치(누적)</span><b>${s.matches||0}</b></div>
        <div class="stat"><span>미처리 신고</span><b>${s.openReports||0}</b></div>
        <div class="stat"><span>결제 건수</span><b>${s.paidOrders||0}</b></div>
        <div class="stat"><span>결제 금액</span><b>${won(s.revenueWon)}</b></div>
      </div>`;
    }
    else if(TAB==='users'){
      const rows=await api('/admin/users');
      v.innerHTML='<div class="card">'+ (rows.length? rows.map(u=>`
        <div class="row"><div style="flex:1;min-width:0"><b>${esc(u.name)}</b>
          <span class="pill gray">${esc(u.provider||'')}</span>${u.premium?'<span class="pill warn">프리미엄</span>':''}
          <div class="meta">#${u.id} · ${esc(u.region||'지역 없음')} · ${esc(u.sport||'')} · 레이팅 ${u.rating??'—'} · 캐시 ${won(u.cash)} · 가입 ${fdate(u.created_at)}</div></div>
          <button class="btn xs ghost" onclick="delUser(${u.id},'${esc(u.name)}')">삭제</button></div>`).join('') : '<div class="meta">회원이 없어요</div>') + '</div>';
    }
    else if(TAB==='clubs'){
      const rows=await api('/admin/clubs');
      v.innerHTML='<div class="card">'+ (rows.length? rows.map(c=>`
        <div class="row"><div style="flex:1;min-width:0"><b>${esc(c.name)}</b>
          <div class="meta">#${c.id} · ${esc(c.region||'')} · ${esc(c.sport||'')} · 회원 ${c.members||0}명 · 클럽장 ${esc((c.owner||{}).name||'—')}</div>
          <div style="margin-top:5px">${(c.roster||[]).slice(0,8).map(r=>`<span class="pill ${r.role==='owner'?'warn':r.role==='officer'?'ok':'gray'}">${esc(r.name)}</span>`).join('')}</div></div>
          <button class="btn xs ghost" onclick="delClub(${c.id},'${esc(c.name)}')">삭제</button></div>`).join('') : '<div class="meta">클럽이 없어요</div>') + '</div>';
    }
    else if(TAB==='oms'){
      let rows;
      try{ rows=await api('/admin/open-matches'); }
      catch(e){
        v.innerHTML=`<div class="card"><b style="font-size:14px">서버에 봇 라우트가 아직 없어요</b>
          <div class="meta" style="margin-top:6px;line-height:1.7">이 파일 하단 주석의 코드 3개(<b>/admin/open-matches</b> 목록,
          <b>bots</b> 추가, 제거)를 server.js의 다른 /admin 라우트 옆에 붙여넣고 배포하면 이 탭이 살아나요.</div></div>`;
        return;
      }
      OMS=rows;
      v.innerHTML=`
      <div class="card"><b style="font-size:14px">① 매치 선택</b>
        ${rows.length? rows.map(m=>`
        <div class="row" id="om${m.id}" style="cursor:pointer" onclick="pick(${m.id})">
          <div style="flex:1;min-width:0"><b>${esc(m.loc||'오픈매치')}</b> ${SEL===m.id?'<span class="pill warn">선택됨</span>':''}
            <div class="meta">#${m.id} · ${esc(m.dt||'')} · ${(m.players||[]).length}/${m.cap||0}명 · ${m.price?won(m.price):'무료'} · ${esc(m.status||'open')}</div></div></div>`).join('') : '<div class="meta">오픈매치가 없어요</div>'}
      </div>
      <div class="card" id="botCard">
        <b style="font-size:14px">② 봇 참가자 추가</b>
        <div class="meta" style="margin:6px 0 9px">외부 클럽 인원 등 실제로 올 사람을 넣어요. 성별·레벨은 참가자 분포 차트와 대진 편성에 반영돼요.</div>
        <div id="botRows"></div>
        <button class="btn ghost xs" style="width:100%;margin-top:4px" onclick="addRow()">+ 인원 추가</button>
        <button class="btn coral" style="width:100%;margin-top:9px" onclick="addBots()">추가하기</button>
        <div id="parts" style="margin-top:11px"></div>
      </div>`;
      drawParts(); if(!document.querySelector('#botRows > div')) addRow();
    }
    else if(TAB==='reports'){
      const rows=await api('/admin/reports');
      v.innerHTML='<div class="card">'+ (rows.length? rows.map(r=>`
        <div class="row"><div style="flex:1;min-width:0"><b>${esc(r.reason||'신고')}</b>
          <div class="meta">#${r.id} · ${esc(r.target_type||'')} ${r.target?('· '+esc(r.target.title||'')):''} · ${fdate(r.created_at)}</div></div>
          <div style="display:flex;gap:5px;flex:none">
            <button class="btn xs coral" onclick="resolveRep(${r.id},'removed')">삭제 조치</button>
            <button class="btn xs ghost" onclick="resolveRep(${r.id},'rejected')">기각</button></div></div>`).join('') : '<div class="meta">미처리 신고가 없어요</div>') + '</div>';
    }
    else if(TAB==='payouts'){
      const rows=await api('/admin/payouts');
      v.innerHTML='<div class="card">'+ (rows.length? rows.map(p=>`
        <div class="row"><div style="flex:1;min-width:0"><b>${esc(p.name)}</b> · ${won(p.amount)}
          <div class="meta">#${p.id} · ${esc(p.bank||'계좌 미등록')} · 요청 ${fdate(p.created_at||p.requested_at)}</div></div>
          <button class="btn xs coral" onclick="paidPayout(${p.id})">이체 완료</button></div>`).join('') : '<div class="meta">대기 중인 정산이 없어요</div>') + '</div>';
    }
    else if(TAB==='banners'){
      const rows=await api('/admin/banners');
      window._BN=rows;
      v.innerHTML=`<div class="card"><b style="font-size:14px">배너 추가</b>
          <input type="file" id="bnFile" accept="image/*" style="margin-top:8px">
          <input id="bnLink" placeholder="탭했을 때 열릴 링크 (선택)" style="margin-top:8px">
          <select id="bnSlot" style="margin-top:8px">
            <option value="home">홈 배너 (앱 첫 화면)</option>
            <option value="bracket">대진 배너 (대진 만들기 화면)</option>
          </select>
          <button class="btn coral" style="width:100%;margin-top:9px" onclick="addBanner()">올리기</button></div>
        <div class="card"><b style="font-size:14px">노출 순서</b>
        <div class="meta" style="margin:4px 0 6px">▲▼로 순서를 바꾸면 홈 캐러셀에 그 순서로 나와요 · 위가 1번</div>`+ (rows.length? rows.map((b,i)=>`
        <div class="row"><b style="width:20px;text-align:center;color:${i===0?'var(--coral)':'var(--lgray)'}">${i+1}</b>
          <img src="${esc(b.image)}" style="width:100px;border-radius:10px;flex:none" alt="">
          <div style="flex:1;min-width:0" class="meta"><span style="display:inline-block;font-size:10px;font-weight:800;border-radius:6px;padding:2px 7px;background:${b.slot==='bracket'?'#eef4ff':'#fceee4'};color:${b.slot==='bracket'?'#2b62c9':'#cf5418'}">${b.slot==='bracket'?'대진':'홈'}</span> #${b.id} · ${fdate(b.created_at)}<br>${esc(b.link||'링크 없음')}</div>
          <div style="display:flex;flex-direction:column;gap:4px;flex:none">
            <button class="btn xs ghost" ${i===0?'disabled style="opacity:.3"':''} onclick="bnMove(${i},-1)">▲</button>
            <button class="btn xs ghost" ${i===rows.length-1?'disabled style="opacity:.3"':''} onclick="bnMove(${i},1)">▼</button></div>
          <button class="btn xs ghost" onclick="delBanner(${b.id})">삭제</button></div>`).join('') : '<div class="meta">배너가 없어요</div>') + '</div>';
    }
  }catch(e){ v.innerHTML=`<div class="card meta">불러오지 못했어요 (${esc(e.message).slice(0,120)})</div>`; }
}

/* ── 액션들 ── */
async function delUser(id,name){ if(!confirm(`${name} 회원을 삭제할까요? 활동 기록까지 지워지고 되돌릴 수 없어요.`))return;
  try{ await api('/admin/users/'+id+'?force=1',{method:'DELETE'}); toast('삭제했어요'); render(); }catch(e){ toast('삭제하지 못했어요 ('+String(e.message).slice(0,60)+')'); } }
async function delClub(id,name){ if(!confirm(`${name} 클럽을 삭제할까요? 되돌릴 수 없어요.`))return;
  try{ await api('/admin/clubs/'+id,{method:'DELETE'}); toast('삭제했어요'); render(); }catch(e){ toast('삭제하지 못했어요'); } }
async function resolveRep(id,action){ try{ await api('/admin/reports/'+id+'/resolve',{method:'POST',body:JSON.stringify({action})}); toast('처리했어요'); render(); }catch(e){ toast('처리하지 못했어요'); } }
async function paidPayout(id){ if(!confirm('이체를 완료 처리할까요? 매니저에게 완료 알림이 가요.'))return;
  try{ await api('/admin/payouts/'+id+'/paid',{method:'POST',body:'{}'}); toast('완료 처리했어요'); render(); }catch(e){ toast('처리하지 못했어요'); } }
async function bnMove(i,dir){
  const rows=window._BN||[]; const j=i+dir;
  if(j<0||j>=rows.length) return;
  [rows[i],rows[j]]=[rows[j],rows[i]];
  try{ await api('/admin/banners/order',{method:'PATCH',body:JSON.stringify({ids:rows.map(b=>b.id)})});
    toast('순서를 저장했어요'); render(); }
  catch(e){ toast('순서 저장 실패 · server.js 배포를 확인해 주세요'); }
}
async function delBanner(id){ try{ await api('/admin/banners/'+id,{method:'DELETE'}); toast('삭제했어요'); render(); }catch(e){ toast('삭제하지 못했어요'); } }
async function addBanner(){
  const f=$('bnFile').files[0]; if(!f){ toast('이미지를 선택해 주세요'); return; }
  const data=await new Promise((ok,no)=>{ const r=new FileReader(); r.onload=()=>ok(r.result); r.onerror=no; r.readAsDataURL(f); });
  try{ await api('/admin/banners',{method:'POST',body:JSON.stringify({image:data,link:$('bnLink').value.trim(), slot:((document.getElementById('bnSlot')||{}).value||'home')})}); toast('배너를 올렸어요'); render(); }
  catch(e){ toast(String(e.message).includes('too_large')?'이미지는 3MB 이하로 해주세요':'올리지 못했어요'); }
}

/* ── 오픈매치 봇 ── */
function pick(id){ SEL=id; render(); }
function drawParts(){
  const box=$('parts'); if(!box) return;
  if(!SEL){ box.innerHTML='<div class="meta">위에서 매치를 먼저 선택해 주세요</div>'; return; }
  const m=OMS.find(x=>x.id===SEL)||{};
  const ps=m.players||[];
  document.querySelectorAll('#view .row').forEach(el=>el.classList.remove('sel'));
  const row=$('om'+SEL); if(row) row.classList.add('sel');
  box.innerHTML = `<div class="meta" style="margin-bottom:6px">${esc(m.loc||'')} · 참가자 ${ps.length}/${m.cap||0}명</div>` +
    (ps.length? ps.map(p=>`<span class="pill ${p.provider==='bot'?'warn':'ok'}">${esc(p.name)}${p.provider==='bot'?' 🤖':''}
      <a style="cursor:pointer;font-weight:900;margin-left:3px" onclick="rmBot(${p.id})">×</a></span>`).join('') : '<div class="meta">아직 참가자가 없어요</div>');
}
const LV=[['러브 (배치 전)',1000],['퓨처스1 · 1.0~1.5',850],['퓨처스2 · 1.5~2.0',900],['퓨처스3 · 2.0',975],
  ['챌린저1 · 2.5',1025],['챌린저2 · 2.5~3.0',1075],['챌린저3 · 3.0',1125],['챌린저4 · 3.0~3.5',1175],['챌린저5 · 3.5',1225],
  ['투어1 · 3.5~4.0',1285],['투어2 · 4.0',1355],['투어3 · 4.5',1425],['그랜드슬램 · 5.0+',1500]];
function addRow(){
  const box=$('botRows'); if(!box) return;
  const div=document.createElement('div');
  div.style.cssText='display:flex;gap:6px;margin-bottom:7px';
  div.innerHTML=`<input class="bn" placeholder="이름" style="flex:1.2">
    <select class="bg" style="flex:.8;border:1.5px solid #ece8e0;border-radius:12px;padding:0 8px;font-family:inherit;font-weight:600;font-size:13px;background:#fff">
      <option>남성</option><option>여성</option></select>
    <select class="br" style="flex:1.4;border:1.5px solid #ece8e0;border-radius:12px;padding:0 8px;font-family:inherit;font-weight:600;font-size:12px;background:#fff">
      ${LV.map(l=>`<option value="${l[1]}">${l[0]}</option>`).join('')}</select>
    <a style="align-self:center;font-weight:900;color:#b3aea4;cursor:pointer;padding:0 3px" onclick="this.parentNode.remove()">×</a>`;
  box.appendChild(div);
}
async function addBots(){
  if(!SEL){ toast('매치를 먼저 선택해 주세요'); return; }
  const bots=[...document.querySelectorAll('#botRows > div')].map(d=>({
    name:d.querySelector('.bn').value.trim(),
    gender:d.querySelector('.bg').value,
    rating:+d.querySelector('.br').value })).filter(b=>b.name).slice(0,20);
  if(!bots.length){ toast('인원 추가를 눌러 이름을 입력해 주세요'); return; }
  try{ const r=await api(`/admin/open-matches/${SEL}/bots`,{method:'POST',body:JSON.stringify({bots})});
    toast(`${r.added||0}명을 추가했어요`); $('botRows').innerHTML=''; addRow(); render(); }
  catch(e){ toast('추가하지 못했어요 · 서버 배포를 확인해 주세요'); }
}
async function rmBot(uid){
  if(!SEL) return;
  if(!confirm('이 참가자를 매치에서 뺄까요?')) return;
  try{ await api(`/admin/open-matches/${SEL}/bots/${uid}`,{method:'DELETE'}); toast('제거했어요'); render(); }
  catch(e){ toast('제거하지 못했어요'); }
}

drawTabs();
if(key()){ $('key').value='●●●●●●●●'; render(); }
</script>

<!-- ═══════════════════════════════════════════════════════════════
  ▼ server.js에 추가할 라우트 3개 — 기존 /admin 라우트들 옆에 붙여넣으세요.
    (admin 미들웨어·db·now()는 이미 server.js에 있는 것을 그대로 씁니다)

// 오픈매치 목록 + 참가자 (관리자용)
app.get('/admin/open-matches', admin, (_req, res) => {
  const ms = db.prepare(`SELECT id,loc,dt,price,cap,status,sport FROM open_matches
    ORDER BY id DESC LIMIT 100`).all();
  res.json(ms.map(m => ({ ...m,
    players: db.prepare(`SELECT u.id, u.name, u.provider
      FROM open_match_joins j JOIN users u ON u.id = j.user_id
      WHERE j.match_id = ? ORDER BY j.joined_at`).all(m.id) })));
});

// 봇 참가자 추가 — 이름만으로 provider='bot' 유저를 만들어 참가시킨다
app.post('/admin/open-matches/:id/bots', admin, (req, res) => {
  const mid = +req.params.id;
  const m = db.prepare('SELECT * FROM open_matches WHERE id=?').get(mid);
  if (!m) return res.status(404).json({ error: 'not_found' });
  const names = ((req.body || {}).names || []).map(s => String(s).trim()).filter(Boolean).slice(0, 20);
  let added = 0;
  for (const name of names) {
    const cur = db.prepare('SELECT COUNT(*) n FROM open_match_joins WHERE match_id=?').get(mid).n;
    if (cur >= (m.cap || 8)) break;                                   // 정원 초과 방지
    const pid = 'bot:' + name;
    let u = db.prepare("SELECT id FROM users WHERE provider='bot' AND provider_id=?").get(pid);
    if (!u) {
      const r = db.prepare(`INSERT INTO users (provider,provider_id,name,anon_nick,created_at)
        VALUES ('bot',?,?,?,?)`).run(pid, name, name, now());
      u = { id: r.lastInsertRowid };
    }
    const r2 = db.prepare(`INSERT OR IGNORE INTO open_match_joins (match_id,user_id,joined_at)
      VALUES (?,?,?)`).run(mid, u.id, now());
    if (r2.changes) added++;
  }
  res.json({ ok: true, added });
});

// 봇(또는 참가자) 제거
app.delete('/admin/open-matches/:id/bots/:uid', admin, (req, res) => {
  db.prepare('DELETE FROM open_match_joins WHERE match_id=? AND user_id=?')
    .run(+req.params.id, +req.params.uid);
  res.json({ ok: true });
});
