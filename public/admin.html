<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MATSU 운영자 콘솔</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{ --ink:#1c1b18; --coral:#ec6a2e; --coral-d:#cf5418; --felt:#f2f1ec; --gray:#7d7870; --lgray:#b3aea4; --line:#ececea; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:#edecea; font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo',sans-serif;
    color:var(--ink); letter-spacing:-.012em; line-height:1.55; padding:20px 14px 60px; }
  .wrap{ max-width:560px; margin:0 auto; }
  h1{ font-size:24px; font-weight:900; letter-spacing:-.03em; margin:6px 2px 2px; }
  .sub{ font-size:13px; color:var(--gray); font-weight:600; margin:0 2px 16px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px; margin-bottom:12px; }
  .ch{ font-size:15px; font-weight:800; margin-bottom:10px; }
  .btn{ width:100%; padding:13px; border:none; border-radius:14px; font-size:14.5px; font-weight:800;
    font-family:inherit; cursor:pointer; background:var(--coral); color:#fff; }
  .btn.ghost{ background:#fff; border:1.5px solid #e9dfcf; color:#5a544b; }
  .btn.sm{ width:auto; padding:9px 14px; font-size:12.5px; border-radius:11px; }
  input, textarea{ width:100%; border:1.5px solid #ece8e0; border-radius:12px; padding:11px 12px;
    font-size:14px; font-family:inherit; font-weight:600; background:#fff; }
  .note{ font-size:12px; color:#8a7550; font-weight:700; background:#faf6ee; border-radius:12px; padding:10px 12px; }
  .pill{ display:inline-block; font-size:11px; font-weight:800; border-radius:20px; padding:3px 10px; }
  .pill.ok{ background:#edf2ec; color:#4c7a5c; } .pill.no{ background:#fceee4; color:#cf5418; }
  .mrow{ display:flex; align-items:center; gap:10px; padding:12px 2px; border-top:1px solid #f0efec; cursor:pointer; }
  .mrow:first-of-type{ border-top:none; }
  .mrow b{ font-size:14px; } .mrow .meta{ font-size:11.5px; color:var(--gray); font-weight:700; margin-top:2px; }
  .badge{ font-size:11px; font-weight:800; color:#cf5418; background:#fceee4; border-radius:8px; padding:2px 8px; flex:none; }
  .toast{ position:fixed; left:50%; bottom:30px; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:12px 18px; border-radius:14px; font-size:13.5px; font-weight:700; opacity:0; transition:.3s; pointer-events:none; z-index:9; }
  .toast.on{ opacity:1; }
</style>
</head>
<body>
<div class="wrap">
  <h1>MATSU 운영자 콘솔</h1>
  <p class="sub">오픈매치 봇 참가자 관리 · 이 파일은 서버 public 폴더에 admin.html로 두세요</p>

  <!-- ① 로그인 상태 -->
  <div class="card">
    <div class="ch">운영자 계정 <span id="whoami" class="pill no">확인 중…</span></div>
    <div id="authArea">
      <div class="note" style="margin-bottom:10px">
        앱과 같은 브라우저면 로그인이 자동으로 이어져요.
        운영자 지정은 Railway 환경변수 <b>ADMIN_EMAILS</b>에 이메일을 쉼표로 넣으면 돼요.
      </div>
      <div style="display:flex; gap:8px;">
        <input id="devName" placeholder="이름 로그인 (dev-login)">
        <button class="btn sm" onclick="devLogin()" style="flex:none">로그인</button>
      </div>
    </div>
  </div>

  <!-- ② 오픈매치 목록 -->
  <div class="card">
    <div class="ch" style="display:flex;justify-content:space-between;align-items:center">오픈매치
      <button class="btn sm ghost" onclick="loadMatches()">새로고침</button></div>
    <div id="mlist" style="margin-top:4px"><div class="meta" style="padding:8px 2px">불러오는 중…</div></div>
  </div>

  <!-- ③ 봇 참가자 추가 -->
  <div class="card">
    <div class="ch">봇 참가자 추가 <span id="selName" class="badge" style="display:none"></span></div>
    <div class="note" style="margin-bottom:10px">위 목록에서 매치를 먼저 탭하세요. 외부 클럽 인원 등 <b>실제로 올 사람</b>의 이름을 넣으면 그 수만큼 정원이 채워져요.</div>
    <textarea id="botNames" rows="3" placeholder="이름을 쉼표로 구분해 입력&#10;예: 김철수, 이영희, 박민수"></textarea>
    <button class="btn" style="margin-top:10px" onclick="addBots()">참가자 추가하기</button>
    <div id="parts" style="margin-top:12px"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ─── 앱과 동일한 규약: 같은 오리진 API + localStorage 'matsu_jwt' 토큰 ─── */
const API = location.origin;
const TOKEN_KEY = 'matsu_jwt';
let SEL = null;          // 선택된 매치
let MATCHES = [];

const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
function toast(t){ const el=$('toast'); el.textContent=t; el.classList.add('on'); setTimeout(()=>el.classList.remove('on'), 2400); }
function token(){ try{ return localStorage.getItem(TOKEN_KEY); }catch(e){ return null; } }

async function api(path, opts){
  const r = await fetch(API+path, { ...opts,
    headers:{ 'Content-Type':'application/json', ...(token()?{Authorization:'Bearer '+token()}:{}) , ...((opts&&opts.headers)||{}) } });
  if(!r.ok) throw new Error(await r.text().catch(()=>String(r.status)));
  return r.json();
}

/* ── 로그인 / 운영자 확인 ── */
async function devLogin(){
  const name = $('devName').value.trim();
  if(!name){ toast('이름을 입력해 주세요'); return; }
  try{
    const d = await api('/auth/dev-login', { method:'POST',
      body: JSON.stringify({ name, provider:'kakao', gender:'남성', region:'경기 용인', sport:'tennis' }) });
    localStorage.setItem(TOKEN_KEY, d.token);
    toast('로그인했어요'); checkAdmin(); loadMatches();
  }catch(e){ toast('로그인하지 못했어요'); }
}

async function checkAdmin(){
  const el = $('whoami');
  if(!token()){ el.textContent='로그인 필요'; el.className='pill no'; return; }
  try{
    const w = await api('/admin/whoami');           // admin-tools 라우트 (하단 서버 코드 참고)
    el.textContent = w.is_admin ? `운영자 · ${w.email||''}` : '운영자 아님 (ADMIN_EMAILS 확인)';
    el.className = 'pill ' + (w.is_admin ? 'ok' : 'no');
  }catch(e){
    el.textContent='서버에 /admin 라우트 없음 — 하단 주석의 코드를 server.js에 넣어주세요';
    el.className='pill no';
  }
}

/* ── 매치 목록 ── */
async function loadMatches(){
  const box = $('mlist');
  try{
    MATCHES = await api('/open-matches?sport=tennis');
  }catch(e){ box.innerHTML = '<div class="meta">목록을 불러오지 못했어요</div>'; return; }
  if(!MATCHES.length){ box.innerHTML='<div class="meta" style="padding:8px 2px">오픈매치가 없어요</div>'; return; }
  box.innerHTML = MATCHES.map(m => `
    <div class="mrow" onclick="pick(${m.id})" id="mr${m.id}">
      <div style="flex:1;min-width:0">
        <b>${esc(m.loc||'오픈매치')}</b>
        <div class="meta">${esc(m.dt||'')} · ${m.cur||0}/${m.cap||0}명 · ${m.price?Number(m.price).toLocaleString()+'원':'무료'} · ${esc(m.status||'open')}</div>
      </div>
      ${SEL===m.id?'<span class="badge">선택됨</span>':''}
    </div>`).join('');
}

function pick(id){
  SEL = id;
  const m = MATCHES.find(x=>x.id===id) || {};
  $('selName').style.display='inline-block';
  $('selName').textContent = m.loc || ('매치 #'+id);
  loadMatches(); loadParts();
  toast('매치를 선택했어요');
}

/* ── 봇 추가 / 참가자 보기 ── */
async function addBots(){
  if(!SEL){ toast('먼저 매치를 선택해 주세요'); return; }
  const names = $('botNames').value.split(',').map(s=>s.trim()).filter(Boolean).slice(0,20);
  if(!names.length){ toast('이름을 입력해 주세요'); return; }
  try{
    const r = await api(`/admin/open-matches/${SEL}/bots`, { method:'POST', body: JSON.stringify({ names }) });
    toast(`${r.added||0}명을 추가했어요`);
    $('botNames').value=''; loadMatches(); loadParts();
  }catch(e){
    toast(String(e.message).includes('admin_only') ? '운영자 계정이 아니에요' : '서버에 /admin 라우트가 필요해요 (하단 주석 참고)');
  }
}

async function loadParts(){
  if(!SEL) return;
  const box = $('parts');
  try{
    const m = MATCHES.find(x=>x.id===SEL);
    const players = (m && m.players) || [];
    box.innerHTML = players.length
      ? '<div class="meta" style="margin-bottom:6px">참가자 '+players.length+'명</div>' +
        players.map(p=>`<span class="pill ok" style="margin:0 6px 6px 0">${esc(p.name)}${p.is_bot?' 🤖':''}</span>`).join('')
      : '<div class="meta">아직 참가자가 없어요</div>';
  }catch(e){ box.innerHTML=''; }
}

checkAdmin(); loadMatches();
</script>

<!-- ═══════════════════════════════════════════════════════════════
  ▼▼ 서버 코드 (server.js에 붙여넣기) — 이 페이지가 쓰는 /admin 라우트 ▼▼

  ① Railway 환경변수:  ADMIN_EMAILS=you@gmail.com,partner@gmail.com
  ② /me·로그인 응답에 한 줄:  user.is_admin = isAdmin(user.email);
     → 앱(index.html)의 「봇 참가자 추가 · 운영자」 버튼이 자동 표시돼요.

  const ADMIN_EMAILS = (process.env.ADMIN_EMAILS||'').split(',')
    .map(s=>s.trim().toLowerCase()).filter(Boolean);
  const isAdmin = email => ADMIN_EMAILS.includes(String(email||'').toLowerCase());
  const requireAdmin = (req,res,next)=>
    (req.user && isAdmin(req.user.email)) ? next() : res.status(403).json({error:'admin_only'});

  app.get('/admin/whoami', requireAuth, (req,res)=>
    res.json({ email:req.user.email, is_admin:isAdmin(req.user.email) }));

  app.post('/admin/open-matches/:id/bots', requireAuth, requireAdmin, async (req,res)=>{
    const matchId = Number(req.params.id);
    const names = (req.body.names||[]).map(s=>String(s).trim()).filter(Boolean).slice(0,20);
    if(!names.length) return res.status(400).json({error:'no_names'});
    const m = await db.getOpenMatch(matchId);
    if(!m) return res.status(404).json({error:'not_found'});
    let added = 0;
    for(const name of names){
      if((m.cur||0)+added >= (m.cap||0)) break;                      // 정원 초과 방지
      const botEmail = 'bot+'+Buffer.from(name).toString('hex').slice(0,12)+'@matsu.local';
      let bot = await db.findUserByEmail(botEmail);
      if(!bot) bot = await db.createUser({ email:botEmail, name, is_bot:true, rating:1000 });
      if(!(await db.isParticipant(matchId, bot.id))){
        await db.addParticipant(matchId, bot.id, { paid:true });     // 봇은 결제 스킵
        added++;
      }
    }
    res.json({ ok:true, added });
  });

  ※ db.getOpenMatch / findUserByEmail / createUser / isParticipant / addParticipant
     다섯 곳만 실제 스키마의 쿼리로 바꾸면 끝. users에 is_bot 컬럼이 없으면:
     ALTER TABLE users ADD COLUMN is_bot INTEGER DEFAULT 0;
═══════════════════════════════════════════════════════════════ -->
</body>
</html>
