<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>맞수 관리자</title>
<style>
  *{box-sizing:border-box;margin:0}
  body{font-family:Pretendard,-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f4f2ee;color:#1c1b18;padding:18px;max-width:760px;margin:0 auto}
  h1{font-size:22px;margin:4px 0 2px}
  .sub{font-size:12.5px;color:#7d7870;margin-bottom:14px}
  .card{background:#fff;border:1px solid #ececea;border-radius:16px;padding:15px;margin-bottom:12px}
  .ch{font-size:14px;font-weight:800;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
  input,select{border:1.5px solid #e2ded6;border-radius:10px;padding:10px 12px;font:inherit;font-size:13.5px}
  button{border:none;border-radius:10px;padding:9px 13px;font:inherit;font-size:12.5px;font-weight:800;cursor:pointer;background:#efece6}
  .btn{background:#1c1b18;color:#fff}
  .danger{background:#fceee4;color:#cf5418}
  .ok{background:#e6f3ec;color:#2f7d4f}
  .row{display:flex;align-items:center;gap:9px;padding:9px 2px;border-bottom:1px solid #f2f0ec;font-size:13px;flex-wrap:wrap}
  .row:last-child{border-bottom:none}
  .row b{flex:1;font-weight:700;min-width:120px}
  .meta{color:#8a857c;font-size:11.5px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
  .stat{background:#faf8f4;border-radius:12px;padding:12px;text-align:center}
  .stat b{font-size:19px;display:block}
  .stat span{font-size:11px;color:#8a857c;font-weight:700}
  .tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .tab{padding:8px 13px;border-radius:18px;background:#fff;border:1.5px solid #e2ded6;font-size:12.5px;font-weight:800;cursor:pointer}
  .tab.on{background:#1c1b18;color:#fff;border-color:#1c1b18}
  .sec{display:none}.sec.on{display:block}
  #out{white-space:pre-wrap;font-size:11.5px;color:#5a554c;background:#faf8f4;border-radius:11px;padding:10px;margin-top:8px;display:none;max-height:180px;overflow:auto}
  .warn{background:#fdf2dd;border-radius:11px;padding:10px 12px;font-size:12px;color:#7a5c12;font-weight:600;line-height:1.55}
</style>
</head>
<body>
<h1>맞수 관리자</h1>
<div class="sub">운영 도구 — 키를 아는 사람만 사용할 수 있어요.</div>

<div class="card">
  <div style="display:flex;gap:8px">
    <input id="key" type="password" placeholder="ADMIN_KEY" style="flex:1">
    <button class="btn" onclick="boot()">접속</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="tabs">
    <div class="tab on" data-s="stats" onclick="tab(this)">현황</div>
    <div class="tab" data-s="users" onclick="tab(this)">회원</div>
    <div class="tab" data-s="clubs" onclick="tab(this)">클럽</div>
    <div class="tab" data-s="reports" onclick="tab(this)">신고</div>
    <div class="tab" data-s="tools" onclick="tab(this)">도구</div>
  </div>

  <div class="sec on" id="sec-stats"><div class="card"><div class="ch">서비스 현황</div><div class="grid" id="stats"></div></div></div>

  <div class="sec" id="sec-users">
    <div class="card"><div class="ch">회원 <span class="meta" id="uCnt"></span></div><div id="users"></div></div>
    <div class="card"><div class="ch">탈퇴(정지) 계정 — 영구 삭제 <span class="meta" id="suCnt"></span></div><div id="susUsers"></div></div>
  </div>

  <div class="sec" id="sec-clubs">
    <div class="card"><div class="ch">클럽 <span class="meta" id="cCnt"></span></div><div id="clubs"></div>
      <div class="warn" style="margin-top:10px">영구 삭제는 회원 명단·일정·대진·공지·피드·회비 장부까지 전부 지웁니다. 이름을 그대로 입력해야 실행돼요.</div></div>
    <div class="card"><div class="ch">프리미엄 부여</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="pmId" placeholder="클럽 id" style="width:90px">
        <select id="pmMonths"><option value="1">1개월</option><option value="3">3개월</option><option value="12">12개월</option></select>
        <button class="ok" onclick="premium()">부여</button></div></div>
  </div>

  <div class="sec" id="sec-reports">
    <div class="card"><div class="ch">신고 목록 <span class="meta" id="rCnt"></span></div><div id="reports"></div></div>
  </div>

  <div class="sec" id="sec-tools">
    <div class="card"><div class="ch">백업</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="call('POST','/admin/backup')">지금 백업</button>
        <button onclick="dlBackup()">최근 백업 내려받기</button></div></div>
    <div class="card"><div class="ch">리마인더</div>
      <button onclick="call('POST','/admin/run-reminders')">모임 리마인더 지금 실행</button></div>
  </div>

  <div id="out"></div>
</div>

<script>
const $=id=>document.getElementById(id);
const H=()=>({ 'x-admin-key': $('key').value.trim() });
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function say(t){ $('out').style.display='block'; $('out').textContent=typeof t==='string'?t:JSON.stringify(t,null,1); }
function tab(el){ document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t===el));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('on', s.id==='sec-'+el.dataset.s)); }

async function J(method, url, body){
  const r=await fetch(url,{method,headers:{...H(),...(body?{'Content-Type':'application/json'}:{})},body:body?JSON.stringify(body):undefined});
  const d=await r.json().catch(()=>({}));
  if(r.status===403) throw new Error('키가 틀렸어요');
  if(!r.ok) throw new Error(d.error||('HTTP '+r.status));
  return d;
}
async function call(m,u,b){ try{ say(await J(m,u,b)); }catch(e){ say('실패: '+e.message); } }

async function boot(){
  try{
    const s=await J('GET','/admin/stats');
    $('app').style.display='block';
    $('stats').innerHTML=Object.entries(s).map(([k,v])=>`<div class="stat"><b>${esc(v)}</b><span>${esc(k)}</span></div>`).join('');
    loadUsers(); loadClubs(); loadReports();
  }catch(e){ alert(e.message.includes('키')?'키가 틀렸어요':'접속 실패 — server.js가 최신인지 확인 ('+e.message+')'); }
}

async function loadUsers(){
  try{
    const us=await J('GET','/admin/users');
    $('uCnt').textContent=us.length+'명';
    $('users').innerHTML=us.slice(0,120).map(u=>`
      <div class="row"><b>#${u.id} ${esc(u.name)}</b>
        <span class="meta">${esc(u.provider||'')} · ${esc(u.sport||'')} ${u.suspended?'· <b style="color:#cf5418">정지</b>':''}</span>
        <button onclick="call('POST','/admin/users/${u.id}/suspend').then(loadUsers)">${u.suspended?'해제':'정지'}</button></div>`).join('');
  }catch(e){ $('users').innerHTML='<div class="meta">'+esc(e.message)+'</div>'; }
  try{
    const d=await J('GET','/admin/purge-list');
    const su=d.suspended_users||[];
    $('suCnt').textContent=su.length+'건';
    $('susUsers').innerHTML=su.length?su.map(u=>`
      <div class="row"><b>#${u.id} ${esc(u.name||'탈퇴한 회원')}</b>
        <button class="danger" onclick="delUser(${u.id})">영구 삭제</button></div>`).join('')
      :'<div class="meta" style="padding:6px 2px">정리할 계정이 없어요</div>';
  }catch(e){ $('susUsers').innerHTML='<div class="meta">'+esc(e.message)+'</div>'; }
}

async function loadClubs(){
  try{
    const d=await J('GET','/admin/purge-list');
    const cs=d.clubs||[];
    $('cCnt').textContent=cs.length+'개';
    $('clubs').innerHTML=cs.length?cs.map(c=>`
      <div class="row"><b>#${c.id} ${esc(c.name)}</b>
        <span class="meta">${esc(c.sport||'')} · ${c.members}명</span>
        <button class="danger" onclick="delClub(${c.id},'${esc(c.name)}')">영구 삭제</button></div>`).join('')
      :'<div class="meta">클럽이 없어요</div>';
  }catch(e){ $('clubs').innerHTML='<div class="meta">'+esc(e.message)+'</div>'; }
}

async function loadReports(){
  try{
    const rs=await J('GET','/admin/reports');
    $('rCnt').textContent=rs.length+'건';
    $('reports').innerHTML=rs.length?rs.map(r=>`
      <div class="row"><b>#${r.id} ${esc(r.kind||'')} · ${esc(r.target||'')}</b>
        <span class="meta">${esc(r.reason||'')}${r.resolved?' · 처리됨':''}</span>
        ${r.resolved?'':`<button class="ok" onclick="call('POST','/admin/reports/${r.id}/resolve').then(loadReports)">처리</button>`}</div>`).join('')
      :'<div class="meta">신고가 없어요</div>';
  }catch(e){ $('reports').innerHTML='<div class="meta">'+esc(e.message)+'</div>'; }
}

async function delUser(id){
  if(!confirm(`#${id} 계정을 영구 삭제할까요?\n관련 데이터가 모두 지워지고 복구할 수 없어요.`)) return;
  try{ const d=await J('DELETE','/admin/users/'+id); say(`삭제됨: ${d.deleted}\n정리: ${(d.wiped||[]).join(', ')||'없음'}`); loadUsers(); }
  catch(e){ say('실패: '+e.message); }
}
async function delClub(id,name){
  const typed=prompt(`정말 삭제하려면 클럽 이름을 그대로 입력하세요:\n${name}`);
  if(typed!==name){ if(typed!==null) alert('이름이 달라 취소했어요'); return; }
  try{ const d=await J('DELETE','/admin/clubs/'+id); say(`삭제됨: ${d.deleted}\n정리: ${(d.wiped||[]).join(', ')||'없음'}`); loadClubs(); }
  catch(e){ say('실패: '+e.message); }
}
async function premium(){
  const id=+$('pmId').value; if(!id){ alert('클럽 id를 입력하세요'); return; }
  try{ const d=await J('POST',`/admin/clubs/${id}/premium`,{months:+$('pmMonths').value});
    say(`프리미엄 부여: 클럽 #${d.club_id} · ${new Date(d.premium_until).toLocaleDateString()}까지`); }
  catch(e){ say('실패: '+e.message); }
}
async function dlBackup(){
  try{
    const r=await fetch('/admin/backup/latest',{headers:H()});
    if(!r.ok) throw new Error('백업이 아직 없어요');
    const b=await r.blob(); const a=document.createElement('a');
    a.href=URL.createObjectURL(b); a.download='matsu-backup.db'; a.click();
  }catch(e){ say('실패: '+e.message); }
}
</script>
</body>
</html>
