<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>맞수 관리자</title>
<style>
  :root{--bg:#f2f0ea;--card:#fff;--ink:#1b1813;--gray:#8a8378;--lgray:#b8b2a7;--coral:#ec6a2e;--coral-d:#cf5418;--line:#ece8e0;--green:#2f7d4f;--red:#c8452c;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;}
  body{background:var(--bg);color:var(--ink);padding:22px 16px 60px;max-width:760px;margin:0 auto;}
  h1{font-size:26px;font-weight:900;letter-spacing:-.02em}
  .sub{font-size:13.5px;color:var(--gray);font-weight:600;margin:6px 0 16px}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:15px 16px;margin-bottom:10px}
  .row{display:flex;gap:8px;align-items:center}
  input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:11px 13px;font-size:14px;font-weight:600;background:#fff}
  button{border:none;border-radius:13px;padding:11px 16px;font-size:13.5px;font-weight:800;cursor:pointer;background:var(--ink);color:#fff;flex-shrink:0}
  button.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  button.danger{background:#fff;color:var(--red);border:1.5px solid #f0d4cc}
  button.sm{padding:7px 12px;font-size:12px;border-radius:10px}
  .tabs{display:flex;gap:7px;overflow-x:auto;margin:14px 0;-webkit-overflow-scrolling:touch}
  .tab{flex-shrink:0;border-radius:20px;padding:9px 16px;font-size:13.5px;font-weight:800;background:#fff;border:1.5px solid var(--line);cursor:pointer}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .stat{background:#f6f4ef;border-radius:15px;padding:16px 10px;text-align:center}
  .stat b{font-size:24px;display:block}
  .stat span{font-size:11.5px;color:var(--gray);font-weight:700}
  .item{display:flex;align-items:center;gap:10px;padding:11px 2px;border-top:1px solid #f0efec}
  .item:first-of-type{border-top:none}
  .item .tx{flex:1;min-width:0}
  .item b{font-size:14px}
  .item .d{font-size:11.5px;color:var(--gray);font-weight:700;margin-top:2px;overflow:hidden;text-overflow:ellipsis}
  .ch{font-size:15px;font-weight:900;margin:14px 2px 8px}
  .pill{display:inline-block;font-size:10.5px;font-weight:900;border-radius:8px;padding:3px 7px;background:#f1eee8;color:var(--gray)}
  .pill.g{background:#e7f4ec;color:var(--green)} .pill.r{background:#fceee4;color:var(--coral-d)}
  .note{font-size:12px;color:var(--gray);font-weight:600;line-height:1.5}
  img.bn{width:92px;height:36px;object-fit:cover;border-radius:8px;flex-shrink:0;border:1px solid var(--line)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#1b1813;color:#fff;font-size:13px;font-weight:700;border-radius:14px;padding:11px 18px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%}
</style>
</head>
<body>
<h1>맞수 관리자</h1>
<div class="sub">운영 도구 — 키를 아는 사람만 사용할 수 있어요.</div>

<div class="card"><div class="row">
  <input id="key" type="password" placeholder="관리자 키">
  <button onclick="enter()">접속</button>
</div></div>

<div class="tabs" id="tabs"></div>
<div id="body"></div>
<div id="toast"></div>

<script>
const TABS=[['stats','현황'],['users','회원'],['clubs','클럽'],['reports','신고'],['payouts','정산'],['banners','배너'],['orders','결제'],['tools','도구']];
let TAB='stats';
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.style.opacity=1;clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,2200);}
const KEY=()=>localStorage.getItem('matsu_admin_key')||'';
async function api(p,opt={}){
  const r=await fetch(p,{...opt,headers:{'Content-Type':'application/json','x-admin-key':KEY(),...(opt.headers||{})}});
  if(r.status===401||r.status===403) throw new Error('key');
  if(!r.ok) throw new Error('http'+r.status);
  const ct=r.headers.get('content-type')||'';
  return ct.includes('json')?r.json():r;
}
function enter(){ localStorage.setItem('matsu_admin_key',$('key').value.trim()); render(); }
function setTab(t){ TAB=t; render(); }
function tabsHtml(){ $('tabs').innerHTML=TABS.map(([k,l])=>`<div class="tab ${TAB===k?'on':''}" onclick="setTab('${k}')">${l}</div>`).join(''); }

async function render(){
  tabsHtml();
  const el=$('body'); el.innerHTML='<div class="card note">불러오는 중…</div>';
  if(!KEY()){ el.innerHTML='<div class="card note">관리자 키를 입력하고 접속을 누르세요.</div>'; return; }
  try{
    if(TAB==='stats'){
      const s=await api('/admin/stats');
      const cells=[['users','회원'],['clubs','클럽'],['posts','게시글'],['hidden','숨김 글'],['openReports','미처리 신고'],['matches','대전'],['paidOrders','결제 건수'],['revenueWon','매출(원)'],['cashIssued','발행 캐시']];
      el.innerHTML=`<div class="card"><div class="ch" style="margin-top:0">서비스 현황</div>
        <div class="grid">${cells.map(([k,l])=>`<div class="stat"><b>${(s[k]??0).toLocaleString()}</b><span>${l}</span></div>`).join('')}</div></div>`;
    }
    if(TAB==='users'){
      const us=await api('/admin/users');
      el.innerHTML=`<div class="card"><div class="ch" style="margin-top:0">회원 ${us.length}명 <span class="pill">최근 200명</span></div>`+
        us.map(u=>`<div class="item"><div class="tx"><b>${esc(u.name)}</b> <span class="pill">${esc(u.provider||'local')}</span>${u.premium?' <span class="pill g">프리미엄</span>':''}
          <div class="d">#${u.id} · ${esc(u.region||'-')} · 레이팅 ${u.rating||1000} · 캐시 ${u.cash||0} · ${esc((u.created_at||'').slice(0,10))}</div></div>
          <button class="sm ghost" onclick="act('/admin/users/${u.id}/suspend','POST','정지/해제')">정지·해제</button>
          <button class="sm danger" onclick="if(confirm('회원 #${u.id} ${esc(u.name)} 를 삭제할까요? 되돌릴 수 없어요.'))act('/admin/users/${u.id}','DELETE','삭제')">삭제</button></div>`).join('')+`</div>`;
    }
    if(TAB==='clubs'){
      const cs=await api('/admin/clubs');
      el.innerHTML=`<div class="card"><div class="ch" style="margin-top:0">클럽 ${cs.length}개</div>`+
        cs.map(c=>`<div class="item"><div class="tx"><b>${esc(c.name)}</b> <span class="pill">${esc(c.sport||'')}</span>${c.premium?' <span class="pill g">프리미엄</span>':''}
          <div class="d">#${c.id} · 회원 ${c.member_count??'-'}명 · 소유 ${esc(c.owner_name||c.owner_id||'-')}</div></div>
          <button class="sm ghost" onclick="act('/admin/clubs/${c.id}/premium','POST','프리미엄 토글',{premium:${c.premium?0:1}})">프리미엄</button>
          <button class="sm danger" onclick="if(confirm('클럽 ${esc(c.name)} 삭제?'))act('/admin/clubs/${c.id}','DELETE','삭제')">삭제</button></div>`).join('')+`</div>`;
    }
    if(TAB==='reports'){
      const rs=await api('/admin/reports');
      el.innerHTML=`<div class="card"><div class="ch" style="margin-top:0">미처리 신고 ${rs.length}건</div>`+
        (rs.length?rs.map(r=>`<div class="item"><div class="tx"><b>${esc(r.reason||'사유 없음')}</b> <span class="pill">${esc(r.target_type||'')}#${r.target_id||''}</span>
          <div class="d">${esc(r.target&&r.target.title||'')} · 신고자 #${r.reporter_id||'-'} · ${esc((r.created_at||'').slice(0,16))}</div></div>
          ${r.target_type==='post'?`<button class="sm danger" onclick="delAndResolve(${r.id},'/admin/posts/${r.target_id}')">글 삭제</button>`:''}
          <button class="sm ghost" onclick="act('/admin/reports/${r.id}/resolve','POST','검토 완료',{action:'reviewed'})">검토</button>
          <button class="sm ghost" onclick="act('/admin/reports/${r.id}/resolve','POST','기각',{action:'rejected'})">기각</button></div>`).join('')
        :`<div class="note">쌓인 신고가 없어요 🙌</div>`)+`</div>`;
    }
    if(TAB==='payouts'){
      const ps=await api('/admin/payouts');
      el.innerHTML=`<div class="card"><div class="ch" style="margin-top:0">매니저 정산 대기 ${ps.length}건</div>
        <div class="note" style="margin-bottom:8px">실제 계좌 이체 후 [이체 완료]를 누르면 매니저에게 알림이 가요. 정책: 경기 종료 후 3일 내 지급.</div>`+
        (ps.length?ps.map(p=>`<div class="item"><div class="tx"><b>${esc(p.name||'회원')}</b> <b style="color:var(--coral-d)">${(p.amount||0).toLocaleString()}원</b>
          <div class="d">${esc(p.bank||'계좌 미등록 — 회원에게 등록 요청')} · 요청 ${esc((p.created_at||'').slice(0,16))}</div></div>
          <button class="sm" onclick="if(confirm('이체를 마치셨나요?'))act('/admin/payouts/${p.id}/paid','POST','완료 처리')">이체 완료</button></div>`).join('')
        :`<div class="note">대기 중인 정산이 없어요.</div>`)+`</div>`;
    }
    if(TAB==='banners'){
      const bs=await api('/admin/banners');
      el.innerHTML=`<div class="card"><div class="ch" style="margin-top:0">홈 배너</div>
        <div class="note" style="margin-bottom:8px">등록하면 앱 홈 첫 화면 히어로 자리에 노출돼요. 탭하면 랜딩 링크가 열려요.</div>
        <input id="bnFile" type="file" accept="image/*" style="margin-bottom:8px">
        <input id="bnLink" placeholder="랜딩 링크 예) https://… 또는 mailto:…" style="margin-bottom:10px">
        <button onclick="bannerAdd()">배너 등록</button></div>
        <div class="card">`+
        (bs.length?bs.map(b=>`<div class="item"><img class="bn" src="${esc(b.image)}">
          <div class="tx"><div class="d">${esc(b.link||'링크 없음')} · ${esc((b.created_at||'').slice(0,16))}</div></div>
          <button class="sm danger" onclick="if(confirm('배너를 내릴까요?'))act('/admin/banners/${b.id}','DELETE','삭제')">삭제</button></div>`).join('')
        :`<div class="note">등록된 배너가 없어요 — 없으면 인사 히어로가 보여요.</div>`)+`</div>`;
    }
    if(TAB==='orders'){
      const os=await api('/admin/orders');
      el.innerHTML=`<div class="card"><div class="ch" style="margin-top:0">결제 ${os.length}건 <span class="pill">최근 200건</span></div>`+
        (os.length?os.map(o=>`<div class="item"><div class="tx"><b>${(o.amount||0).toLocaleString()}원</b>
          <span class="pill ${o.status==='paid'?'g':o.status==='refunded'?'r':''}">${esc(o.status||'')}</span>
          <div class="d">${esc(o.name||'회원')} · ${esc(o.order_id||'')} · 캐시 ${o.cash||0} · ${esc((o.created_at||'').slice(0,16))}</div></div>
          ${o.status==='paid'?`<button class="sm danger" onclick="if(confirm('이 결제를 환불할까요?'))act('/admin/orders/${encodeURIComponent(o.order_id)}/refund','POST','환불 요청')">환불</button>`:''}</div>`).join('')
        :`<div class="note">결제 내역이 없어요.</div>`)+`</div>`;
    }
    if(TAB==='tools'){
      const purge=await api('/admin/purge-list').catch(()=>[]);
      el.innerHTML=`<div class="card"><div class="ch" style="margin-top:0">도구</div>
        <div class="row" style="flex-wrap:wrap;gap:8px">
          <button class="ghost" onclick="act('/admin/backup','POST','백업 실행')">DB 백업 실행</button>
          <button class="ghost" onclick="dlBackup()">최신 백업 내려받기</button>
          <button class="ghost" onclick="act('/admin/run-reminders','POST','리마인더 발송')">모임 리마인더 발송</button>
        </div></div>
        <div class="card"><div class="ch" style="margin-top:0">탈퇴 예정(퍼지 대기) ${purge.length}명</div>`+
        (purge.length?purge.map(u=>`<div class="item"><div class="tx"><b>${esc(u.name||('#'+u.id))}</b><div class="d">${esc((u.deleted_at||u.created_at||'').slice(0,16))}</div></div></div>`).join('')
        :`<div class="note">대기 중인 계정이 없어요.</div>`)+`</div>`;
    }
  }catch(e){
    el.innerHTML=`<div class="card note">${e.message==='key'?'키가 올바르지 않아요. 다시 입력해 주세요.':'불러오지 못했어요 ('+esc(e.message)+')'}</div>`;
  }
}
async function act(p,method,label,body){
  try{ await api(p,{method,body:body?JSON.stringify(body):undefined}); toast(label+' 완료'); render(); }
  catch(e){ toast(label+' 실패'); }
}
async function delAndResolve(repId,delPath){
  if(!confirm('신고된 글을 삭제하고 처리할까요?')) return;
  try{ await api(delPath,{method:'DELETE'}); await api(`/admin/reports/${repId}/resolve`,{method:'POST',body:JSON.stringify({action:'removed'})});
    toast('글 삭제 + 신고 처리 완료'); render(); }catch(e){ toast('처리 실패'); }
}
function bannerAdd(){
  const f=$('bnFile').files&&$('bnFile').files[0];
  const link=($('bnLink').value||'').trim();
  if(!f){ toast('배너 이미지를 선택해 주세요'); return; }
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image(); img.onload=async()=>{
    try{
      const cv=document.createElement('canvas'); const sc=Math.min(1,1400/img.width);
      cv.width=img.width*sc; cv.height=img.height*sc;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      await api('/admin/banners',{method:'POST',body:JSON.stringify({image:cv.toDataURL('image/jpeg',0.82),link})});
      toast('배너를 등록했어요 · 홈에 바로 노출돼요'); render();
    }catch(e){ toast('등록하지 못했어요'); }
  }; img.src=rd.result; };
  rd.readAsDataURL(f);
}
async function dlBackup(){
  try{
    const r=await fetch('/admin/backup/latest',{headers:{'x-admin-key':KEY()}});
    if(!r.ok) throw 0;
    const blob=await r.blob(); const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='matsu-backup.db'; a.click();
  }catch(e){ toast('백업 파일이 없어요'); }
}
$('key').value=KEY();
render();
</script>
</body>
</html>
