<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<title>MATSU 운영 대시보드</title>
<style>
  :root{--ink:#1b1813;--coral:#ec6a2e;--coralD:#cf5418;--cream:#f5f2e9;--card:#fffdf6;--gray:#7f776a;--line:#e9e3d4;--blue:#3f6bc2;--ok:#2f9159;--red:#c0392b}
  *{box-sizing:border-box}
  body{margin:0;background:#e7e0d2;font-family:'Pretendard Variable',Pretendard,sans-serif;color:var(--ink);letter-spacing:-.01em}
  .wrap{max-width:1000px;margin:0 auto;padding:20px}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .logo{font-size:26px;font-weight:900;letter-spacing:-1px}
  input{border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;background:#fff}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;padding:9px 14px;font-weight:800;background:var(--coral);color:#fff;font-size:13px}
  button.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  button.red{background:var(--red)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  @media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .stat .v{font-size:28px;font-weight:900}
  .stat .l{font-size:12px;color:var(--gray);font-weight:700;margin-top:2px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px}
  .ch{font-size:16px;font-weight:900;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--gray);font-size:11px}
  .tag{font-size:11px;font-weight:800;border-radius:6px;padding:2px 7px;background:#efe9db}
  .muted{color:var(--gray)}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
</style></head>
<body><div class="wrap" id="app"></div>
<script>
const API = location.origin;
let KEY = sessionStorage.getItem('matsu_admin_key') || '';

async function adm(path, opt={}) {
  const r = await fetch(API + path, { ...opt, headers: { 'Content-Type':'application/json', 'x-admin-key': KEY, ...(opt.headers||{}) } });
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.status);
  return r.json();
}

function login() {
  document.getElementById('app').innerHTML = `
    <div class="center">
      <div class="logo">MATSU 운영</div>
      <div class="card" style="width:300px">
        <div class="ch">관리자 로그인</div>
        <input id="k" placeholder="ADMIN_KEY" style="width:100%;margin-bottom:10px" />
        <button style="width:100%" onclick="doLogin()">들어가기</button>
        <p class="muted" style="font-size:12px;margin-top:10px">서버 env ADMIN_KEY (데모 기본값: matsu-admin)</p>
      </div>
    </div>`;
}
async function doLogin() {
  KEY = document.getElementById('k').value.trim();
  try { await adm('/admin/stats'); sessionStorage.setItem('matsu_admin_key', KEY); dashboard(); }
  catch (e) { alert('접근 실패: ' + e.message); }
}
function logout(){ sessionStorage.removeItem('matsu_admin_key'); KEY=''; login(); }

async function dashboard() {
  document.getElementById('app').innerHTML = `
    <div class="top"><div class="logo">MATSU 운영 대시보드</div><button class="ghost" onclick="logout()">로그아웃</button></div>
    <div id="stats" class="grid"></div>
    <div class="card"><div class="ch">🚨 신고 처리 (모더레이션)</div><div id="reports">불러오는 중…</div></div>
    <div class="card"><div class="ch">💳 결제·매출</div><div id="orders">불러오는 중…</div></div>
    <div class="card"><div class="ch">👥 최근 가입 회원</div><div id="users">불러오는 중…</div></div>`;
  loadStats(); loadReports(); loadOrders(); loadUsers();
}

async function loadStats() {
  const s = await adm('/admin/stats');
  const cell = (v,l) => `<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  document.getElementById('stats').innerHTML =
    cell(s.users,'회원') + cell(s.clubs,'클럽') + cell(s.posts,'노출 글') + cell(s.openReports,'미처리 신고') +
    cell(s.matches,'경기') + cell(s.paidOrders,'결제건') + cell(s.revenueWon.toLocaleString()+'원','매출') + cell(s.cashIssued,'지급 M캐쉬');
}
async function loadReports() {
  const rs = await adm('/admin/reports');
  if (!rs.length) { document.getElementById('reports').innerHTML = '<p class="muted">미처리 신고가 없어요 👍</p>'; return; }
  document.getElementById('reports').innerHTML = `<table><tr><th>대상</th><th>사유</th><th>상태</th><th>조치</th></tr>` +
    rs.map(r => `<tr>
      <td>${r.target_type} #${r.target_id}${r.target ? ' · '+esc(r.target.title) : ''} ${r.target&&r.target.hidden?'<span class="tag">숨김</span>':''}</td>
      <td>${esc(r.reason||'')}</td>
      <td><span class="tag">${r.status}</span></td>
      <td>${r.target_type==='post' ? `<button class="red" onclick="hide(${r.target_id})">글 숨기기</button> ` : ''}<button class="ghost" onclick="resolve(${r.id})">넘어가기</button></td>
    </tr>`).join('') + `</table>`;
}
async function loadOrders() {
  const os = await adm('/admin/orders');
  if (!os.length) { document.getElementById('orders').innerHTML = '<p class="muted">결제 내역이 없어요.</p>'; return; }
  document.getElementById('orders').innerHTML = `<table><tr><th>주문</th><th>회원</th><th>금액</th><th>M캐쉬</th><th>상태</th></tr>` +
    os.map(o => `<tr><td class="muted">${o.order_id}</td><td>${esc(o.name||'')}</td><td>${(o.amount||0).toLocaleString()}원</td><td>${o.cash}</td><td><span class="tag">${o.status}</span> ${o.status==='paid'?`<button class="red" onclick="refund('${o.order_id}')">환불</button>`:''}</td></tr>`).join('') + `</table>`;
}
async function loadUsers() {
  const us = await adm('/admin/users');
  document.getElementById('users').innerHTML = `<table><tr><th>이름</th><th>가입</th><th>종목</th><th>레이팅</th><th>M캐쉬</th><th>조치</th></tr>` +
    us.slice(0,60).map(u => `<tr><td>${esc(u.name)} ${u.premium?'<span class="tag">P</span>':''} ${u.suspended?'<span class="tag" style="background:#fdecec;color:#c0392b">정지</span>':''}</td><td class="muted">${u.provider||''}</td><td>${u.sport}</td><td>${u.rating}</td><td>${u.cash}</td><td><button class="${u.suspended?'ghost':'red'}" onclick="suspend(${u.id})">${u.suspended?'해제':'정지'}</button></td></tr>`).join('') + `</table>`;
}
async function hide(id){ await adm('/admin/posts/'+id+'/hide',{method:'POST'}); loadReports(); loadStats(); }
async function suspend(id){ await adm('/admin/users/'+id+'/suspend',{method:'POST'}); loadUsers(); }
async function refund(oid){ if(!confirm('환불하시겠어요?'))return; try{ await adm('/admin/orders/'+oid+'/refund',{method:'POST'}); loadOrders(); loadStats(); alert('환불 처리됨'); }catch(e){ alert('환불 실패: '+e.message); } }
async function resolve(id){ await adm('/admin/reports/'+id+'/resolve',{method:'POST'}); loadReports(); loadStats(); }
function esc(s){ return String(s||'').replace(/[<>&]/g,x=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[x])); }

// boot
if (KEY) adm('/admin/stats').then(dashboard).catch(login); else login();
</script></body></html>
