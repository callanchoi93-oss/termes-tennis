<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>MATSU 운영자</title>
<style>
  :root{ --brand:#ED7C30; --ink:#1b1813; --gray:#6b6357; --lgray:#8a8172; --line:#e6ded2; --bg:#faf7f1; }
  *{box-sizing:border-box}
  body{margin:0;padding:22px 16px 60px;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',Pretendard,sans-serif;
    max-width:760px;margin:0 auto;line-height:1.6}
  h1{font-size:20px;letter-spacing:-.03em;margin:0 0 4px}
  .sub{font-size:13px;color:var(--lgray);margin-bottom:20px}
  input,button{font-family:inherit;font-size:14px}
  input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;background:#fff}
  button{padding:10px 14px;border:0;border-radius:10px;background:var(--brand);color:#fff;font-weight:800;cursor:pointer}
  button.ghost{background:#fff;color:var(--gray);border:1.5px solid var(--line)}
  button.del{background:#fff;color:#b3261e;border:1.5px solid #f0d6d3}
  .row{display:flex;gap:8px;align-items:center}
  .tabs{display:flex;gap:6px;margin:20px 0 12px}
  .tabs div{padding:8px 14px;border-radius:999px;background:#fff;border:1.5px solid var(--line);
    font-size:13px;font-weight:800;color:var(--gray);cursor:pointer}
  .tabs div.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:9px}
  .meta{font-size:11.5px;font-weight:800;color:var(--lgray);margin-bottom:5px}
  .title{font-size:15px;font-weight:800}
  .body{font-size:13.5px;color:var(--gray);white-space:pre-wrap;margin-top:5px}
  .hidden-tag{color:#b3261e;font-weight:800}
  .empty{text-align:center;color:var(--lgray);padding:40px 0;font-size:14px}
  .warn{background:#fdf2dd;border:1px solid #f0dcae;border-radius:11px;padding:11px 13px;
    font-size:12.5px;color:#7a5c12;margin-bottom:16px}
</style>
</head>
<body>
<h1>MATSU 운영자</h1>
<div class="sub">이용약관을 위반한 게시물을 삭제합니다.</div>

<div class="warn">
  이 화면은 <b>ADMIN_KEY</b>를 아는 사람만 쓸 수 있습니다. 키는 브라우저에만 저장되고 서버로는 요청할 때만 보냅니다.
  키가 유출되면 Railway Variables에서 즉시 바꾸세요.
</div>

<div class="row">
  <input id="key" type="password" placeholder="ADMIN_KEY" autocomplete="off">
  <button onclick="load()">불러오기</button>
</div>

<div class="tabs">
  <div id="t-posts" class="on" onclick="tab('posts')">라운지 글</div>
  <div id="t-matches" onclick="tab('matches')">오픈매치</div>
</div>

<div id="out" class="empty">키를 입력하고 불러오기를 누르세요.</div>

<script>
let DATA = { posts: [], open_matches: [] };
let TAB = 'posts';

const keyOf = () => document.getElementById('key').value.trim();
const esc = t => String(t == null ? '' : t)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function when(ms){
  const d = new Date(+ms || 0);
  if (isNaN(d)) return '';
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

async function api(path, opts){
  const r = await fetch(path, { ...opts, headers: { 'Content-Type':'application/json', 'x-admin-key': keyOf() } });
  if (!r.ok) throw new Error(r.status === 403 ? 'ADMIN_KEY가 틀렸어요' : ('HTTP ' + r.status));
  return r.json();
}

async function load(){
  if (!keyOf()) { alert('ADMIN_KEY를 입력하세요'); return; }
  const out = document.getElementById('out');
  out.className = 'empty'; out.textContent = '불러오는 중…';
  try {
    DATA = await api('/admin/feed');
    render();
  } catch (e) {
    out.className = 'empty'; out.textContent = e.message;
  }
}

function tab(t){
  TAB = t;
  document.getElementById('t-posts').className = t === 'posts' ? 'on' : '';
  document.getElementById('t-matches').className = t === 'matches' ? 'on' : '';
  render();
}

function render(){
  const out = document.getElementById('out');
  const list = TAB === 'posts' ? DATA.posts : DATA.open_matches;
  if (!list || !list.length) { out.className = 'empty'; out.textContent = '내용이 없습니다.'; return; }
  out.className = '';
  out.innerHTML = list.map(x => TAB === 'posts' ? postCard(x) : matchCard(x)).join('');
}

const postCard = p => `
  <div class="card">
    <div class="meta">#${p.id} · ${esc(p.author || '탈퇴한 회원')} · ${when(p.created_at)}
      ${p.hidden ? ' · <span class="hidden-tag">숨김 처리됨</span>' : ''}</div>
    <div class="title">${esc(p.title)}</div>
    <div class="body">${esc((p.body || '').slice(0, 300))}</div>
    <div class="row" style="margin-top:10px">
      ${p.hidden
        ? `<button class="ghost" onclick="showPost(${p.id})">숨김 해제</button>`
        : `<button class="ghost" onclick="hidePost(${p.id})">숨기기</button>`}
      <button class="del" onclick="delPost(${p.id})">완전 삭제</button>
    </div>
  </div>`;

const matchCard = m => `
  <div class="card">
    <div class="meta">#${m.id} · 주최 ${esc(m.host || '알 수 없음')}</div>
    <div class="title">${esc(m.dt)} · ${esc(m.loc)}</div>
    ${m.note ? `<div class="body">${esc(m.note)}</div>` : ''}
    <div class="row" style="margin-top:10px">
      <button class="del" onclick="delMatch(${m.id})">완전 삭제</button>
    </div>
  </div>`;

async function hidePost(id){ await act(`/admin/posts/${id}/hide`, 'POST', '숨겼습니다'); }
async function showPost(id){ await act(`/admin/posts/${id}/show`, 'POST', '다시 보입니다'); }
async function delPost(id){
  if (!confirm('이 글과 모든 댓글을 완전히 삭제합니다. 되돌릴 수 없습니다.')) return;
  await act(`/admin/posts/${id}`, 'DELETE', '삭제했습니다');
}
async function delMatch(id){
  if (!confirm('이 오픈매치를 완전히 삭제합니다. 되돌릴 수 없습니다.')) return;
  await act(`/admin/open-matches/${id}`, 'DELETE', '삭제했습니다');
}
async function act(path, method, msg){
  try { await api(path, { method }); alert(msg); load(); }
  catch (e) { alert(e.message); }
}
</script>
</body>
</html>
