<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<title>MATSU · 연결됨(실서버)</title>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<script src="https://js.tosspayments.com/v1/payment"></script>
<script src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>
<style>
  :root{--ink:#1b1813;--coral:#ec6a2e;--coral-d:#cf5418;--coral-s:#fbe8d7;--cream:#f5f2e9;--cream2:#efe9db;--gray:#7f776a;--lgray:#b1a896;--line:#e9e3d4;--felt:#e1ea54}
  *{box-sizing:border-box}
  body{margin:0;background:#cdbfae;font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;color:var(--ink);letter-spacing:-.012em;display:flex;justify-content:center}
  .app{width:100%;max-width:440px;min-height:100vh;background:var(--cream);display:flex;flex-direction:column}
  .bar{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:var(--cream);position:sticky;top:0;z-index:5}
  .logo{font-size:22px;font-weight:900;letter-spacing:-1px}
  .conn{font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px}
  .conn.on{background:#e6f3ec;color:#2f9159}.conn.off{background:#fdecec;color:#c0392b}
  .wrap{flex:1;padding:16px 16px 90px;overflow:auto}
  h2{font-size:30px;font-weight:900;letter-spacing:-.04em;margin:6px 0 4px}
  .sub{font-size:13.5px;color:var(--gray);font-weight:600;margin:0 0 14px}
  .card{background:#fffdf6;border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:11px;box-shadow:0 2px 10px rgba(120,100,60,.05)}
  input,textarea,select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;font-family:inherit;font-size:15px;background:#fff;margin-bottom:9px}
  button{font-family:inherit;cursor:pointer}
  .btn{width:100%;border:none;border-radius:13px;padding:13px;font-size:15px;font-weight:800;background:var(--coral);color:#fff}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:20px}
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tabs div{flex:1;text-align:center;padding:9px;border-radius:12px;font-size:13.5px;font-weight:800;background:#efe9db;color:var(--gray)}
  .tabs div.on{background:var(--ink);color:#fff}
  .row{display:flex;align-items:center;gap:11px}
  .av{width:40px;height:40px;border-radius:12px;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
  .tag{font-size:11px;font-weight:800;background:var(--cream2);border-radius:6px;padding:2px 8px}
  .meta{font-size:12px;color:var(--gray);font-weight:600}
  .note{font-size:12px;color:var(--lgray);font-weight:600;line-height:1.6}
  .g{color:#3f6bc2}.p{color:#e0468a}
  .hero{padding:60px 24px;text-align:center}
  .hero .logo{font-size:52px}
</style>
</head>
<body>
<div class="app">
  <div class="bar"><div class="logo">MATSU</div><div id="conn" class="conn off">● 서버 확인중</div></div>
  <div class="wrap" id="view"></div>
</div>
<script>
// ===== 실제 백엔드와 통신하는 클라이언트 =====
const API = location.origin;              // 같은 서버에서 서빙 → 그대로 사용
let TOKEN = localStorage.getItem('matsu_token');
let ME = null;

async function api(path, opt={}) {
  const r = await fetch(API + path, {
    ...opt,
    headers: { 'Content-Type':'application/json', ...(TOKEN?{Authorization:'Bearer '+TOKEN}:{}) , ...(opt.headers||{}) }
  });
  if (!r.ok) { let e; try{e=await r.json()}catch{e={error:r.status}} throw new Error(e.error||r.status); }
  return r.json();
}

async function checkHealth(){
  try { await api('/health'); document.getElementById('conn').className='conn on'; document.getElementById('conn').textContent='● 서버 연결됨'; }
  catch { document.getElementById('conn').className='conn off'; document.getElementById('conn').textContent='● 서버 꺼짐'; }
}

// ---------- 카카오 로그인 ----------
// 1) https://developers.kakao.com 에서 앱 만들고 JavaScript 키를 아래에 넣으세요.
// 2) [앱 설정 > 플랫폼 > Web]에 이 사이트 도메인을 등록하세요. (로컬은 http://localhost:4000)
const KAKAO_JS_KEY = ''; // ← 카카오 JavaScript 키
// 애플 로그인: https://developer.apple.com → Services ID·도메인·리다이렉트 등록
const APPLE_CLIENT_ID = ''; // ← 애플 Services ID (예: com.matsu.web)
const APPLE_REDIRECT  = location.origin + '/';
// 토스페이먼츠: https://developers.tosspayments.com → 클라이언트 키(테스트키로 시작)
const TOSS_CLIENT_KEY = ''; // ← 토스 클라이언트 키 (test_ck_...)
try { if (KAKAO_JS_KEY && window.Kakao && !Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY); } catch {}
try { if (APPLE_CLIENT_ID && window.AppleID) AppleID.auth.init({ clientId: APPLE_CLIENT_ID, scope:'name email', redirectURI: APPLE_REDIRECT, usePopup: true }); } catch {}

function loginView(){
  const kakaoReady = !!KAKAO_JS_KEY, appleReady = !!APPLE_CLIENT_ID;
  document.getElementById('view').innerHTML = `
    <div class="hero"><div class="logo">MATSU</div>
      <p class="sub" style="margin-top:10px">실제 서버(DB)에 연결된 데모예요.</p></div>
    <div class="card">
      <button class="btn" style="background:#fee500;color:#3a2929" onclick="kakaoLogin()">카카오로 시작하기</button>
      <button class="btn" style="background:#1b1813;color:#fff;margin-top:9px" onclick="appleLogin()"> Apple로 시작하기</button>
      <p class="note" style="margin:9px 0 14px">${kakaoReady?'✓ 카카오 키 설정됨':'⚠ KAKAO_JS_KEY 필요'} · ${appleReady?'✓ 애플 설정됨':'⚠ APPLE_CLIENT_ID 필요'} — 키가 없으면 아래 개발용 로그인 사용</p>
      <div style="border-top:1px solid var(--line);margin:6px 0 12px"></div>
      <input id="nm" placeholder="이름 (예: 곽주영)" value="곽주영">
      <input id="rg" placeholder="지역" value="경기 용인">
      <select id="sp"><option value="tennis">테니스</option><option value="soccer">축구</option><option value="badminton">배드민턴</option><option value="basketball">농구</option><option value="baseball">야구</option><option value="swimming">수영</option><option value="running">러닝</option></select>
      <button class="btn ghost" onclick="doLogin()">개발용 로그인 (dev-login)</button>
    </div>`;
}
async function appleLogin(){
  if (!APPLE_CLIENT_ID || !window.AppleID) { alert('APPLE_CLIENT_ID(애플 Services ID)를 넣어주세요. 없으면 개발용 로그인을 쓰세요.'); return; }
  try {
    const r = await AppleID.auth.signIn();               // { authorization: { id_token, code } }
    const id_token = r.authorization && r.authorization.id_token;
    const name = r.user && r.user.name ? (r.user.name.lastName||'')+(r.user.name.firstName||'') : undefined;
    const { token, user } = await api('/auth/apple', { method:'POST', body: JSON.stringify({ id_token, name }) });
    TOKEN=token; localStorage.setItem('matsu_token', token); ME=user; home();
  } catch(e){ alert('애플 로그인 실패/취소: ' + (e.message||JSON.stringify(e))); }
}
function kakaoLogin(){
  if (!KAKAO_JS_KEY || !window.Kakao) { alert('먼저 public/index.html의 KAKAO_JS_KEY에 카카오 JavaScript 키를 넣어주세요.\n(키가 없으면 아래 개발용 로그인을 쓰세요)'); return; }
  if (!Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY);
  Kakao.Auth.login({
    scope: 'profile_nickname',
    success: async (authObj) => {
      try {
        const { token, user } = await api('/auth/kakao', { method:'POST', body: JSON.stringify({ access_token: authObj.access_token }) });
        TOKEN = token; localStorage.setItem('matsu_token', token); ME = user; home();
      } catch (e) { alert('카카오 로그인 실패: ' + e.message); }
    },
    fail: (e) => alert('카카오 인증 취소/실패: ' + JSON.stringify(e))
  });
}
async function doLogin(){
  const name=nm.value.trim()||'게스트';
  const { token, user } = await api('/auth/dev-login', { method:'POST', body: JSON.stringify({ name, region: rg.value, sport: sp.value }) });
  TOKEN=token; localStorage.setItem('matsu_token', token); ME=user; home();
}
function logout(){ TOKEN=null; ME=null; localStorage.removeItem('matsu_token'); loginView(); }

// ---------- 홈(탭) ----------
let TAB='lounge';
async function home(){
  ME = await api('/me');
  render();
}
function render(){
  document.getElementById('view').innerHTML = `
    <div class="row" style="justify-content:space-between;margin-bottom:12px">
      <div class="row"><div class="av">${(ME.name||'?')[0]}</div><div><div style="font-weight:800">${ME.name} <span class="tag">${ME.sport}</span></div><div class="meta">${ME.region||''} · 익명 ${ME.anon_nick} · 레이팅 ${ME.rating}</div></div></div>
      <div class="row" style="gap:6px"><button class="btn ghost sm" onclick="topup()">M캐쉬 ${ME.cash} +</button><button class="btn ghost sm" onclick="logout()">나가기</button></div>
    </div>
    <div class="tabs">
      <div class="${TAB==='lounge'?'on':''}" onclick="go('lounge')">라운지</div>
      <div class="${TAB==='clubs'?'on':''}" onclick="go('clubs')">클럽</div>
      <div class="${TAB==='match'?'on':''}" onclick="go('match')">경기</div>
      <div class="${TAB==='rec'?'on':''}" onclick="go('rec')">기록</div>
      <div class="${TAB==='search'?'on':''}" onclick="go('search')">검색</div>
    </div>
    <div id="tab"></div>`;
  ({lounge:loungeTab, clubs:clubsTab, match:matchTab, rec:recTab, search:searchTab, store:storeTab})[TAB]();
}
function go(t){ TAB=t; render(); }
const PKGS = [[8900,25],[13900,45],[24900,90],[49900,200],[129000,600],[229000,1100]];
function topup(){ go('store'); }
function storeTab(){
  const mode = TOSS_CLIENT_KEY ? '실결제(토스)' : '데모 지급';
  document.getElementById('tab').innerHTML =
    `<div style="font-weight:800;margin:2px 4px 10px">M캐쉬 충전 · ${mode}</div>` +
    PKGS.map(([won,cash])=>`<div class="card row" style="justify-content:space-between"><div><b>M캐쉬 ${cash}</b></div><button class="btn sm" onclick="buy(${won},${cash})">${won.toLocaleString()}원</button></div>`).join('') +
    `<p class="note">${TOSS_CLIENT_KEY?'토스 결제창이 뜨고, 성공 시 서버가 토스에 최종 승인한 뒤 캐쉬를 지급합니다.':'⚠ TOSS_CLIENT_KEY를 넣으면 실제 결제가 켜져요. 지금은 데모 지급으로 동작합니다.'}</p>
     <button class="btn ghost" style="margin-top:8px" onclick="go('lounge')">← 돌아가기</button>`;
}
async function buy(won, cash){
  if (!TOSS_CLIENT_KEY) { const d=await api('/cash/purchase',{method:'POST',body:JSON.stringify({amount:cash})}); ME.cash=d.cash; alert('데모 지급 완료 · +'+cash+' (잔액 '+d.cash+')'); go('store'); return; }
  try {
    const ord = await api('/pay/order',{method:'POST',body:JSON.stringify({amount:won})});
    const toss = TossPayments(TOSS_CLIENT_KEY);
    await toss.requestPayment('카드', {
      amount: won, orderId: ord.orderId, orderName: ord.orderName,
      successUrl: location.origin + '/', failUrl: location.origin + '/?pay=fail'
    });
  } catch(e){ alert('결제 시작 실패: ' + e.message); }
}
// 결제창에서 성공 후 successUrl로 돌아오면 ?paymentKey&orderId&amount 가 붙어옴 → 서버 최종 승인
async function handlePayReturn(){
  const p = new URLSearchParams(location.search);
  if (p.get('paymentKey') && p.get('orderId')) {
    try {
      const r = await api('/pay/confirm',{method:'POST',body:JSON.stringify({ paymentKey:p.get('paymentKey'), orderId:p.get('orderId'), amount:+p.get('amount') })});
      alert('충전 완료 · +'+(r.credited||'')+' (잔액 '+r.cash+')');
    } catch(e){ alert('결제 승인 실패: '+e.message); }
    history.replaceState({},'',location.origin+'/');
  } else if (p.get('pay')==='fail') { alert('결제가 취소/실패했어요.'); history.replaceState({},'',location.origin+'/'); }
}

// ---------- 경기 (1:1 → 상호확정 → Elo, 실제 DB) ----------
async function matchTab(){
  const el=document.getElementById('tab');
  const users = (await api('/users')).filter(u=>u.id!==ME.id);
  el.innerHTML=`<div class="card">
    <div style="font-weight:800;margin-bottom:8px">빠른 1:1 결과 기록 → Elo 반영</div>
    <select id="opp">${users.map(u=>`<option value="${u.id}">${esc(u.name)} (레이팅 ${u.rating})</option>`).join('')||'<option>상대 없음</option>'}</select>
    <div class="row" style="gap:8px"><input id="hs" type="number" placeholder="내 점수" value="6"><input id="as" type="number" placeholder="상대 점수" value="3"></div>
    <button class="btn" onclick="playMatch()">경기 결과 저장 (양측 확정)</button>
    <p class="note" style="margin-top:8px">서버가 결과를 저장하고 <b>Elo</b>로 레이팅을 자동 갱신합니다.</p></div>
    <div id="mres"></div>`;
}
async function playMatch(){
  const away=+document.getElementById('opp').value;
  const h=+document.getElementById('hs').value, a=+document.getElementById('as').value;
  const m = await api('/matches',{method:'POST',body:JSON.stringify({sport:ME.sport,kind:'single',home_user_id:ME.id,away_user_id:away})});
  await api('/matches/'+m.id+'/result',{method:'POST',body:JSON.stringify({home_score:h,away_score:a,side:'home'})});
  const done = await api('/matches/'+m.id+'/result',{method:'POST',body:JSON.stringify({home_score:h,away_score:a,side:'away'})});
  ME = await api('/me');
  document.getElementById('mres').innerHTML=`<div class="card"><b>결과 확정</b> · 상태 ${done.status}<br><span class="meta">내 새 레이팅: <b>${ME.rating}</b> (${h>a?'승':'패'})</span></div>`;
  render(); TAB='match'; // keep tab; re-render header rating
  setTimeout(()=>{document.getElementById('mres') && (document.getElementById('mres').scrollIntoView());},50);
}

// ---------- 기록 (수영/러닝 등) ----------
async function recTab(){
  const el=document.getElementById('tab');
  el.innerHTML=`<div class="card">
    <div class="row" style="gap:8px"><select id="rsp"><option value="running">러닝</option><option value="swimming">수영</option></select><input id="rev" placeholder="종목(예: 10k / 50m_free)" value="10k"></div>
    <input id="rval" type="number" step="0.1" placeholder="기록 (러닝=분, 수영=초)" value="50.5">
    <button class="btn" onclick="addRecord()">기록 등록 → DB</button></div>
    <div id="lb"></div>`;
  loadLb();
}
async function addRecord(){ await api('/records',{method:'POST',body:JSON.stringify({sport:rsp.value,event:rev.value,value:+rval.value})}); loadLb(); }
async function loadLb(){
  const sp=rsp.value, ev=rev.value;
  const lb = await api('/records/leaderboard?sport='+encodeURIComponent(sp)+'&event='+encodeURIComponent(ev));
  document.getElementById('lb').innerHTML = `<div style="font-weight:900;color:var(--gray);font-size:13px;margin:12px 2px 8px">${sp} · ${ev} 랭킹</div>` +
    (lb.length? lb.map((r,i)=>`<div class="card row" style="justify-content:space-between"><div class="row"><b style="width:20px;color:${i===0?'#e0a82e':'var(--lgray)'}">${i+1}</b> ${esc(r.name)}</div><b>${r.best}</b></div>`).join('') : '<p class="note">기록이 없어요.</p>');
}

// ---------- 라운지 (DB에서 읽고/쓰기) ----------
async function loungeTab(){
  const el=document.getElementById('tab');
  el.innerHTML=`<div class="card">
      <input id="pt" placeholder="제목 (익명으로 올라가요)">
      <textarea id="pb" rows="2" placeholder="내용"></textarea>
      <button class="btn" onclick="writePost()">익명으로 글 올리기 → DB 저장</button></div>
    <div id="posts"><p class="note">불러오는 중…</p></div>`;
  loadPosts();
}
async function loadPosts(){
  const posts = await api('/posts');
  document.getElementById('posts').innerHTML = posts.length ? posts.map(p=>`
    <div class="card">
      <div><span class="tag">${p.category}</span> <span class="meta">${p.sport||''}</span></div>
      <div style="font-weight:800;font-size:16px;margin:6px 0 4px">${esc(p.title)}</div>
      <div class="meta">${esc(p.body||'')}</div>
      <div class="row" style="justify-content:space-between;margin-top:9px">
        <div class="meta"><b class="${p.gender==='여성'?'p':'g'}">${p.gender==='여성'?'♀':'♂'}</b> ${p.anon_nick||'익명'} · ${p.region||''}</div>
        <div class="row" style="gap:10px"><span class="meta">♡ ${p.likes}</span>
          <button class="btn ghost sm" onclick="likePost(${p.id})">좋아요</button>
          <button class="btn ghost sm" onclick="reportPost(${p.id})">신고</button></div>
      </div></div>`).join('') : '<p class="note">아직 글이 없어요. 위에서 첫 글을 올려보세요.</p>';
}
async function writePost(){ if(!pt.value.trim())return alert('제목을 입력하세요');
  await api('/posts',{method:'POST',body:JSON.stringify({title:pt.value,body:pb.value,sport:ME.sport,category:'자유'})});
  pt.value='';pb.value=''; loadPosts();
}
async function likePost(id){ await api('/posts/'+id+'/like',{method:'POST'}); loadPosts(); }
async function reportPost(id){ await api('/report',{method:'POST',body:JSON.stringify({target_type:'post',target_id:id,reason:'스팸'})}); alert('신고 접수 · 누적 3회면 자동 숨김'); loadPosts(); }

// ---------- 클럽 (DB) ----------
async function clubsTab(){
  const el=document.getElementById('tab');
  el.innerHTML=`<div class="card">
      <input id="cn" placeholder="클럽 이름 (예: 용인 마츠 클럽)">
      <select id="cs"><option value="tennis">테니스</option><option value="soccer">축구</option><option value="badminton">배드민턴</option><option value="basketball">농구</option><option value="baseball">야구</option></select>
      <input id="cr" placeholder="지역" value="${ME.region||''}">
      <button class="btn" onclick="createClub()">클럽 만들기 → DB 저장</button></div>
    <div id="clubs"><p class="note">불러오는 중…</p></div>`;
  loadClubs();
}
async function loadClubs(){
  const cs = await api('/clubs');
  document.getElementById('clubs').innerHTML = cs.length ? cs.map(c=>`
    <div class="card row" style="justify-content:space-between">
      <div class="row"><div class="av">${c.name[0]}</div><div><div style="font-weight:800">${esc(c.name)} <span class="tag">${c.sport}</span></div><div class="meta">${c.region||''} · 입회비 ${(c.entry_fee||0).toLocaleString()}원</div></div></div>
      <button class="btn ghost sm" onclick="joinClub(${c.id})">가입</button></div>`).join('') : '<p class="note">클럽이 없어요. 첫 클럽을 만들어보세요.</p>';
}
async function createClub(){ if(!cn.value.trim())return alert('이름을 입력하세요');
  await api('/clubs',{method:'POST',body:JSON.stringify({name:cn.value,sport:cs.value,region:cr.value})});
  cn.value=''; loadClubs();
}
async function joinClub(id){ await api('/clubs/'+id+'/join',{method:'POST'}); alert('가입 완료 (DB 반영)'); }

// ---------- 통합 검색 (DB) ----------
function searchTab(){
  document.getElementById('tab').innerHTML=`<div class="card"><input id="q" placeholder="클럽·회원·글 검색" oninput="runSearch(this.value)"></div><div id="sres"><p class="note">검색어를 입력하세요.</p></div>`;
}
async function runSearch(q){ q=q.trim(); const el=document.getElementById('sres'); if(!q){el.innerHTML='<p class="note">검색어를 입력하세요.</p>';return;}
  const d = await api('/search?q='+encodeURIComponent(q));
  const sec=(t,a,f)=>a.length?`<div style="font-weight:900;color:var(--gray);font-size:13px;margin:10px 2px 6px">${t} · ${a.length}</div>`+a.map(f).join(''):'';
  el.innerHTML = (sec('클럽',d.clubs,c=>`<div class="card"><b>${esc(c.name)}</b> <span class="tag">${c.sport}</span><div class="meta">${c.region||''}</div></div>`)
    + sec('회원',d.users,u=>`<div class="card"><b>${esc(u.name)}</b><div class="meta">${u.region||''} · ${u.sport||''}</div></div>`)
    + sec('라운지 글',d.posts,p=>`<div class="card"><span class="tag">${p.category}</span> <b>${esc(p.title)}</b></div>`)) || `<p class="note">"${esc(q)}" 결과 없음</p>`;
}

function esc(s){ return String(s||'').replace(/[<>&]/g,x=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[x])); }

// 부팅
checkHealth();
handlePayReturn().finally(()=>{ if (TOKEN) home().catch(loginView); else loginView(); });
